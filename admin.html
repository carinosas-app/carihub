<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_EMAIL = "carinosas.anuncios@gmail.com";
</script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
  padding:15px;
}

h1{
  color:#c2185b;
  text-align:center;
}

h2{
  margin-bottom:8px;
}

.box{
  max-width:850px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  box-sizing:border-box;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin:5px 3px;
  font-weight:bold;
  cursor:pointer;
}

.btn-login{
  width:100%;
  background:#c2185b;
  color:white;
  font-size:16px;
}

.btn-salir{
  background:#555;
  color:white;
}

.card{
  background:white;
  padding:15px;
  margin:18px 0;
  border-radius:14px;
  box-shadow:0 3px 12px rgba(0,0,0,.18);
}

.card img{
  width:100%;
  max-height:360px;
  object-fit:cover;
  border-radius:12px;
  margin:8px 0 14px;
}

.aprobado{
  color:green;
  font-weight:bold;
}

.pendiente{
  color:orange;
  font-weight:bold;
}

.btn-aprobar{
  background:green;
  color:white;
}

.btn-quitar{
  background:orange;
  color:white;
}

.btn-borrar{
  background:red;
  color:white;
}

.verificacion{
  background:#fff1f7;
  padding:12px;
  border-radius:12px;
  border-left:5px solid #c2185b;
  margin-top:12px;
}

.fotos-extra{
  background:#f7f7f7;
  padding:12px;
  border-radius:12px;
  border-left:5px solid #777;
  margin-top:12px;
}

.dato{
  margin:7px 0;
}

.aviso{
  color:#777;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h1>Panel Admin</h1>
  <input id="email" type="email" placeholder="Correo admin">
  <input id="password" type="password" placeholder="Contraseña">
  <button class="btn-login" onclick="login()">Entrar</button>
</div>

<div class="box" id="panelBox" style="display:none;">
  <h1>Usuarios registrados</h1>
  <button class="btn-salir" onclick="salir()">Cerrar sesión</button>
  <div id="usuarios">Cargando...</div>
</div>

<script>
function textoSeguro(texto){
  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("panelBox").style.display = "none";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Acceso no autorizado. Solo el administrador puede entrar.");
    await auth.signOut();
    window.location.href = "index.html";
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("panelBox").style.display = "block";
  cargarUsuarios();
});

async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (error) {
    alert("Error: " + error.message);
  }
}

async function cargarUsuarios() {
  const contenedor = document.getElementById("usuarios");
  contenedor.innerHTML = "Cargando usuarios...";

  try {
    const snap = await db.collection("usuarios").orderBy("fecha", "desc").get();
    contenedor.innerHTML = "";

    if (snap.empty) {
      contenedor.innerHTML = "<p>No hay usuarios registrados.</p>";
      return;
    }

    snap.forEach(doc => {
      const u = doc.data();
      const estado = u.aprobado ? "APROBADO" : "PENDIENTE";

      const fotoPerfil = u.fotoURL || "";
      const fotosExtraURL = Array.isArray(u.fotosExtraURL) ? u.fotosExtraURL : [];

      const verificacion = u.verificacion || {};
      const ineURL = verificacion.ineURL || "";
      const ineReversoURL = verificacion.ineReversoURL || "";
      const selfieURL = verificacion.selfieURL || "";
      const nombreReal = verificacion.nombreReal || "";

      contenedor.innerHTML += `
        <div class="card">
          <h2>${textoSeguro(u.nombre || "Sin nombre")}</h2>

          ${fotoPerfil ? `<img src="${textoSeguro(fotoPerfil)}" alt="Foto perfil">` : "<p class='aviso'>Sin foto de perfil</p>"}

          ${fotosExtraURL.length > 0 ? `
            <div class="fotos-extra">
              <h3>Fotos adicionales del perfil</h3>
              ${fotosExtraURL.map((url, i) => `
                <p><b>Foto extra ${i + 1}:</b></p>
                <img src="${textoSeguro(url)}" alt="Foto extra ${i + 1}">
              `).join("")}
            </div>
          ` : "<p class='aviso'>Sin fotos adicionales</p>"}

          <p class="dato"><b>Correo:</b> ${textoSeguro(u.email)}</p>
          <p class="dato"><b>WhatsApp:</b> ${textoSeguro(u.telefono)}</p>
          <p class="dato"><b>País:</b> ${textoSeguro(u.pais)}</p>
          <p class="dato"><b>Estado:</b> ${textoSeguro(u.estado)}</p>
          <p class="dato"><b>Ciudad:</b> ${textoSeguro(u.ciudad)}</p>
          <p class="dato"><b>Categoría:</b> ${textoSeguro(u.categoria)}</p>
          <p class="dato"><b>Descripción corta:</b> ${textoSeguro(u.descripcion)}</p>
          <p class="dato"><b>Descripción completa:</b> ${textoSeguro(u.descripcionCompleta)}</p>
          <p class="dato"><b>Precio:</b> ${textoSeguro(u.precio)}</p>
          <p class="dato"><b>Modalidad:</b> ${textoSeguro(u.modalidad)}</p>
          <p class="dato"><b>Horario:</b> ${textoSeguro(u.horario)}</p>
          <p class="dato"><b>Zona:</b> ${textoSeguro(u.zona)}</p>
          <p class="dato"><b>Servicios:</b> ${textoSeguro(u.servicios)}</p>

          <p class="dato"><b>Estado:</b> 
            <span class="${u.aprobado ? "aprobado" : "pendiente"}">${estado}</span>
          </p>

          <div class="verificacion">
            <h3>Verificación privada</h3>
            <p><b>Nombre real:</b> ${textoSeguro(nombreReal)}</p>

            ${ineURL ? `<p><b>INE frente / identificación:</b><br><img src="${textoSeguro(ineURL)}" alt="INE frente"></p>` : "<p class='aviso'>INE frente no subida</p>"}

            ${ineReversoURL ? `<p><b>INE reverso:</b><br><img src="${textoSeguro(ineReversoURL)}" alt="INE reverso"></p>` : "<p class='aviso'>INE reverso no subida</p>"}

            ${selfieURL ? `<p><b>Selfie de verificación:</b><br><img src="${textoSeguro(selfieURL)}" alt="Selfie"></p>` : "<p class='aviso'>Selfie no subida</p>"}

            <p class="aviso">Estas imágenes no son públicas. Solo el admin debe revisarlas.</p>
          </div>

          <button class="btn-aprobar" onclick="aprobar('${doc.id}')">Aprobar</button>
          <button class="btn-quitar" onclick="quitarAprobacion('${doc.id}')">Quitar aprobación</button>
          <button class="btn-borrar" onclick="borrarUsuario('${doc.id}')">Borrar</button>
        </div>
      `;
    });

  } catch (error) {
    contenedor.innerHTML = "Error al cargar usuarios.";
    alert("Error: " + error.message);
  }
}

async function aprobar(id) {
  await db.collection("usuarios").doc(id).update({ aprobado: true });
  alert("Usuario aprobado");
  cargarUsuarios();
}

async function quitarAprobacion(id) {
  await db.collection("usuarios").doc(id).update({ aprobado: false });
  alert("Aprobación quitada");
  cargarUsuarios();
}

async function borrarUsuario(id) {
  if (!confirm("¿Seguro que quieres borrar este usuario?")) return;
  await db.collection("usuarios").doc(id).delete();
  alert("Usuario borrado");
  cargarUsuarios();
}

async function salir() {
  await auth.signOut();
  location.reload();
}
</script>

</body>
</html>

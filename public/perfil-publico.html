<style>
:root{
  --acc:#ec2d7a; --acc2:#ff4f9a; --grn:#16a34a;
  --bg:var(--ch-bg, #FFF7FA); --card:var(--ch-card, #FFFFFF); --ink:#23202b; --muted:#7b7280;
  --line:var(--ch-separator, #F8DCE8); --card-border:var(--ch-card-border, #FCE4EC);
  --shadow:var(--ch-card-shadow, 0 2px 12px rgba(255,79,162,.06));
}
[data-tema="pro"], [data-tema="empresa"]{
  --acc:#1d4ed8; --acc2:#2563eb; --grn:#16a34a;
  --bg:#eef2f8; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
  --line:#e2e8f0; --card-border:#e2e8f0;
  --shadow:0 6px 18px rgba(0,0,0,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;min-height:100%;}
body{font-family:'Poppins',"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);transition:background .2s;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* selector de vista previa (no es parte del diseño) */
.switcher{position:sticky;top:0;z-index:50;background:#0f172a;color:#fff;display:flex;gap:8px;align-items:center;padding:10px 16px;flex-wrap:wrap;}
.switcher b{font-size:13px;opacity:.8;margin-right:6px;}
.switcher button{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:800;}
.switcher-select{font-family:inherit;font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #555;background:#1a1a1a;color:#f3f3f3;cursor:pointer;}
.negocio-sobre .sobre-card__desc{margin-bottom:0;}
.switcher button.is-on{background:#fff;color:#0f172a;border-color:#fff;}
.switcher span{margin-left:auto;font-size:12px;opacity:.7;}
body.perfil-desde-resultados .switcher{display:none !important;}
body.perfil-desde-resultados:not(.fit) #fitOuter{min-height:100vh;}

/* Embed mini-preview en dashboard (2 columnas del perfil, sin chrome extra) */

body.perfil-embed-dashboard .pb,
body.perfil-embed-dashboard .pbrand,
body.perfil-embed-dashboard .profile-toolbar,
body.perfil-embed-dashboard .perfil-res-chrome,
body.perfil-embed-dashboard .res-shell__top,
body.perfil-embed-dashboard .playout__banner-adult,
body.perfil-embed-dashboard .negocio-pie-wrap--bottom,
body.perfil-embed-dashboard .ch-slot-dock,
body.perfil-embed-dashboard .fit-hint{display:none !important;}
body.perfil-embed-dashboard.fit{
  position:relative;inset:auto;width:100%;height:auto;overflow:visible;margin:0;
  display:block;
}
html.perfil-embed-dashboard.fit{overflow:auto;height:100%;}
body.perfil-embed-dashboard.fit #fitOuter{
  flex:none;overflow:hidden;min-height:0;width:100%;position:relative;
}
body.perfil-embed-dashboard.fit #fitSpacer{position:relative;margin:0;width:100%;}
body.perfil-embed-dashboard.fit #fitRoot{
  position:absolute;top:0;left:0;margin:0;
  transform-origin:top left;
}
body.perfil-embed-dashboard.fit .wrap{
  max-width:none;margin:0;padding:8px 8px 10px;
}
body.perfil-embed-dashboard.fit [data-tema="adult"] .playout,
body.perfil-embed-dashboard [data-tema="adult"] .playout{
  grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
  gap:10px !important;
  align-items:start !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .playout__tri{
  display:grid !important;
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:8px !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .playout__tri .pcard--mini{

body.perfil-embed-dashboard [data-tema="adult"] .precio-desde,

body.perfil-embed-dashboard [data-tema="adult"] .contact{

  gap:6px !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .contact .cbtn{font-size:9px !important;padding:8px 4px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .sobre-card__grid{

body.perfil-embed-dashboard [data-tema="adult"] .playout__col--izq,
body.perfil-embed-dashboard [data-tema="adult"] .playout__col--der{min-width:0 !important;overflow:visible;}
body.perfil-embed-dashboard [data-tema="adult"] .idhead h1{font-size:1.2rem !important;}
body.perfil-embed-dashboard [data-tema="adult"] .modchip{font-size:8px !important;padding:3px 6px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .gal__thumbs .thumb{height:34px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .playout__izq-stack{gap:6px !important;}
body.perfil-embed-dashboard .playout__col--der > *:not(:first-child),
body.perfil-embed-dashboard .playout__banner-adult,
body.perfil-embed-dashboard .playout__feed-pair,
body.perfil-embed-dashboard .playout__derstack,
body.perfil-embed-dashboard .aviso-donacion{display:none !important;}
body.perfil-embed-dashboard .playout .gal__main{max-height:180px;aspect-ratio:4/3;}
body.perfil-embed-dashboard .playout .gal__main img,
body.perfil-embed-dashboard .playout .gal__main .ch-foto-ph{max-height:180px;object-fit:cover;}
body.perfil-embed-dashboard.fit #fitOuter{overflow:hidden;}

/* Embed vista previa completa — dashboard módulo Inicio (misma referencia que perfil público) */

body.perfil-embed-dashboard-inicio .pb,

  position:relative;inset:auto;width:100%;height:100%;overflow:hidden;margin:0;

html.perfil-embed-dashboard-inicio.fit{overflow:hidden;height:100%;}
body.perfil-embed-dashboard-inicio.fit #fitOuter{
  flex:none;overflow:hidden;min-height:0;width:100%;height:100%;position:relative;
}
body.perfil-embed-dashboard-inicio.fit #fitSpacer{position:relative;margin:0;width:100%;}
body.perfil-embed-dashboard-inicio.fit #fitRoot{
  position:absolute;top:0;left:0;margin:0;
  transform-origin:top left;
}
body.perfil-embed-dashboard-inicio.fit .wrap{
  max-width:none;margin:0;padding:10px 10px 12px;
}
body.perfil-embed-dashboard-inicio.fit [data-tema="adult"] .playout,
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout{
  grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
  gap:12px !important;
  align-items:start !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__tri{
  display:grid !important;
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:10px !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__col--izq,
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__col--der{min-width:0 !important;overflow:visible;}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__izq-stack{gap:8px !important;}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .contact{

  gap:8px !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .sobre-card__grid{

body.perfil-embed-dashboard-inicio .playout .gal__main{max-height:none;}
body.perfil-embed-dashboard-inicio .playout .gal__main img,
body.perfil-embed-dashboard-inicio .playout .gal__main .ch-foto-ph{max-height:none;position:absolute;inset:0;}

body.perfil-personalize-mode [data-ch-style]{cursor:pointer;transition:box-shadow .15s,outline-color .15s;}
body.perfil-personalize-mode [data-ch-style]:hover{
  outline:2px dashed rgba(236,45,122,.65);
  outline-offset:2px;
  box-shadow:0 0 0 4px rgba(236,45,122,.12);
}
body.perfil-sheen-gold::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 20% 10%,rgba(255,211,77,.18),transparent 42%),
    radial-gradient(circle at 80% 90%,rgba(255,180,60,.12),transparent 38%);
}
body.perfil-sheen-none::before{display:none!important;}
.fit-hint{margin-left:0 !important;font-size:11px !important;opacity:.85 !important;color:#ffd0e6;font-weight:700;}
.rainctl{display:flex;align-items:center;gap:6px;opacity:1 !important;font-weight:700;}
.rainctl button{background:#3a2a00;color:#ffd34d;border:1px solid #b8860b;padding:6px 11px;font-size:12px;font-weight:800;border-radius:999px;margin-left:0;}

/* ===== Lluvia de monedas doradas (donaciones en vivo) ===== */
.rain-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.rain-coin{position:absolute;top:-9vh;will-change:transform,opacity;animation:rain-fall linear forwards;filter:drop-shadow(0 3px 6px rgba(160,110,0,.5));}
.rain-coin svg{width:100%;height:100%;display:block;}
@keyframes rain-fall{0%{transform:translateY(-12vh) rotate(0deg) scale(.6);opacity:0}7%{opacity:1}100%{transform:translateY(114vh) rotate(540deg) scale(1);opacity:1}}
.rain-flash{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(255,215,0,.85) 40%,rgba(255,215,0,0) 70%);animation:rain-flash 1s ease-out forwards;}
@keyframes rain-flash{0%{transform:scale(.2);opacity:0}30%{opacity:1}100%{transform:scale(2.6);opacity:0}}
.rain-bang{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:10000;pointer-events:none;background:linear-gradient(90deg,#ffb300,#ffd34d,#ffb300);color:#5c3f06;font-weight:900;font-size:15px;padding:8px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(184,134,11,.5);animation:rain-bang 1.8s ease-out forwards;display:flex;align-items:center;gap:8px;}
@keyframes rain-bang{0%{transform:translateX(-50%) scale(.5);opacity:0}15%{transform:translateX(-50%) scale(1.1);opacity:1}80%{opacity:1}100%{transform:translateX(-50%) translateY(-18px) scale(1);opacity:0}}
.rain-bang svg{width:24px;height:24px;}
/* monedas cayendo dentro del thumb del live */
.thumb .liverain{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2;}
.thumb .liverain i{position:absolute;top:-20%;width:14px;height:14px;animation:rain-fall-mini linear infinite;}
.thumb .liverain i svg{width:100%;height:100%;}
@keyframes rain-fall-mini{0%{transform:translateY(-20%) rotate(0)}100%{transform:translateY(360%) rotate(360deg)}}
@media (prefers-reduced-motion: reduce){.rain-coin,.rain-flash,.thumb .liverain i{animation:none !important}}

/* Chrome Resultados pegado en perfil: estructura = res-shell / res-shell__top (ver shell()).
   Medidas vienen de css/resultados.css + lienzo fit 1120 — no redefinir aquí. */
body:not(.fit) .wrap{
  max-width:var(--res-design-w,1120px);
  margin-left:auto;
  margin-right:auto;
}
body:not(.fit) .wrap > .playout{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
}
/* Evitar chrome Results en embeds dashboard */
body.perfil-embed-dashboard .res-shell__top,
body.perfil-embed-dashboard-inicio .res-shell__top,
body.perfil-embed-dashboard .perfil-res-top,
body.perfil-embed-dashboard-inicio .perfil-res-top{display:none !important;}

body:not(.fit) #fitOuter,
body:not(.fit) #fitSpacer,
body:not(.fit) #fitRoot{
  position:static;width:100%;max-width:none;margin:0;transform:none;min-height:0;
}
body:not(.fit) #fitRoot{width:100%;}

/* ===== BANNERS ===== */
/* Fila superior: misma proporción visual que resultados (.pb), renta propia perfil_* */
.pb{display:flex;gap:14px;margin-bottom:14px;flex-wrap:nowrap;}
.pb a{flex:1 1 0;position:relative;overflow:hidden;border-radius:16px;color:#fff;padding:14px 16px;min-height:158px;display:flex;align-items:center;box-shadow:var(--shadow);}
.pb__imgbanner{padding:0;min-height:158px;display:block;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.pb__imgbanner img{width:100%;height:100%;min-height:158px;object-fit:cover;object-position:center;display:block;}
.pb-slot{
  flex:1 1 0;position:relative;overflow:hidden;border-radius:16px;
  min-height:158px;display:block;box-shadow:var(--shadow);
  text-decoration:none;color:#fff;padding:0;
}
.pb-slot.pb--center,.pb--center{flex:1.55 1 0;}
.pb-slot--bottom{
  display:block;width:100%;flex:none;
  min-height:128px;margin-top:36px;margin-bottom:12px;border-radius:20px;
}
.pb-slot--bottom .pb-slot__stage{min-height:inherit;height:100%;}
.pb-slot--bottom .pb-slot__slide img{min-height:128px;}
[data-tema="adult"] .pb-slot--bottom{min-height:140px;margin-top:16px;}

.pb-slot__slide{

  overflow:hidden;
}
.pb-slot__slide.is-active{opacity:1;visibility:visible;pointer-events:auto;z-index:1;}
.pb-slot__slide:not(.is-active){transform:translateX(0);clip-path:inset(0);}
.pb-slot__slide img,
.pb-slot__media{width:100%;height:100%;min-height:158px;object-fit:cover;object-position:center;display:block;}

.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

.tabs .tb.on{background:#e0e7ff;color:var(--acc);border-color:#c7d2fe;}

[data-tema="pro"] .modchip .mc-ic,[data-tema="empresa"] .modchip .mc-ic{color:#2563eb;}

[data-tema="pro"] .quote,[data-tema="empresa"] .quote{background:#f8fafc;border-color:#e2e8f0;}

/* data list */
.dlist{display:flex;flex-direction:column;}
.drow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:16px;}
.drow:last-child{border-bottom:none;}

.svc div{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#374151;line-height:1.3;}
.svc .ok{color:var(--grn);} .svc .no{color:#ef4444;}
.svc--stack{grid-template-columns:1fr;gap:6px;}
[data-tema="adult"] .playout__derstack .svc{gap:5px 12px;}

/* ===== Sobre mí (adulto — referencia exacta) ===== */
.sobre-card{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
}
[data-tema="adult"] .sobre-card{
  background:#fef6f9;border:1px solid #f3c0d4;border-radius:20px;
  box-shadow:none;padding:20px 22px 18px;
}
[data-tema="adult"] .sobre-attrs{gap:10px;}
[data-tema="adult"] .sobre-card__desc{margin-bottom:14px;}
[data-tema="adult"] .playout{margin-bottom:0;}
.sobre-card__grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(148px,34%);
  gap:20px 28px;
  align-items:center;
}
.sobre-card__left{min-width:0;}
.sobre-card__head{display:flex;align-items:center;gap:8px;margin:0 0 14px;}
.sobre-card__heart{width:22px;height:22px;flex:0 0 22px;display:block;}
.sobre-card__title{margin:0;font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:18px;font-weight:700;color:#111111;line-height:1;}
.sobre-card__desc{margin:0 0 20px;font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:15px;font-weight:400;color:#111111;line-height:1.65;}
.sobre-attrs{display:flex;flex-direction:column;gap:12px;}
.sobre-row{
  display:grid;
  grid-template-columns:24px minmax(92px,max-content) minmax(0,1fr);
  column-gap:10px;
  align-items:center;
  min-height:24px;
}
.sobre-row__ic{
  width:24px;height:24px;
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  background:transparent;border-radius:0;
}
.sobre-row__ic svg{width:22px;height:22px;display:block;}
.sobre-row__lab{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:700;color:#111111;
  white-space:nowrap;
}
.sobre-row__val{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:500;color:#111111;
}
.sobre-card__right{
  display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0;width:100%;
}
[data-tema="adult"] .sobre-card__grid{align-items:stretch;}
[data-tema="adult"] .sobre-card__right{
  justify-content:flex-start;align-self:stretch;height:auto;min-height:100%;
}
[data-tema="adult"] .sobre-card__right .sobre-row{
  width:100%;max-width:200px;margin-top:2px;
}
.sobre-back{
  width:100%;max-width:200px;display:flex;justify-content:center;
  padding-top:10px;margin-top:4px;
}
[data-tema="adult"] .sobre-card__right .sobre-back{margin-top:auto;padding-top:8px;}
.sobre-back .profile-back-btn{width:100%;max-width:184px;}
.sobre-sil{
  width:100%;
  margin:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:0;
}
.sobre-sil__img{
  display:block;
  width:100%;
  max-width:200px;
  height:auto;
  margin:0 auto;
}

/* sobre legacy (pro/empresa) */
.sobre{display:flex;gap:16px;}
.sobre p{margin:0;font-size:14px;font-weight:400;line-height:1.5;color:#212121;}
.silbox{flex:0 0 90px;width:90px;}
.silbox .h{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;font-weight:800;}
.measures{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:13px;}
.measures div{display:flex;gap:6px;} .measures b{color:var(--muted);font-weight:800;}

/* actividad / en vivo */
.feed{display:flex;gap:12px;align-items:flex-start;}
.feed .thumb{flex:0 0 110px;width:110px;aspect-ratio:16/10;border-radius:10px;overflow:hidden;background:#ccc;position:relative;}
.feed .thumb img,.feed .thumb .ch-foto-ph{width:100%;height:100%;object-fit:cover;}
.feed .live{position:absolute;top:6px;right:6px;background:#dc2626;color:#fff;font-size:9px;font-weight:900;padding:2px 6px;border-radius:4px;}
.feed .meta{font-size:13px;color:#4b5563;line-height:1.4;}
.feed .meta .when{color:var(--acc);font-weight:900;font-size:12px;}
.livebox{font-size:13px;color:#4b5563;line-height:1.6;}
.livebox .lbtn{display:inline-block;margin-top:8px;background:var(--acc);color:#fff;border-radius:8px;padding:8px 14px;font-weight:900;font-size:12px;}

/* donaciones (moneda dorada) */
.coinfly{position:absolute;z-index:3;bottom:6px;left:6px;animation:coinfloat 2.8s ease-in-out infinite;}
.coinfly--2{bottom:auto;top:24px;left:auto;right:8px;animation-delay:.5s;}
.coinfly--3{bottom:8px;left:auto;right:10px;animation-delay:1.1s;}
@keyframes coinfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.donrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#92660a;background:linear-gradient(90deg,#fff8e1,#fffdf5);border:1px solid #f3d98a;border-radius:9px;padding:6px 9px;}
.donrow b{color:#7a5408;}
.donaviso{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,#fff8e1,#fffdf6);border:1px solid #f1d27a;box-shadow:0 6px 18px rgba(214,160,20,.18);}
.donaviso__txt{flex:1;display:flex;flex-direction:column;font-size:12.5px;color:#7a5408;line-height:1.4;}
.donaviso__txt b{color:#5c3f06;font-size:13.5px;}
.donaviso__pill{display:inline-flex;align-items:center;gap:5px;background:#ffd34d;color:#5c3f06;font-weight:900;font-size:12px;border-radius:999px;padding:5px 11px;border:1px solid #e6a417;}

/* mapa */
.mapwrap{display:flex;gap:14px;flex-wrap:wrap;}
.mapbox{flex:1 1 200px;min-width:180px;aspect-ratio:4/3;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
.coberlist{flex:1 1 180px;display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;align-content:start;font-size:13px;font-weight:700;color:#374151;}
.coberlist div{display:flex;gap:6px;align-items:center;}
.cober-note{font-size:12px;color:var(--muted);margin-top:8px;}

/* reviews */
.rating{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rating .num{font-size:30px;font-weight:900;color:var(--acc);}
.stars{color:#f59e0b;font-size:14px;letter-spacing:1px;}
.review{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
.review .av{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--muted);}
.review .rb{flex:1;min-width:0;}
.review .rn{font-weight:900;font-size:13px;display:flex;align-items:center;gap:8px;}
.review .rt{font-size:13px;color:#4b5563;margin-top:3px;line-height:1.4;}
.review .rd{font-size:11px;color:var(--muted);white-space:nowrap;}

/* faq accordion */
.faq .faq-item{border-top:1px solid var(--line);}
.faq .faq-item:first-of-type{border-top:none;}
.faq .q{
  display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;
  padding:12px 0;border:0;background:transparent;cursor:pointer;text-align:left;
  font:inherit;font-size:14px;font-weight:700;color:#374151;
}
.faq .q:hover{color:var(--acc);}
.faq .q .chev{flex:0 0 auto;color:var(--muted);transition:transform .2s ease;}
.faq .faq-item.is-open .q .chev{transform:rotate(180deg);}
.faq .faq-a{
  display:none;padding:0 0 12px;font-size:13px;font-weight:500;line-height:1.45;color:#4b5563;
}
.faq .faq-item.is-open .faq-a{display:block;}

/* trust row */
.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center;}
.trust .ti{font-size:12px;font-weight:800;color:#475569;}
.trust .ti .em{font-size:22px;color:var(--acc);display:flex;align-items:center;justify-content:center;min-height:28px;}
.trust .ti .em .pico{display:inline-flex;align-items:center;justify-content:center;width:28px;color:var(--acc);}
.trust .ti .em .pico svg{width:26px;height:26px;}

/* bottom ad */
.bottomad{
  position:relative;overflow:hidden;border-radius:20px;color:#fff;
  padding:32px 36px;min-height:128px;margin-top:36px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  box-shadow:0 10px 28px rgba(0,0,0,.14);
}
.bottomad.t-blue{background:linear-gradient(135deg,#0f172a,#1e3a8a);}
.bottomad.t-pink{background:linear-gradient(135deg,#2a0a1e,#c91f68 55%,#ec2d7a);}
[data-tema="adult"] .bottomad{
  min-height:140px;padding:36px 40px;margin-top:16px;
}
.bottomad h3{margin:0;font-size:clamp(22px,2.6vw,30px);font-weight:900;line-height:1.15;}
.bottomad p{margin:10px 0 0;font-size:15px;line-height:1.45;opacity:.94;max-width:52ch;}
.bottomad .cta{
  background:linear-gradient(90deg,var(--acc),var(--acc2));color:#fff;border-radius:999px;
  padding:14px 28px;font-weight:900;font-size:15px;flex:0 0 auto;
}
[data-tema="pro"] .bottomad .cta,[data-tema="empresa"] .bottomad .cta{background:#16a34a;}
/* ProfileLayoutProfesional — salud / cédula */
.pro-cta-cita{display:block;width:100%;margin-top:14px;padding:14px 18px;border:none;border-radius:12px;background:#16a34a;color:#fff;font-size:15px;font-weight:800;text-align:center;box-shadow:0 4px 14px rgba(22,163,74,.28);}
.pro-cta-cita:hover{filter:brightness(1.05);}
.pro-online{display:inline-flex;align-items:center;gap:6px;background:#ecfdf5;border:1px solid #a7f3d0;color:#047857;font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;margin-top:10px;}
.pro-seguros{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pro-seguro-chip{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;}
.pro-consultorio{padding:12px 0;border-bottom:1px solid var(--line);}
.pro-consultorio:last-child{border-bottom:none;padding-bottom:0;}
.pro-consultorio__h{font-size:14px;font-weight:800;color:var(--ink);}
.pro-consultorio__addr{font-size:13px;font-weight:600;color:var(--muted);margin-top:4px;line-height:1.4;}
.pro-consultorio__hrs{font-size:12px;font-weight:700;color:#047857;margin-top:6px;}
.pro-cedula-badge{display:inline-flex;align-items:center;gap:6px;background:#e0ecff;color:#1d4ed8;font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;}
.playout--dominatrix .quote{border-color:#4c1d95;background:#faf5ff;}
.vchip--vip{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;color:#92400e;}
.vchip--lgbt{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-color:#7c3aed;color:#5b21b6;}
.vchip--trans{background:linear-gradient(135deg,#cffafe,#a5f3fc);border-color:#0891b2;color:#0e7490;}
.profile-back-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 36px;border-radius:12px;border:1px solid var(--card-border);
  background:#fff;color:#1a1a1a;font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:600;text-decoration:none;box-shadow:var(--shadow);
}
[data-tema="adult"] .profile-back-btn{border-color:#f3c0d4;color:#E91E63;}
[data-tema="adult"] .profile-back-btn svg{width:18px;height:18px;flex:0 0 18px;color:#E91E63;}

[data-tema="adult"] .pcard--stats{align-self:stretch;display:flex;flex-direction:column;justify-content:center;}
[data-tema="adult"] .pcard--stats .trio3{width:100%;}
@media(max-width:900px){
  body:not(.fit)[data-vista="negocio"] .playout,
  body:not(.fit)[data-tema="adult"] .playout,
  body:not(.fit)[data-vista="adult"] .playout{
    grid-template-columns:1fr !important;
  }
  body:not(.fit)[data-tema="adult"] .playout__col--izq,
  body:not(.fit)[data-vista="adult"] .playout__col--izq,
  body:not(.fit)[data-tema="adult"] .playout__col--der,
  body:not(.fit)[data-vista="adult"] .playout__col--der{
    width:100%;
    max-width:100%;
  }
  /* Brand + nav en una sola fila compacta */
  body:not(.fit) .pbrand{
    flex-wrap:nowrap;
    gap:10px;
    padding:10px 12px;
    align-items:center;
  }
  body:not(.fit) .pbrand__name{font-size:22px;}
  body:not(.fit) .pbrand__tag{font-size:10px;}
  body:not(.fit) .pnav{
    margin-left:auto;
    width:auto;
    order:0;
    flex-wrap:nowrap;
    gap:8px;
    overflow-x:auto;
  }
  body:not(.fit) .pnav__label{display:none;}
  body:not(.fit) .profile-toolbar{
    grid-template-columns:1fr;
    gap:10px;
  }
  body:not(.fit) .profile-toolbar-left,
  body:not(.fit) .profile-toolbar-center,
  body:not(.fit) .profile-toolbar-right{
    justify-self:stretch;
  }
  body:not(.fit) .profile-toolbar-center{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
  }
  body:not(.fit) .profile-toolbar-right{justify-content:flex-start;flex-wrap:wrap;}
  body:not(.fit)[data-tema="adult"] .gal__main{
    max-height:min(62vh,420px);
    aspect-ratio:3/4;
  }
  body:not(.fit)[data-tema="adult"] .playout__tri{
    grid-template-columns:1fr;
  }
}
@media(max-width:520px){
  body:not(.fit)[data-tema="adult"] .feat-line{flex-wrap:wrap !important;}
  body:not(.fit)[data-tema="adult"] .contact{grid-template-columns:repeat(2,minmax(0,1fr));}
  body:not(.fit) .profile-toolbar-center{grid-template-columns:1fr;}
}
@media(max-width:820px){
  .sobre-card__grid{grid-template-columns:1fr;gap:24px;}
  .sobre-sil{max-width:220px;margin:8px auto 0;}
  .pgrid{grid-template-columns:1fr;}
  .stats,.trust{grid-template-columns:repeat(2,1fr);}
  .gal__thumbs{grid-template-columns:repeat(5,1fr);}
}
@media(max-width:480px){
  .contact{grid-template-columns:repeat(2,1fr);}
  .svc{grid-template-columns:1fr;}
}

/* ===== Modo "Vista completa": página escritorio entera en el panel del IDE ===== */
body.fit{
  position:fixed;inset:0;width:100%;height:100%;overflow:hidden;margin:0;
  display:flex;flex-direction:column;
}
html.fit{overflow:hidden;}
body.fit .switcher{flex:0 0 auto;padding:6px 12px;gap:6px;position:relative;z-index:60;}
body.fit .switcher button{padding:5px 11px;font-size:12px;}
body.fit #fitOuter{
  flex:1 1 0;min-height:0;width:100%;
  overflow-x:hidden;overflow-y:auto;position:relative;
  -webkit-overflow-scrolling:touch;
}
body.fit #fitSpacer{position:relative;margin:0;width:100%;min-height:0;}
body.fit #fitRoot{
  position:absolute;top:0;left:0;
  width:1100px;max-width:none;margin:0;
  transform-origin:top left;
}
body.fit .wrap{width:100%;max-width:1100px;margin:0;padding:16px 16px 56px;box-sizing:border-box;}
body.fit .pgrid{grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;}
body.fit .pb{flex-wrap:nowrap !important;gap:14px !important;margin-bottom:14px !important;}
body.fit .pb > a,body.fit .pb > .pb-slot:not(.pb-slot--bottom){flex:1 1 0 !important;min-height:158px !important;}
body.fit .pb > .pb-slot:not(.pb-slot--bottom) .pb-slot__stage,
body.fit .pb > .pb-slot:not(.pb-slot--bottom) .pb-slot__slide,
body.fit .pb > .pb-slot:not(.pb-slot--bottom) .pb-slot__slide img{min-height:158px !important;}
body.fit .pb--center,body.fit .pb > .pb-slot.pb--center{flex:1.55 1 0 !important;}
body.fit .pnav{width:auto !important;order:0 !important;overflow:visible !important;}
body.fit .stats,body.fit .trust{grid-template-columns:repeat(4,1fr) !important;}
body.fit [data-tema="adult"] .playout{grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;}
body.fit [data-tema="adult"] .playout__tri{display:grid !important;grid-template-columns:repeat(3,minmax(0,1fr)) !important;}
body.fit [data-tema="adult"] .feat-line{flex-wrap:wrap !important;}
body.fit [data-tema="adult"] .contact{grid-template-columns:repeat(3,minmax(0,1fr)) !important;}
body.fit [data-tema="adult"] .feat-line--contact{flex-wrap:wrap !important;justify-content:flex-start !important;}
body.fit .sobre-card__grid{grid-template-columns:minmax(0,1fr) minmax(148px,34%) !important;gap:20px 28px !important;}
body.fit .sobre-sil{max-width:none !important;margin:0 !important;}
body.fit .svc{grid-template-columns:1fr 1fr !important;}
body.fit .pubstrip{grid-template-columns:1fr 1fr !important;}
body.fit [data-vista="negocio"] .playout{grid-template-columns:minmax(0,1.58fr) minmax(0,1fr) !important;}
body.fit [data-vista="negocio"] .gal__main{aspect-ratio:3/4;}
body.fit [data-vista="negocio"] .gal__main img,
body.fit [data-vista="negocio"] .gal__main .ch-foto-ph{object-fit:cover;object-position:center top;}
body.fit [data-vista="negocio"] .act-negocio__main{grid-template-columns:minmax(0,.92fr) minmax(0,1.18fr) !important;}
body.fit [data-vista="negocio"] .live-neg__inner{grid-template-columns:minmax(0,1fr) minmax(0,1.15fr) !important;}
body.fit [data-vista="negocio"] .negocio-amen{grid-template-columns:repeat(4,minmax(0,1fr)) !important;}
body.fit [data-vista="negocio"] .negocio-svc-grid,
body.fit [data-vista="negocio"] .negocio-svc-2col{grid-template-columns:1fr 1fr !important;}
body.fit [data-vista="negocio"] .negocio-sobre-stats{grid-template-columns:repeat(4,minmax(0,1fr)) !important;}
body.fit [data-vista="negocio"] .playout__der-bottom .negocio-sobre--der .negocio-sobre-stats{
  grid-template-columns:repeat(4,minmax(0,1fr)) !important;
}
body.fit [data-vista="negocio"] .pcard--negocio-contact .contact{grid-template-columns:repeat(4,minmax(0,1fr)) !important;}
body.fit [data-vista="negocio"] .negocio-ubic__body{flex-direction:row !important;align-items:stretch !important;}
body.fit [data-vista="negocio"] .negocio-ubic__map{flex:0 0 46% !important;aspect-ratio:1/1 !important;width:auto !important;}
body.fit [data-vista="negocio"] .negocio-tarifa{grid-template-columns:minmax(0,.95fr) minmax(0,1.1fr) minmax(0,.75fr) minmax(0,.9fr) !important;}
body.fit [data-vista="negocio"] .negocio-tarifa--main{grid-template-columns:minmax(0,1fr) minmax(0,1.15fr) minmax(0,.85fr) !important;}
body.fit [data-vista="negocio"] .negocio-promo-row{grid-template-columns:minmax(0,1.58fr) minmax(0,1fr) !important;}
body.fit [data-vista="negocio"] .negocio-ficha__row{grid-template-columns:22px minmax(0,42%) minmax(0,58%) !important;}
body.fit [data-vista="negocio"] .negocio-amen__item{font-size:10px;gap:4px;}
body.fit [data-vista="negocio"] .negocio-pie-card,
body.fit [data-vista="adult"] .negocio-pie-card{
  grid-template-columns:1fr !important;padding:8px 14px 0 !important;
}
body.fit [data-vista="negocio"] .playout__col--der .negocio-pie-wrap--der .negocio-pie-card,
body.fit [data-vista="adult"] .playout__col--der .negocio-pie-wrap--der .negocio-pie-card{
  width:100% !important;max-width:100% !important;
}
body.fit [data-vista="negocio"] .negocio-pie-card__ubic .negocio-ubic__body--pie,
body.fit [data-vista="adult"] .negocio-pie-card__ubic .negocio-ubic__body--pie{
  position:relative;display:block !important;
}
body.fit [data-vista="negocio"] .negocio-pie-card__ubic .negocio-ubic__map,
body.fit [data-vista="adult"] .negocio-pie-card__ubic .negocio-ubic__map{
  position:absolute;left:0;top:0;
  width:44% !important;max-width:44% !important;height:100% !important;
  aspect-ratio:unset !important;
}
body.fit [data-vista="negocio"] .negocio-pie-card__ubic .negocio-ubic__side,
body.fit [data-vista="adult"] .negocio-pie-card__ubic .negocio-ubic__side{
  margin-left:calc(44% + 8px) !important;min-width:0;
}
body.fit [data-vista="negocio"] .negocio-info-grid{grid-template-columns:1fr 1fr !important;}
#fitOuter{width:100%;min-height:0;box-sizing:border-box;}
body:not(.fit) #fitOuter{min-height:calc(100vh - 52px);}
.toolbar-action--fav.res-fav{

(function () {
  try {
    var p = new URLSearchParams(location.search);
    var cat = p.get('categoria') || p.get('subcategoria') || p.get('sector') || '';
    if (!cat) return;
    var k = cat.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    if (k.indexOf('restaur') >= 0 || k.indexOf('marisquer') >= 0 || k.indexOf('taquer') >= 0 || k.indexOf('gastronom') >= 0) s = 'restaurantes';
    else if (k.indexOf('medic') >= 0 || k.indexOf('doctor') >= 0 || k.indexOf('enfermer') >= 0 || k.indexOf('dent') >= 0 || k.indexOf('salud') >= 0) s = 'salud';
    /* Bienestar holístico ANTES de tienda→comercio / spa adultos */
    else if (
      k.indexOf('bienestar') >= 0 || k.indexOf('yoga') >= 0 || k.indexOf('pilates') >= 0 ||
      k.indexOf('reiki') >= 0 || k.indexOf('tarot') >= 0 || k.indexOf('temazcal') >= 0 ||
      k.indexOf('holistic') >= 0 || k.indexOf('espiritual') >= 0 || k.indexOf('esoteric') >= 0 ||
      k.indexOf('inciens') >= 0 || k.indexOf('aceite') >= 0 || k.indexOf('vela') >= 0 ||
      k.indexOf('herbol') >= 0 || k.indexOf('meditacion') >= 0 || k.indexOf('breathwork') >= 0 ||
      k.indexOf('terapias-holistic') >= 0 || k.indexOf('terapias-energet') >= 0 ||
      k.indexOf('terapias-alternat') >= 0 || k.indexOf('ayahuasca') >= 0 || k.indexOf('chaman') >= 0 ||
      (k.indexOf('masaje') >= 0 && k.indexOf('erot') < 0 && k.indexOf('holistic') >= 0)
    ) s = 'bienestar';
    else if (k.indexOf('mecan') >= 0 || k.indexOf('vulcaniz') >= 0 || k.indexOf('automo') >= 0) s = 'automotriz';
    else if (k.indexOf('abogad') >= 0 || k.indexOf('contador') >= 0 || k.indexOf('profesion') >= 0) s = 'profesionales';
    else if (k.indexOf('plomer') >= 0 || k.indexOf('limpieza') >= 0 || k.indexOf('hogar') >= 0) s = 'hogar';
    else if (k.indexOf('tienda') >= 0 || k.indexOf('comercio') >= 0) s = 'comercio';
    else if (k.indexOf('veterin') >= 0 || k.indexOf('mascot') >= 0 || k.indexOf('pet') >= 0) s = 'mascotas';
    else if (k.indexOf('evento') >= 0 || k.indexOf('banquet') >= 0 || k.indexOf('dj') >= 0) s = 'eventos';
    else if (k.indexOf('escuela') >= 0 || k.indexOf('tutor') >= 0 || k.indexOf('educac') >= 0) s = 'educacion';
    else if (k.indexOf('tecno') >= 0 || k.indexOf('comput') >= 0 || k.indexOf('software') >= 0) s = 'tecnologia';
    else if (k.indexOf('mudanz') >= 0 || k.indexOf('flete') >= 0 || k.indexOf('transport') >= 0) s = 'transporte';
    else if (k.indexOf('industr') >= 0 || k.indexOf('maquin') >= 0) s = 'industria';
    else if (k.indexOf('inmobil') >= 0 || k.indexOf('bienes') >= 0 || (k.indexOf('casa') >= 0 && k.indexOf('escort') < 0)) s = 'bienes-raices';
    document.body.setAttribute('data-sector', s);
    var lgbtCanon = [
      'escort gay', 'antro restaurant bar lgbt', 'trans', 'femboy',
      'lesbians', 'tom boy', 'tom fem'
    ];
    var lgbtKey = String(cat || '')
      .trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();
    for (var i = 0; i < lgbtCanon.length; i++) {
      if (lgbtKey === lgbtCanon[i]) {
        document.body.setAttribute('data-subtema', 'lgbt');
        break;
      }
    }
  } catch (e) { /* tema temprano opcional */ }
})();

function thumbs(n, seed, tipo, galeria, u, maxExtras){
  var out="";
  var limit=maxExtras!=null?Math.max(0,maxExtras|0):null;
  function lockBadge(more){
    return more>0?'<span class="t__more">+'+more+'</span>':"";
  }
  if(galeria && galeria.length){
    var extrasAll = galeria.slice(1);                 // la primera es la principal
    var extras = limit!=null?extrasAll.slice(0,limit):extrasAll;
    var shown = extras.length;
    var moreCount=Math.max(0,(typeof n==="number"&&n>0?n:galeria.length)-1-shown);
    for(var k=0;k<extras.length;k++){
      var moreOnLast=(limit!=null && k===extras.length-1)?lockBadge(moreCount):"";
      out += '<div class="t'+(moreOnLast?" t--has-more":"")+'">'+imgTag(extras[k])+moreOnLast+'</div>';
    }
    if(limit==null && moreCount>0) out += '<div class="t lock">🔒<span>+'+moreCount+'</span></div>';
    return out;
  }
  if(u && u.__previewRegistro) return "";
  var vis=limit!=null?Math.min(limit,n):Math.min(4,n);
  var moreDemo=Math.max(0,n-vis);
  for(var i=0;i<vis;i++){
    var moreDemoOnLast=(limit!=null && i===vis-1)?lockBadge(moreDemo):"";
    out += '<div class="t'+(moreDemoOnLast?" t--has-more":"")+'">'+foto(seed+"-"+i, tipo)+moreDemoOnLast+'</div>';
  }
  if(limit==null && n>vis) out += '<div class="t lock">🔒<span>+'+(n-vis)+'</span></div>';
  return out;
}

var GRAT_COMISION = 0.20;
var _gratState = {perfil:"", nombre:"", source:"", amount:100};

function gratificarBtnHTML(u, source){
  u = u || {};
  var pid = String(u.__id || u.uid || u.nombre || "").trim();
  return '<button type="button" class="feed-grat-btn" data-grat-perfil="'+safe(pid)+'" data-grat-nombre="'+safe(u.nombre||"")+'" data-grat-source="'+safe(source)+'">'+
    '<span class="feed-grat-btn__fx" aria-hidden="true">'+
      '<span class="feed-grat-btn__spark feed-grat-btn__spark--1"></span>'+
      '<span class="feed-grat-btn__spark feed-grat-btn__spark--2"></span>'+

      '<span class="feed-grat-btn__spark feed-grat-btn__spark--4"></span>'+

    '</span>'+
    '<span class="feed-grat-btn__coin">'+S.chCoin({size:"sm"})+'</span>'+
    '<span class="feed-grat-btn__label">Donar / Gratificar</span></button>';
}
function gratSourceLabel(source){
  if(source==="live") return "En vivo / Transmisión";
  if(source==="actividad") return "Actividad reciente";
  return "Perfil";
}
function formatGratMXN(n){
  return "$"+Number(n).toLocaleString("es-MX")+" MXN";
}
function updateGratSplit(){
  var amt=_gratState.amount||0;
  var fee=Math.round(amt*GRAT_COMISION);
  var net=amt-fee;
  var feeEl=document.getElementById("gratFee");
  var netEl=document.getElementById("gratNet");
  var pctEl=document.getElementById("gratPct");
  if(feeEl) feeEl.textContent=formatGratMXN(fee);
  if(netEl) netEl.textContent=formatGratMXN(net);
  if(pctEl) pctEl.textContent=String(Math.round(GRAT_COMISION*100));
}
function openGratificarModal(perfilId, source, nombreDisplay){
  if(window.CarihubDirectoryMode && CarihubDirectoryMode.isDirectoryMode()) return;
  _gratState.perfil=perfilId||"";
  _gratState.nombre=nombreDisplay||perfilId||"";
  _gratState.source=source||"perfil";
  _gratState.amount=100;
  var modal=document.getElementById("gratModal");
  var ctx=document.getElementById("gratModalCtx");
  var title=document.getElementById("gratModalTitle");
  if(title) title.textContent="Gratificar a "+(_gratState.nombre||"perfil");
  if(ctx) ctx.textContent=gratSourceLabel(_gratState.source);
  document.querySelectorAll("#gratAmounts button").forEach(function(b){
    b.classList.toggle("is-on", Number(b.getAttribute("data-amt"))===_gratState.amount);
  });
  updateGratSplit();
  if(modal){
    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden","false");
  }
}
function closeGratificarModal(){
  var modal=document.getElementById("gratModal");
  if(modal){
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden","true");
  }
}
function pickGratAmount(n){
  _gratState.amount=n;
  document.querySelectorAll("#gratAmounts button").forEach(function(b){
    b.classList.toggle("is-on", Number(b.getAttribute("data-amt"))===n);
  });
  updateGratSplit();
}
function confirmarGratificacion(){
  if(window.CariHubPerfilPublico&&CariHubPerfilPublico.initFirebaseIfNeeded){
    CariHubPerfilPublico.initFirebaseIfNeeded();
  }
  if(window.CariHubPerfilGratificar&&CariHubPerfilGratificar.confirmar){
    var r=CariHubPerfilGratificar.confirmar(_gratState);
    if(r==="done") closeGratificarModal();
    return;
  }
  var fee=Math.round(_gratState.amount*GRAT_COMISION);
  var net=_gratState.amount-fee;
  alert(
    "Vista previa — Gratificación\n\n"+
    "Perfil: "+_gratState.perfil+"\n"+
    "Desde: "+gratSourceLabel(_gratState.source)+"\n"+
    "Monto: "+formatGratMXN(_gratState.amount)+"\n"+
    "Comisión plataforma ("+Math.round(GRAT_COMISION*100)+"%): "+formatGratMXN(fee)+"\n"+
    "Transferencia al perfil: "+formatGratMXN(net)+"\n\n"+
    "Siguiente paso: enlazar cuenta de pago del visitante."
  );
  closeGratificarModal();
}
document.addEventListener("click", function(e){
  var btn=e.target.closest(".feed-grat-btn");
  if(btn){
    openGratificarModal(
      btn.getAttribute("data-grat-perfil"),
      btn.getAttribute("data-grat-source"),
      btn.getAttribute("data-grat-nombre")
    );
    return;
  }
  if(e.target.id==="gratModal") closeGratificarModal();
});

function goActNegocioSlide(wrap,idx){
  if(!wrap) return 0;
  var posts=wrap.querySelectorAll("[data-act-neg-post]");
  var imgs=wrap.querySelectorAll("[data-act-neg-img]");
  var dots=wrap.querySelectorAll(".act-negocio__dot");
  if(!posts.length) return 0;
  var n=posts.length;
  var i=((idx%n)+n)%n;
  posts.forEach(function(el,j){
    el.style.display=j===i?"":"none";
  });
  imgs.forEach(function(el,j){
    el.classList.toggle("is-active",j===i);
    el.setAttribute("aria-hidden",j===i?"false":"true");
  });
  dots.forEach(function(dot,j){ dot.classList.toggle("is-on",j===i); });
  return i;
}
var actNegocioTimers=[];
function stopActividadNegocioRotation(){
  actNegocioTimers.forEach(function(t){ clearInterval(t); });
  actNegocioTimers=[];
}
function startActividadNegocioRotation(){
  stopActividadNegocioRotation();
  document.querySelectorAll("[data-act-neg-wrap]").forEach(function(wrap){
    var posts=wrap.querySelectorAll("[data-act-neg-post]");
    if(posts.length<2) return;
    var state={idx:0};
    wrap.querySelectorAll(".act-negocio__dot").forEach(function(dot){
      dot.addEventListener("click",function(){
        state.idx=goActNegocioSlide(wrap,Number(dot.getAttribute("data-act-neg-dot"))||0);
      });
    });
    var loop=setInterval(function(){
      state.idx=goActNegocioSlide(wrap,state.idx+1);
    },5200);
    actNegocioTimers.push(loop);
  });
}

function pbRotSlot(cfg){
  if(!cfg.noMixGeneral&&window.CariHubBannerGeneral&&window.CariHubBannerGeneral.mixSlideObjects&&cfg.slides){
    cfg=Object.assign({},cfg,{slides:window.CariHubBannerGeneral.mixSlideObjects(cfg.slides)});
  }
  var slides=cfg.slides||[];
  var body="";
  for(var i=0;i<slides.length;i++) body+=pbRenderSlide(slides[i],i===0);
  var cls="pb-slot"+(cfg.center?" pb--center":"")+(cfg.bottom?" pb-slot--bottom":"");
  var slotId=cfg.slotId||"";
  if(!slotId&&cfg.href){
    try{
      var m=String(cfg.href).match(/[?&]slot=([^&]+)/);
      if(m) slotId=decodeURIComponent(m[1]);
    }catch(eSlot){ slotId=""; }
  }

  var dataSlot=(slotId&&String(slotId).indexOf("perfil_")==0)

  return '<a class="'+cls+'" href="'+safe(cfg.href||"#")+'"'+dataSlot+' aria-label="'+safe(cfg.label||"Espacio publicitario")+'">'+
    '<div class="pb-slot__stage" data-pb-stage>'+body+pbSlideDots(slides.length)+'</div></a>';

function goPbSlide(stage,nextIdx){
  if(!stage) return 0;
  var slides=stage.querySelectorAll(".pb-slot__slide");
  var dots=stage.querySelectorAll(".pb-slot__dot");
  if(!slides.length) return 0;
  var idx=((nextIdx%slides.length)+slides.length)%slides.length;
  slides.forEach(function(sl,i){
    var on=i===idx;
    sl.classList.toggle("is-active",on);
    sl.setAttribute("aria-hidden",on?"false":"true");
  });
  dots.forEach(function(dot,i){ dot.classList.toggle("is-on",i===idx); });
  return idx;
}
var pbRotateTimers=[];
function stopPbBannerRotation(){
  pbRotateTimers.forEach(function(t){ clearInterval(t); clearTimeout(t); });
  pbRotateTimers=[];
}
function startPbBannerRotation(){
  stopPbBannerRotation();
  document.querySelectorAll("[data-pb-stage]").forEach(function(stage,slot){
    var slides=stage.querySelectorAll(".pb-slot__slide");
    if(slides.length<2) return;
    var state={idx:0};
    var every=PB_ROTATE_MS[slot]||5200;
    var wait=PB_ROTATE_DELAY[slot]||0;
    var kick=setTimeout(function(){
      state.idx=goPbSlide(stage,state.idx+1);
      var loop=setInterval(function(){ state.idx=goPbSlide(stage,state.idx+1); },every);
      pbRotateTimers.push(loop);
    },wait);
    pbRotateTimers.push(kick);
  });
  if(window.CariHubBannerPerfil&&CariHubBannerPerfil.mount) CariHubBannerPerfil.mount();
}

function bindAdultoGaleria(root){
  var scope=root||document;
  var gal=scope.querySelector(".playout .pcard.gal.gal--adulto");
  if(!gal||gal.getAttribute("data-gal-bound")==="1") return;
  gal.setAttribute("data-gal-bound","1");
  var pool=[];
  try{
    var raw=gal.getAttribute("data-gal-pool");
    if(raw) pool=JSON.parse(decodeURIComponent(raw))||[];
  }catch(eP){ pool=[]; }
  if(!Array.isArray(pool)) pool=[];
  var visibleSlots=parseInt(gal.getAttribute("data-gal-visible")||"3",10)||3;
  var carouselMin=Math.max(2, visibleSlots-1);
  var carouselIdx=carouselMin;
  var bottom=gal.querySelector(".gal__shot--carousel");
  function setBottomSrc(idx){
    if(!bottom||!pool.length) return;
    carouselIdx=idx;
    var img=bottom.querySelector("img.ch-foto-ph");
    if(img&&pool[idx]) img.src=pool[idx];
    bottom.setAttribute("data-gal-idx",String(idx));
  }
  function stepCarousel(delta){
    if(pool.length<=visibleSlots) return;
    var min=carouselMin,max=pool.length-1;
    var next=carouselIdx+delta;
    if(next>max) next=min;
    if(next<min) next=max;
    setBottomSrc(next);
  }
  gal.querySelectorAll(".gal__arrow--bottom").forEach(function(btn){
    btn.addEventListener("click",function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      stepCarousel(btn.classList.contains("l")?-1:1);
    });
  });
  function shotSrc(shot){
    if(!shot) return "";
    var idx=parseInt(shot.getAttribute("data-gal-idx")||"",10);
    if(pool.length&&isFinite(idx)&&pool[idx]) return pool[idx];
    var img=shot.querySelector("img");
    return img&&img.src?img.src:"";
  }
  function onShotActivate(shot){
    var src=shotSrc(shot);
    if(src) openAdultoGaleriaLightbox(src);
  }
  gal.querySelectorAll(".gal__shot").forEach(function(shot){
    shot.addEventListener("click",function(ev){
      if(ev.target.closest&&ev.target.closest(".gal__arrow")) return;
      onShotActivate(shot);
    });
    shot.addEventListener("keydown",function(ev){
      if(ev.key==="Enter"||ev.key===" "){
        ev.preventDefault();
        onShotActivate(shot);
      }
    });
  });
}

/**
 * Owner: estirar Ubicación hacia abajo hasta que Servicios/No realiza topan el banner.
 * Detecta 2 columnas por geometría (body.fit puede ser 2 col con viewport <901px).
 */
function adultoPlayoutEsDosColumnas(left, der){
  if(!left||!der) return false;
  var a=left.getBoundingClientRect();
  var b=der.getBoundingClientRect();
  if(!(a.width>40&&b.width>40)) return false;
  return (b.left>=a.left+a.width*0.4)&&Math.abs(a.top-b.top)<120;
}
function syncAdultoUbicacionStretch(root){
  var scope=root||document;
  var playout=scope.querySelector(".playout");
  if(!playout) return;
  var left=playout.querySelector(".playout__col--izq");
  var der=playout.querySelector(".playout__col--der");
  var ubic=null;
  if(der){
    for(var i=0;i<der.children.length;i++){
      if(der.children[i].classList&&der.children[i].classList.contains("negocio-pie-wrap")){
        ubic=der.children[i];
        break;
      }
    }
  }
  if(!left||!der||!ubic) return;

  /* Nunca tocar estilos de Contacto ni otras tarjetas: solo minHeight de Ubicación. */
  der.style.minHeight="";
  if(!adultoPlayoutEsDosColumnas(left, der)){
    ubic.style.minHeight="";
    return;
  }

  ubic.style.minHeight="";
  void der.offsetHeight;

  var leftH=Math.max(left.offsetHeight||0, left.scrollHeight||0);
  if(leftH<=0) return;

  var gapStr=getComputedStyle(der).rowGap||getComputedStyle(der).gap||"14px";
  var gap=parseFloat(String(gapStr).split(" ")[0])||14;
  var used=0;
  var n=der.children.length;
  for(var k=0;k<n;k++){
    var ch=der.children[k];
    if(ch===ubic) continue;
    used+=Math.max(ch.offsetHeight||0, ch.scrollHeight||0);
  }
  var gaps=Math.max(0,n-1)*gap;
  var avail=Math.floor(leftH-used-gaps);
  if(avail>0){
    ubic.style.minHeight=avail+"px";
  }
}
function bindAdultoUbicacionStretch(root){
  var scope=root||document;
  var playout=scope.querySelector(".playout");
  if(!playout) return;
  var left=playout.querySelector(".playout__col--izq");
  if(!left) return;
  if(window.__ubicStretchRO){
    try{ window.__ubicStretchRO.disconnect(); }catch(eRo){}
    window.__ubicStretchRO=null;
  }
  var timer=null;
  function schedule(){
    if(timer) clearTimeout(timer);
    timer=setTimeout(function(){ syncAdultoUbicacionStretch(scope); }, 40);
  }
  if(window.ResizeObserver){
    window.__ubicStretchRO=new ResizeObserver(schedule);
    /* Solo observar galería izq — observar der provoca bucles y puede comprimir Contacto. */
    window.__ubicStretchRO.observe(left);
  }
  left.querySelectorAll("img").forEach(function(img){
    if(!img.complete){
      img.addEventListener("load", schedule, {once:true});
      img.addEventListener("error", schedule, {once:true});
    }
  });
  schedule();
  setTimeout(schedule, 200);
  setTimeout(schedule, 700);
  setTimeout(schedule, 1400);
}

function bindProFaqAccordion(root){
  var scope=root||document;
  var cards=scope.querySelectorAll('[data-faq-accordion="1"]');
  for(var c=0;c<cards.length;c++){
    var card=cards[c];
    if(card.getAttribute("data-faq-bound")==="1") continue;
    card.setAttribute("data-faq-bound","1");
    card.addEventListener("click",function(ev){
      var host=ev.currentTarget;
      var btn=ev.target&&ev.target.closest?ev.target.closest("button.q"):null;
      if(!btn||!host.contains(btn)) return;
      var item=btn.parentNode;
      if(!item||!item.classList.contains("faq-item")) return;
      var open=item.classList.contains("is-open");
      var siblings=host.querySelectorAll(".faq-item.is-open");
      for(var i=0;i<siblings.length;i++){
        siblings[i].classList.remove("is-open");
        var sb=siblings[i].querySelector("button.q");
        var sa=siblings[i].querySelector(".faq-a");
        if(sb) sb.setAttribute("aria-expanded","false");
        if(sa) sa.hidden=true;
      }
      if(!open){
        item.classList.add("is-open");
        btn.setAttribute("aria-expanded","true");
        var ans=item.querySelector(".faq-a");
        if(ans) ans.hidden=false;
      }
    });
  }
}

      if(resolved.perfil.sectorId==="bienestar"||(window.CariHubBienestarSectorRender&&CariHubBienestarSectorRender.isBienestarSectorPerfil&&CariHubBienestarSectorRender.isBienestarSectorPerfil(resolved.perfil))){
        var vBw=resolverVistaPerfil(resolved.perfil,q);
        if(vBw&&vBw!=="negocio"&&vBw!=="hotelMotel"&&vBw!=="spa"&&vBw!=="masajesLocal"){
          resolved.vista=vBw;
        }else if(resolved.perfil.__vista==="empresa"||resolved.perfil.__vista==="pro"){
          resolved.vista=resolved.perfil.__vista;
        }else{
          resolved.vista=(resolved.perfil.tipoPerfil==="negocio"||resolved.perfil.deltaPack==="D")?"empresa":"pro";
        }
      }
      if(resolved.perfil.__id==="preview-registro"||resolved.perfil.__previewRegistro){
        aplicarPerfilDesdeRegistro(resolved.vista,resolved.perfil);
      }else if(resolved.perfil.__hydratedFromBloques){
        aplicarPerfilDesdeRegistro(resolved.vista,resolved.perfil);
        if(DEMO[resolved.vista]){
          DEMO[resolved.vista].__demo=false;
          DEMO[resolved.vista].__registrado=true;
          DEMO[resolved.vista].__previewRegistro=false;
          DEMO[resolved.vista].__id=resolved.perfil.__id||DEMO[resolved.vista].__id;
          DEMO[resolved.vista].uid=resolved.perfil.uid||DEMO[resolved.vista].uid;
        }
      }else{
        aplicarPerfilResultadosEnDemo(resolved.vista,resolved.perfil);
      }
    }
    setVista(resolved.vista);
  }
  /* Draft de registro SOLO cuando la entrada es explícitamente registro.
     Nunca secuestrar navegación Results→Perfil ni IDs demo. */
  if(fromRegistro&&window.CariHubPerfilPublico&&CariHubPerfilPublico.leerPreviewRegistro){
    var draftReg=CariHubPerfilPublico.leerPreviewRegistro();
    var draftOk=draftReg&&draftReg.perfil&&(draftReg.perfil.__previewRegistro||draftReg.perfil.__id==="preview-registro");
    if(draftOk){
      var vistaDraft=draftReg.vista||q.vista||resolverVistaPerfil(draftReg.perfil,q)||"adult";
      pintar({vista:vistaDraft,perfil:draftReg.perfil});
      return;
    }
  }
  if(q.id&&window.CariHubPerfilPublico&&CariHubPerfilPublico.esIdDemo&&!CariHubPerfilPublico.esIdDemo(q.id)){
    if(CariHubPerfilPublico.initFirebaseIfNeeded) CariHubPerfilPublico.initFirebaseIfNeeded();
    CariHubPerfilPublico.cargarPerfilFirestore(q.id,q).then(function(u){
      if(u){
        pintar({vista:resolverVistaPerfil(u,q),perfil:u});
      }else if(fromResultados||q.id){
        showUnresolvedPerfilError(q);
      }else{
        pintar(resolverPerfilDesdeQuery(q));
      }
    });
    return;
  }
  var resolved=resolverPerfilDesdeQuery(q);
  if(q.id&&!resolved.perfil){
    showUnresolvedPerfilError(q);
    return;
  }
  /* Sin id: draft huérfano solo si NO venimos de resultados */
  if(!q.id&&!fromResultados&&window.CariHubPerfilPublico&&CariHubPerfilPublico.leerPreviewRegistro){
    var draftOrphan=CariHubPerfilPublico.leerPreviewRegistro();
    if(draftOrphan&&draftOrphan.perfil&&(draftOrphan.perfil.__previewRegistro||draftOrphan.perfil.__id==="preview-registro")){
      pintar({vista:draftOrphan.vista||"adult",perfil:draftOrphan.perfil});
      return;
    }
  }
  pintar(resolved);
}

function setVista(tipo){

    var el=document.getElementById("b"+k);
    if(el) el.classList.toggle("is-on", map[k]===tipo);
  });
  var sel=document.getElementById("negocioTipo");
  if(sel) sel.style.display=tipo==="negocio"?"inline-block":"none";
  if(tipo==="negocio"){
    var packNeg=(sel&&sel.value)||"hospedaje";
    var qNeg=queryPerfilPreview?queryPerfilPreview():{};

     (wa/tg/ig/…). Perfiles hidratados/registrados conservan __demo=false + datos reales. */
  if(u&&!u.__registrado&&!u.__hydratedFromBloques){

    u.galeria=u.galeria.map(function(s){ return demoAssetDesdeResultados(s)||""; }).filter(Boolean);
  }
  if(u&&u.actividadAvatar){
    u.actividadAvatar=demoAssetDesdeResultados(u.actividadAvatar)||u.actividadAvatar;

  window.__perfilActual=u;

  }catch(eTema){ /* tema sector opcional */ }
  var inner;
  if(esCari) inner=(tipo==="pareja"?renderParejaLifestyle(u):renderPerfilCariñosas(u, tipo));
  else if(tipo==="medico") inner=renderMedicoProfesional(u);
  else inner=renderProEmpresa(u, tipo==="empresa");
  document.getElementById("wrap").innerHTML = shell(tipo, inner, u);
  syncPerfilResWrapAfterShell();
  if(window.CariHubPublicRenderLite&&CariHubPublicRenderLite.applyPublicProfilePresentation){

var FIT_DESIGN_W = 980;
var FIT_DESIGN_W_EMBED = 720;
var FIT_DESIGN_W_RES = 1120;
function readFitDesignW(availW){
  availW=availW||800;
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    if(window.__dashEmbedDesignW&&window.__dashEmbedDesignW>0){
      return Math.max(240,Math.min(window.__dashEmbedDesignW,FIT_DESIGN_W_EMBED));
    }
    if(availW<400){
      return Math.max(260,Math.min(340,Math.round(availW*1.65)));
    }
    return FIT_DESIGN_W_EMBED;
  }
  if(document.body.classList.contains("perfil-embed-dashboard")) return FIT_DESIGN_W_EMBED;
  /* Chrome Results pegado: mismo lienzo 1120 que resultados.html */
  if(document.querySelector(".wrap.resultados-wrap .res-shell")) return FIT_DESIGN_W_RES;
  return FIT_DESIGN_W;
}
function recortarEmbedDashboard(scale){
  if(!document.body.classList.contains("perfil-embed-dashboard") &&
     !document.body.classList.contains("perfil-embed-dashboard-inicio")) return null;
  var playout=document.querySelector(".playout");
  if(!playout) return null;
  var wrap=document.getElementById("wrap");
  var base=wrap?wrap.offsetTop:0;
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    var top=base+playout.offsetTop;
    var end=base+playout.offsetTop+playout.offsetHeight;
    return {height:Math.max(220,end-top+12),offset:top};
  }
  var gal=playout.querySelector(".gal");
  var anchor=null;
  if(!anchor){
    anchor=playout.querySelector(".negocio-pie-card__ubic, .playout__izq-stack .negocio-pie-wrap--izq, .playout__col--izq .negocio-ubic");
  }
  var top=base+playout.offsetTop+(gal?gal.offsetTop:0);
  var end=anchor?(base+playout.offsetTop+anchor.offsetTop+anchor.offsetHeight):(base+playout.offsetTop+playout.offsetHeight);
  return {height:Math.max(140,end-top+10),offset:top};

function measureFitArea(outer){
  var rect = outer.getBoundingClientRect();
  var vw = document.documentElement.clientWidth || window.innerWidth || 800;
  var availW = Math.max(280, outer.clientWidth || rect.width || vw);
  return { availW: availW };
}
function applyFit(){
  var outer = document.getElementById("fitOuter");
  var spacer = document.getElementById("fitSpacer");
  var root = document.getElementById("fitRoot");
  var hint = document.getElementById("fitHint");
  if(!outer || !spacer || !root) return;
  var shell = document.querySelector(".wrap.resultados-wrap .res-shell");
  var isResChromeFit = !!(shell && document.body.classList.contains("fit") &&
    !document.body.classList.contains("perfil-embed-dashboard") &&
    !document.body.classList.contains("perfil-embed-dashboard-inicio"));
  if(!document.body.classList.contains("fit")){
    document.documentElement.classList.remove("fit");
    root.style.cssText = "";
    spacer.style.cssText = "";
    if(shell) shell.style.height = "";
    outer.scrollTop = 0;
    if(hint) hint.textContent = "";
    window.scrollTo(0, 0);
    return;
  }
  document.documentElement.classList.add("fit");
  window.scrollTo(0, 0);
  outer.scrollTop = 0;

  /* Paridad Resultados: mismo applyFit (lienzo 1120 + scale, scroll en .res-scroll). */
  if(isResChromeFit){
    var mobileRes = false;
    try{ mobileRes = window.matchMedia("(max-width:720px)").matches; }catch(eMq){ mobileRes = false; }
    document.body.classList.toggle("res-mobile", mobileRes);
    document.documentElement.classList.toggle("res-mobile", mobileRes);
    root.style.transform = "none";
    root.style.zoom = "";
    var designWRes = FIT_DESIGN_W_RES;
    root.style.width = designWRes + "px";
    root.style.left = "50%";
    var vwRes = document.documentElement.clientWidth || window.innerWidth || 800;
    var vhRes = window.visualViewport ? window.visualViewport.height : (window.innerHeight || document.documentElement.clientHeight || 800);
    var rectOuter = outer.getBoundingClientRect();
    var availWRes = Math.max(280, outer.clientWidth || rectOuter.width || vwRes);
    var availHRes = Math.max(280, outer.clientHeight || rectOuter.height || vhRes);
    var scaleRes = Math.min(1, (availWRes - 4) / designWRes);
    scaleRes = Math.max(0.32, scaleRes);
    var designHRes = Math.ceil(availHRes / scaleRes);
    shell.style.height = designHRes + "px";
    spacer.style.width = "100%";
    spacer.style.height = Math.ceil(availHRes) + "px";
    spacer.style.margin = "0";
    root.style.height = designHRes + "px";
    root.style.transformOrigin = "top center";
    root.style.transform = "translateX(-50%) scale(" + scaleRes + ")";
    if(hint){
      hint.textContent = "Resultados · " + Math.round(availWRes) + "px · " + Math.round(scaleRes * 100) + "%";
    }
    syncAdultoUbicacionStretch(document.getElementById("wrap"));
    return;
  }

  root.style.transform = "none";
  root.style.zoom = "";
  var area = measureFitArea(outer);
  var pad = 2;
  var designW = readFitDesignW(area.availW);
  root.style.width = designW + "px";
  root.style.left = "";
  var contentH = Math.max(1, root.scrollHeight || root.offsetHeight);
  var scaleW = Math.min(1, (area.availW - pad) / designW);
  var scale = scaleW;
  var cropH=recortarEmbedDashboard();
  var offsetY=0;
  if(cropH){
    contentH=cropH.height;
    offsetY=cropH.offset;
  }
  var maxH = window.__dashEmbedMaxH;
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    if(maxH && maxH > 0){
      scale = Math.min(scaleW, maxH / contentH, 1);
    }else{
      scale = Math.min(scaleW, 1);
    }
  }else if(document.body.classList.contains("perfil-embed-dashboard")){
    scale = Math.min(1, (area.availW - pad) / designW);
    scale = Math.max(0.32, scale);
  }else{
    scale = Math.max(0.38, scaleW);
  }
  var scaledH = Math.ceil(contentH * scale);
  if(!document.body.classList.contains("perfil-embed-dashboard-inicio") && maxH && maxH > 0 && scaledH > maxH){
    scale = scale * (maxH / scaledH);
    scaledH = Math.ceil(contentH * scale);
  }
  spacer.style.width = "100%";
  spacer.style.height = scaledH + "px";
  spacer.style.margin = "0";
  root.style.transformOrigin = "top left";
  root.style.transform = "translateY(" + (-offsetY) + "px) scale(" + scale + ")";
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    outer.style.overflow="hidden";
    marcarPersonalizableEmbed();
    try{
      window.parent.postMessage({
        type:"carihub-embed-resize",
        height:scaledH,
        scope:"inicio"
      },"*");
    }catch(e){}
  }else if(document.body.classList.contains("perfil-embed-dashboard")){
    outer.style.overflow="hidden";
    marcarPersonalizableEmbed();
    try{
      window.parent.postMessage({type:"carihub-embed-resize",height:Math.min(480,Math.max(220,Math.ceil(contentH*scale)))},"*");
    }catch(e){}
  }
  if(hint){
    hint.textContent = "Ancho panel · " + Math.round(area.availW) + "px · "
      + Math.round(scale * 100) + "% · scroll ↓";
  }
  syncAdultoUbicacionStretch(document.getElementById("wrap"));
}

    if(!window.CariHubPerfilPublico||!CariHubPerfilPublico.leerPreviewRegistro) return;
    var qGate={};
    try{ qGate=queryPerfilPreview(); }catch(eGate){ qGate={}; }
    /* No sobrescribir un perfil abierto desde Results con draft de registro */
    if(qGate.from==="resultados"||(qGate.id&&qGate.from!=="registro"&&qGate.previewSource!=="registro")) return;
    var draft=CariHubPerfilPublico.leerPreviewRegistro();
    if(!draft||!draft.perfil) return;
    var qUp=qGate;
    var vistaUp=draft.vista||qUp.vista||resolverVistaPerfil(draft.perfil,qUp)||"adult";
    if(draft.perfil.__previewRegistro||draft.perfil.__id==="preview-registro"){
      aplicarPerfilDesdeRegistro(vistaUp,draft.perfil);
    }else{
      aplicarPerfilResultadosEnDemo(vistaUp,draft.perfil);
    }
    setVista(vistaUp);
    return;
  }
  if(ev.data.type==="carihub-apply-visual-theme"){
    aplicarTemaVisual(ev.data.theme);
    bumpFitDelays();
    return;
  }
  if(ev.data.type==="carihub-personalize-mode"){
    document.body.classList.toggle("perfil-personalize-mode",!!ev.data.active);
    return;
  }
  if(ev.data.type==="carihub-embed-reflow"){
    if(ev.data.designWidth != null){
      var dw=Number(ev.data.designWidth);
      window.__dashEmbedDesignW=(isFinite(dw)&&dw>0)?dw:null;
    }
    if(ev.data.maxHeight != null){
      var mh=Number(ev.data.maxHeight);
      window.__dashEmbedMaxH=(isFinite(mh)&&mh>0)?mh:null;
    }
    bumpFitDelays();
    return;
  }
});
wirePersonalizeEmbed();
bumpFitDelays();
</script>
</body>
</html>

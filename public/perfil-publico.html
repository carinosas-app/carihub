<style>
:root{
  --acc:#ec2d7a; --acc2:#ff4f9a; --grn:#16a34a;
  --bg:var(--ch-bg, #FFF7FA); --card:var(--ch-card, #FFFFFF); --ink:#23202b; --muted:#7b7280;
  --line:var(--ch-separator, #F8DCE8); --card-border:var(--ch-card-border, #FCE4EC);
  --shadow:var(--ch-card-shadow, 0 2px 12px rgba(255,79,162,.06));
}
[data-tema="pro"], [data-tema="empresa"]{
  --acc:#1d4ed8; --acc2:#2563eb; --grn:#16a34a;
  --bg:#eef2f8; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
  --line:#e2e8f0; --card-border:#e2e8f0;
  --shadow:0 6px 18px rgba(0,0,0,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;min-height:100%;}
body{font-family:'Poppins',"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);transition:background .2s;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* selector de vista previa (no es parte del diseño) */
.switcher{position:sticky;top:0;z-index:50;background:#0f172a;color:#fff;display:flex;gap:8px;align-items:center;padding:10px 16px;flex-wrap:wrap;}
.switcher b{font-size:13px;opacity:.8;margin-right:6px;}
.switcher button{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:800;}
.switcher-select{font-family:inherit;font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #555;background:#1a1a1a;color:#f3f3f3;cursor:pointer;}
.negocio-sobre .sobre-card__desc{margin-bottom:0;}
.switcher button.is-on{background:#fff;color:#0f172a;border-color:#fff;}
.switcher span{margin-left:auto;font-size:12px;opacity:.7;}
body.perfil-desde-resultados .switcher{display:none !important;}
body.perfil-desde-resultados:not(.fit) #fitOuter{min-height:100vh;}

/* Embed mini-preview en dashboard (2 columnas del perfil, sin chrome extra) */
body.perfil-embed-dashboard{background:var(--bg);}
body.perfil-embed-dashboard .pb,
body.perfil-embed-dashboard .pbrand,
body.perfil-embed-dashboard .profile-toolbar,
body.perfil-embed-dashboard .playout__banner-adult,
body.perfil-embed-dashboard .negocio-pie-wrap--bottom,
body.perfil-embed-dashboard .ch-slot-dock,
body.perfil-embed-dashboard .fit-hint{display:none !important;}
body.perfil-embed-dashboard.fit{
  position:relative;inset:auto;width:100%;height:auto;overflow:visible;margin:0;
  display:block;
}
html.perfil-embed-dashboard.fit{overflow:auto;height:100%;}
body.perfil-embed-dashboard.fit #fitOuter{
  flex:none;overflow:hidden;min-height:0;width:100%;position:relative;
}
body.perfil-embed-dashboard.fit #fitSpacer{position:relative;margin:0;width:100%;}
body.perfil-embed-dashboard.fit #fitRoot{
  position:absolute;top:0;left:0;margin:0;
  transform-origin:top left;
}
body.perfil-embed-dashboard.fit .wrap{
  max-width:none;margin:0;padding:8px 8px 10px;
}
body.perfil-embed-dashboard.fit [data-tema="adult"] .playout,
body.perfil-embed-dashboard [data-tema="adult"] .playout{
  grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
  gap:10px !important;
  align-items:start !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .playout__tri{
  display:grid !important;
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:8px !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .playout__tri .pcard--mini{
  padding:10px 8px !important;min-height:0 !important;border-radius:12px;
}
body.perfil-embed-dashboard [data-tema="adult"] .precio-big{font-size:22px !important;line-height:1.1;}
body.perfil-embed-dashboard [data-tema="adult"] .precio-desde,
body.perfil-embed-dashboard [data-tema="adult"] .precio-sub{font-size:9px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .pagos-card,
body.perfil-embed-dashboard [data-tema="adult"] .tiempo-card{font-size:9px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .contact{
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:6px !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .contact .cbtn{font-size:9px !important;padding:8px 4px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .sobre-card__grid{
  grid-template-columns:minmax(0,1fr) minmax(0,34%) !important;
  gap:10px !important;
}
body.perfil-embed-dashboard [data-tema="adult"] .playout__col--izq,
body.perfil-embed-dashboard [data-tema="adult"] .playout__col--der{min-width:0 !important;overflow:visible;}
body.perfil-embed-dashboard [data-tema="adult"] .idhead h1{font-size:1.2rem !important;}
body.perfil-embed-dashboard [data-tema="adult"] .modchip{font-size:8px !important;padding:3px 6px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .gal__thumbs .thumb{height:34px !important;}
body.perfil-embed-dashboard [data-tema="adult"] .playout__izq-stack{gap:6px !important;}
body.perfil-embed-dashboard .playout__col--der > *:not(:first-child),
body.perfil-embed-dashboard .playout__banner-adult,
body.perfil-embed-dashboard .playout__feed-pair,
body.perfil-embed-dashboard .playout__derstack,
body.perfil-embed-dashboard .aviso-donacion{display:none !important;}
body.perfil-embed-dashboard .playout .gal__main{max-height:180px;aspect-ratio:4/3;}
body.perfil-embed-dashboard .playout .gal__main img,
body.perfil-embed-dashboard .playout .gal__main .ch-foto-ph{max-height:180px;object-fit:cover;}
body.perfil-embed-dashboard.fit #fitOuter{overflow:hidden;}

/* Embed vista previa completa — dashboard módulo Inicio (misma referencia que perfil público) */
body.perfil-embed-dashboard-inicio{background:var(--bg);}
body.perfil-embed-dashboard-inicio .pb,
body.perfil-embed-dashboard-inicio .pbrand,
body.perfil-embed-dashboard-inicio .profile-toolbar,
body.perfil-embed-dashboard-inicio .playout__banner-adult,
body.perfil-embed-dashboard-inicio .negocio-pie-wrap--bottom,
body.perfil-embed-dashboard-inicio .ch-slot-dock,
body.perfil-embed-dashboard-inicio .fit-hint{display:none !important;}
body.perfil-embed-dashboard-inicio.fit{
  position:relative;inset:auto;width:100%;height:100%;overflow:hidden;margin:0;
  display:block;
}
html.perfil-embed-dashboard-inicio.fit{overflow:hidden;height:100%;}
body.perfil-embed-dashboard-inicio.fit #fitOuter{
  flex:none;overflow:hidden;min-height:0;width:100%;height:100%;position:relative;
}
body.perfil-embed-dashboard-inicio.fit #fitSpacer{position:relative;margin:0;width:100%;}
body.perfil-embed-dashboard-inicio.fit #fitRoot{
  position:absolute;top:0;left:0;margin:0;
  transform-origin:top left;
}
body.perfil-embed-dashboard-inicio.fit .wrap{
  max-width:none;margin:0;padding:10px 10px 12px;
}
body.perfil-embed-dashboard-inicio.fit [data-tema="adult"] .playout,
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout{
  grid-template-columns:minmax(0,1fr) minmax(0,1fr) !important;
  gap:12px !important;
  align-items:start !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__tri{
  display:grid !important;
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:10px !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__col--izq,
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__col--der{min-width:0 !important;overflow:visible;}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .playout__izq-stack{gap:8px !important;}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .contact{
  grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  gap:8px !important;
}
body.perfil-embed-dashboard-inicio [data-tema="adult"] .sobre-card__grid{
  grid-template-columns:minmax(0,1fr) minmax(0,34%) !important;
  gap:12px !important;
}
body.perfil-embed-dashboard-inicio .playout .gal__main{max-height:none;}
body.perfil-embed-dashboard-inicio .playout .gal__main img,
body.perfil-embed-dashboard-inicio .playout .gal__main .ch-foto-ph{max-height:none;position:absolute;inset:0;}

body.perfil-personalize-mode [data-ch-style]{cursor:pointer;transition:box-shadow .15s,outline-color .15s;}
body.perfil-personalize-mode [data-ch-style]:hover{
  outline:2px dashed rgba(236,45,122,.65);
  outline-offset:2px;
  box-shadow:0 0 0 4px rgba(236,45,122,.12);
}
body.perfil-sheen-gold::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 20% 10%,rgba(255,211,77,.18),transparent 42%),
    radial-gradient(circle at 80% 90%,rgba(255,180,60,.12),transparent 38%);
}
body.perfil-sheen-none::before{display:none!important;}
.fit-hint{margin-left:0 !important;font-size:11px !important;opacity:.85 !important;color:#ffd0e6;font-weight:700;}
.rainctl{display:flex;align-items:center;gap:6px;opacity:1 !important;font-weight:700;}
.rainctl button{background:#3a2a00;color:#ffd34d;border:1px solid #b8860b;padding:6px 11px;font-size:12px;font-weight:800;border-radius:999px;margin-left:0;}

/* ===== Lluvia de monedas doradas (donaciones en vivo) ===== */
.rain-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.rain-coin{position:absolute;top:-9vh;will-change:transform,opacity;animation:rain-fall linear forwards;filter:drop-shadow(0 3px 6px rgba(160,110,0,.5));}
.rain-coin svg{width:100%;height:100%;display:block;}
@keyframes rain-fall{0%{transform:translateY(-12vh) rotate(0deg) scale(.6);opacity:0}7%{opacity:1}100%{transform:translateY(114vh) rotate(540deg) scale(1);opacity:1}}
.rain-flash{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(255,215,0,.85) 40%,rgba(255,215,0,0) 70%);animation:rain-flash 1s ease-out forwards;}
@keyframes rain-flash{0%{transform:scale(.2);opacity:0}30%{opacity:1}100%{transform:scale(2.6);opacity:0}}
.rain-bang{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:10000;pointer-events:none;background:linear-gradient(90deg,#ffb300,#ffd34d,#ffb300);color:#5c3f06;font-weight:900;font-size:15px;padding:8px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(184,134,11,.5);animation:rain-bang 1.8s ease-out forwards;display:flex;align-items:center;gap:8px;}
@keyframes rain-bang{0%{transform:translateX(-50%) scale(.5);opacity:0}15%{transform:translateX(-50%) scale(1.1);opacity:1}80%{opacity:1}100%{transform:translateX(-50%) translateY(-18px) scale(1);opacity:0}}
.rain-bang svg{width:24px;height:24px;}
/* monedas cayendo dentro del thumb del live */
.thumb .liverain{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2;}
.thumb .liverain i{position:absolute;top:-20%;width:14px;height:14px;animation:rain-fall-mini linear infinite;}
.thumb .liverain i svg{width:100%;height:100%;}
@keyframes rain-fall-mini{0%{transform:translateY(-20%) rotate(0)}100%{transform:translateY(360%) rotate(360deg)}}
@media (prefers-reduced-motion: reduce){.rain-coin,.rain-flash,.thumb .liverain i{animation:none !important}}

.wrap{max-width:1100px;margin:0 auto;padding:16px 16px 88px;}
body:not(.fit) .wrap{max-width:1100px;}

/* ===== BANNERS ===== */
.pb{display:flex;gap:12px;margin-bottom:16px;}
.pb a{flex:1 1 0;position:relative;overflow:hidden;border-radius:16px;color:#fff;padding:14px 16px;min-height:108px;display:flex;align-items:center;box-shadow:var(--shadow);}
.pb__imgbanner{padding:0;min-height:108px;display:block;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.pb__imgbanner img{width:100%;height:100%;min-height:108px;object-fit:cover;object-position:center;display:block;}
.pb-slot{
  flex:1 1 0;position:relative;overflow:hidden;border-radius:16px;
  min-height:108px;display:block;box-shadow:var(--shadow);
  text-decoration:none;color:#fff;padding:0;
}
.pb-slot.pb--center{flex:1.55 1 0;}
.pb-slot--bottom{
  display:block;width:100%;flex:none;
  min-height:128px;margin-top:36px;margin-bottom:12px;border-radius:20px;
}
.pb-slot--bottom .pb-slot__stage{min-height:inherit;height:100%;}
.pb-slot--bottom .pb-slot__slide img{min-height:128px;}
[data-tema="adult"] .pb-slot--bottom{min-height:140px;margin-top:16px;}
[data-tema="adult"] .pb-slot--bottom .pb-slot__slide img{min-height:140px;}
.pb-slot__stage{position:relative;width:100%;min-height:108px;height:100%;overflow:hidden;}
.pb-slot__slide{
  position:absolute;inset:0;opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .55s ease,visibility .55s ease;z-index:0;
  overflow:hidden;
}
.pb-slot__slide.is-active{opacity:1;visibility:visible;pointer-events:auto;z-index:1;}
.pb-slot__slide:not(.is-active){transform:translateX(0);clip-path:inset(0);}
.pb-slot__slide img,
.pb-slot__media{width:100%;height:100%;min-height:108px;object-fit:cover;object-position:center;display:block;}
.pb-slot__slide--html{display:flex;align-items:center;padding:14px 16px;min-height:108px;}
.pb-slot__dots{
  position:absolute;left:0;right:0;bottom:6px;z-index:3;
  display:flex;justify-content:center;gap:5px;pointer-events:none;
}
.pb-slot__dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.42);
  box-shadow:0 0 0 1px rgba(0,0,0,.22);
  transition:transform .25s ease,background .25s ease;
}
.pb-slot__dot.is-on{background:#E91E63;transform:scale(1.35);}
.pb--center{flex:1.55 1 0;}
.pb__body{position:relative;z-index:2;max-width:72%;}
.pb__kick{margin:0 0 3px;font-size:12px;font-weight:900;opacity:.92;text-transform:uppercase;letter-spacing:.3px;}
.pb__k{font-size:17px;font-weight:900;line-height:1.06;margin:0;}
.pb__s{font-size:11.5px;font-weight:600;opacity:.92;margin:5px 0 0;line-height:1.28;}
.pb__cta{display:inline-block;margin-top:9px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.55);border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:900;}
.pb__art{position:absolute;right:2px;bottom:0;height:100%;width:auto;opacity:.97;pointer-events:none;z-index:1;}
.pb__art--icon{right:12px;top:50%;bottom:auto;transform:translateY(-50%);height:52px;}
/* centro (adult) */
.pb__bodyC{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;}
.pb__big{margin:0;font-size:clamp(15px,2.5vw,23px);font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:.3px;}
.pb__big em{font-style:normal;color:#ffd0e6;}
.pb__pill{display:inline-block;margin:7px 0 8px;border:1.5px solid rgba(255,255,255,.6);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:900;letter-spacing:.6px;}
.pb__feats{display:flex;flex-direction:column;gap:2px;font-size:10.5px;font-weight:800;opacity:.95;}
.pb--center .pb__art{left:50%;right:auto;transform:translateX(-50%);opacity:.92;}
.pb__statwrap{position:relative;z-index:2;text-align:center;flex:0 0 auto;}
.pb__stat{font-size:clamp(18px,3vw,28px);font-weight:900;text-shadow:0 0 14px rgba(255,79,154,.7);line-height:1;}
.pb__statl{font-size:10px;font-weight:800;opacity:.92;margin-bottom:7px;}
.pb__cta2{display:inline-block;background:linear-gradient(90deg,#ff2d7a,#ff7fb3);color:#fff;border-radius:8px;padding:5px 11px;font-size:10.5px;font-weight:900;text-transform:uppercase;}
.pb__row{position:relative;z-index:2;display:flex;align-items:center;gap:10px;max-width:74%;}
.pb__shield{flex:0 0 auto;width:40px;height:46px;}
.pb__body--bottom{max-width:none;width:100%;}
.pb__bottom-h{margin:0;font-size:clamp(22px,2.6vw,30px);font-weight:900;line-height:1.15;}
.pb__bottom-p{margin:10px 0 0;font-size:15px;line-height:1.45;opacity:.94;max-width:52ch;}
.pb-slot--bottom .pb-slot__slide--html{display:flex;align-items:center;justify-content:space-between;padding:32px 36px;gap:24px;flex-wrap:wrap;min-height:128px;}
[data-tema="adult"] .pb-slot--bottom .pb-slot__slide--html{min-height:140px;padding:36px 40px;}
.b-blue{background:linear-gradient(135deg,#1e3a8a,#2563eb);}
.b-green{background:linear-gradient(135deg,#065f46,#16a34a);}
.b-navy{background:linear-gradient(135deg,#1e293b,#3b0764 90%);}
.b-pink1{background:linear-gradient(135deg,#7a1247,#ec2d7a);}
.b-pink2{background:linear-gradient(135deg,#0b0b12,#7a1247 60%,#ec2d7a);}
.b-pink3{background:linear-gradient(135deg,#9b2a66,#ff7fb3);}
[data-tema="adult"] .pb__cta{background:#fff;color:#c0246b;border-color:#fff;}
[data-tema="adult"] .pb{gap:14px;margin-bottom:14px;}
[data-tema="adult"] .pb a,
[data-tema="adult"] .pb-slot,
[data-tema="adult"] .pb-slot__stage,
[data-tema="adult"] .pb-slot__slide,
[data-tema="adult"] .pb-slot__slide--html,
[data-tema="adult"] .pb-slot__slide img,
[data-tema="adult"] .pb__imgbanner,
[data-tema="adult"] .pb__imgbanner img{min-height:158px;}

/* ===== BRAND ===== */
.pbrand{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.pbrand__logo{display:flex;align-items:center;gap:8px;min-width:0;}
.pbrand__wordmark{display:flex;flex-direction:column;align-items:flex-start;line-height:1;min-width:0;}
[data-tema="adult"] .pbrand__wordmark{align-items:center;text-align:center;}
[data-tema="adult"] .pbrand{
  padding:8px 14px;margin-bottom:8px;align-items:center;min-height:0;
}
.pbrand__name{font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:32px;font-weight:800;color:var(--acc);letter-spacing:-.3px;line-height:1.05;}
[data-tema="adult"] .pbrand__name{
  font-family:'Dancing Script','Pacifico',cursive;
  font-weight:700;
  font-size:34px;
  color:#E91E63;
  letter-spacing:.01em;
  line-height:1;
  white-space:nowrap;
}
.pbrand__tag{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.2;}
[data-tema="adult"] .pbrand__tag{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:9px;
  font-weight:500;
  color:#E91E63;
  margin-top:1px;
  text-align:center;
  letter-spacing:0;
  white-space:nowrap;
  line-height:1.1;
}
[data-tema="adult"] .pnav{gap:10px;align-self:center;}
[data-tema="adult"] .pnav a{padding:4px 2px;font-size:13px;gap:6px;}
[data-tema="adult"] .pnav__ic svg{width:18px;height:18px;}

@keyframes grat-shimmer{
  0%,100%{transform:translateX(-130%) skewX(-12deg);opacity:0;}
  18%{opacity:1;}
  42%{transform:translateX(130%) skewX(-12deg);opacity:1;}
  58%{opacity:0;}
}
@keyframes grat-sparkle{
  0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}
  45%{opacity:1;transform:scale(1) rotate(18deg);}
  70%{opacity:.35;transform:scale(.75) rotate(36deg);}
}
@keyframes grat-glow{
  0%,100%{box-shadow:0 2px 10px rgba(198,142,18,.28),inset 0 1px 0 rgba(255,255,255,.72),inset 0 -1px 0 rgba(176,118,8,.18);}
  50%{box-shadow:0 3px 16px rgba(255,196,45,.48),inset 0 1px 0 rgba(255,255,255,.85),inset 0 -1px 0 rgba(176,118,8,.22);}
}
@keyframes grat-frost{
  0%,100%{opacity:.22;transform:translateY(0);}
  50%{opacity:.5;transform:translateY(-1px);}
}
[data-tema="adult"] .feed-grat-btn{
  position:relative;overflow:hidden;isolation:isolate;
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  margin-top:0;padding:10px 14px;box-sizing:border-box;
  border:1px solid #d4a017;border-radius:12px;cursor:pointer;
  background:
    radial-gradient(ellipse 120% 80% at 12% 0%,rgba(255,255,255,.72) 0%,transparent 55%),
    radial-gradient(ellipse 90% 70% at 88% 100%,rgba(255,228,120,.45) 0%,transparent 50%),
    linear-gradient(135deg,#fff6c8 0%,#ffd95a 28%,#f0b429 52%,#ffe082 78%,#fff3bf 100%);
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:800;color:#5c3f06;
  text-shadow:0 1px 0 rgba(255,255,255,.55);
  animation:grat-glow 2.8s ease-in-out infinite;
}

  background:#fff;border:1px solid #e8e0e5;border-radius:18px;
  padding:14px 16px 16px;box-shadow:0 2px 12px rgba(0,0,0,.04);
}
/* Ubicación — ref. mockup: mapa cuadrado izq + datos/CTA/perks der */
.negocio-ubic__body{display:flex;gap:12px;align-items:stretch;}
.negocio-ubic__map{
  flex:0 0 46%;min-width:0;border-radius:12px;overflow:hidden;
  border:1px solid #f0e8ec;aspect-ratio:1/1;background:#f5eef2;
}
.negocio-ubic__map img,.negocio-ubic__map svg{width:100%;height:100%;object-fit:cover;display:block;}
.negocio-ubic__side{
  flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;
  justify-content:flex-start;padding-top:2px;
}
.negocio-ubic__addrline{
  display:flex;align-items:flex-start;gap:8px;min-width:0;
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:12px;font-weight:600;color:#1A1C2E;line-height:1.45;
}
.negocio-ubic__pin{
  flex:0 0 18px;width:18px;height:18px;color:#E91E63;margin-top:1px;
  display:inline-flex;align-items:center;justify-content:center;
}
.negocio-ubic__pin svg{width:18px;height:18px;display:block;}
.negocio-ubic__cta{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:auto;align-self:flex-start;padding:9px 16px;border-radius:10px;border:none;
  background:#E91E63;color:#fff;
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:12px;font-weight:800;
  text-decoration:none;box-shadow:0 2px 8px rgba(233,30,99,.22);
}
.negocio-ubic__cta-ic{
  flex:0 0 16px;width:16px;height:16px;display:inline-flex;
  align-items:center;justify-content:center;
}
.negocio-ubic__cta-ic svg{width:14px;height:14px;display:block;}
.negocio-ubic__perks{display:flex;flex-direction:column;gap:7px;margin-top:2px;}
.negocio-ubic__perk{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:500;color:#1A1C2E;line-height:1.35;
}
.negocio-ubic__perk-ok{
  flex:0 0 18px;width:18px;height:18px;border-radius:50%;
  background:#22c55e;color:#fff;font-size:11px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;line-height:1;
}
.negocio-ubic__perk-ic{
  flex:0 0 18px;width:18px;height:18px;color:#22c55e;
  display:inline-flex;align-items:center;justify-content:center;
}
.negocio-ubic__perk-ic svg{width:16px;height:16px;display:block;}
.negocio-ubic__cta-ic--go svg{width:16px;height:16px;}
@media(max-width:760px){
  .negocio-svc-2col{grid-template-columns:1fr;}
  .negocio-ubic__body:not(.negocio-ubic__body--pie){flex-direction:column;}
  .negocio-ubic__body:not(.negocio-ubic__body--pie) .negocio-ubic__map{flex:none;width:100%;aspect-ratio:16/11;}
  .negocio-pie-card{grid-template-columns:1fr;gap:14px 0;}
  .negocio-pie-card__reviews{border-right:none;padding-right:0;padding-bottom:14px;border-bottom:1px solid #e8e0e5;}
  .negocio-pie-card__ubic .negocio-ubic__body--pie{
    position:relative;display:block !important;
  }
  .negocio-pie-card__ubic .negocio-ubic__map{
    position:absolute;left:0;top:0;
    width:44% !important;max-width:44% !important;height:100% !important;
    aspect-ratio:unset !important;
  }
  .negocio-pie-card__ubic .negocio-ubic__side{
    margin-left:calc(44% + 8px);
  }
  .negocio-info-grid{grid-template-columns:1fr;}
  .negocio-gmaps__row{flex-direction:column;}
  .negocio-gmaps__map{flex:none;width:100%;aspect-ratio:16/10;}
  .pb-negocio-promo{flex-wrap:wrap;justify-content:center;text-align:center;}
  .pb-negocio-promo__list{border-left:none;padding:0;}
}
/* Opiniones negocio */
.pcard--negocio-reviews{
  background:#fff;border:1px solid #f3c0d4;border-radius:18px;
  padding:16px 18px 14px;box-shadow:0 2px 12px rgba(0,0,0,.04);
}
.negocio-reviews__head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;
}
.negocio-reviews__title{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:11px;font-weight:800;letter-spacing:.65px;text-transform:uppercase;color:#1A1C2E;
}
.negocio-reviews__link{color:#E91E63;font-size:13px;font-weight:700;text-decoration:none;}
.negocio-reviews__summary{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.negocio-reviews__num{font-size:32px;font-weight:800;color:#E91E63;line-height:1;}
.negocio-stars{display:inline-flex;align-items:center;gap:1px;line-height:1;}
.negocio-stars__s{color:#ddd;font-size:15px;}
.negocio-stars__s--on{color:#f59e0b;}
.negocio-stars__s--half{
  background:linear-gradient(90deg,#f59e0b 50%,#ddd 50%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.negocio-reviews__count{font-size:13px;font-weight:500;color:#6b6170;}
.negocio-review{
  display:grid;grid-template-columns:40px minmax(0,1fr);gap:8px 12px;
  padding:12px 0;border-top:1px solid #f5eef2;
}
.negocio-review__av{
  width:40px;height:40px;border-radius:50%;overflow:hidden;background:#f3c0d4;
  grid-row:1 / span 2;align-self:start;
}
.negocio-review__av img{width:100%;height:100%;object-fit:cover;display:block;}
.negocio-review__top{
  display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0;
  flex-wrap:wrap;
}
.negocio-review__who{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap;}
.negocio-review__name{font-size:14px;font-weight:800;color:#1A1C2E;}
.negocio-review__date{font-size:12px;font-weight:500;color:#6b6170;white-space:nowrap;}
.negocio-review__txt{
  grid-column:2;font-size:13px;font-weight:500;color:#374151;line-height:1.45;margin:0;
}
[data-tema="adult"] .contact-h{margin:0 0 14px;font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:#E91E63;}
[data-tema="adult"] .contact{grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;}
[data-tema="adult"] .contact a{
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:14px 16px;
  font-size:14px;
  font-weight:700;
  color:#222222;
  min-height:52px;
  gap:14px;
  background:#FFFFFF;
  box-shadow:var(--shadow);
  font-family:'Inter','Poppins',sans-serif;
}
[data-tema="adult"] .contact a .ic{width:28px;height:28px;border-radius:0;background:transparent !important;font-size:0;padding:0;flex:0 0 28px;}
[data-tema="adult"] .contact a .ic svg{width:28px;height:28px;display:block;}
[data-tema="adult"] .contact a .ic-brand--ig{
  width:36px;height:36px;flex:0 0 36px;
  border-radius:9px;overflow:hidden;
}
[data-tema="adult"] .contact a .ic-brand--ig svg{width:36px;height:36px;display:block;}
[data-tema="adult"] .contact a .ic-brand--fb{
  width:32px;height:32px;flex:0 0 32px;
  border-radius:50%;overflow:hidden;
}
[data-tema="adult"] .contact a .ic-brand--fb svg{width:32px;height:32px;display:block;}
[data-tema="adult"] .feat-line--contact{
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  align-items:center;
  justify-content:flex-start;
  gap:16px;
}
[data-tema="adult"] .feat-line--contact .feat-item{
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:12px;font-weight:600;color:#111827;
  white-space:nowrap;
}
[data-tema="adult"] .feat-line--contact .feat-item__ic{
  flex:0 0 16px;width:16px;height:16px;
  display:inline-flex;align-items:center;justify-content:center;
}
[data-tema="adult"] .feat-line--contact .feat-item__ic svg{width:16px;height:16px;display:block;}
[data-tema="adult"] .feat-line--contact .feat-item__ic--horario{color:#7d22e0;}
[data-tema="adult"] .feat-line--contact .feat-item__txt{line-height:1.2;flex:0 0 auto;}
[data-tema="adult"] .feat-line{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);}
[data-tema="adult"] .playout__izq-stack > .pcard--contact{padding-bottom:14px;}
[data-tema="adult"] .playout__izq-stack .contact-h{margin-bottom:10px;}
[data-tema="adult"] .svc .ok{color:#fff;background:#4CAF50;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex:0 0 18px;line-height:1;}
[data-tema="adult"] .svc{gap:10px 20px;}
[data-tema="adult"] .drow{padding:11px 0;}
.pcard__h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:var(--ink);margin:0 0 12px;}
.pcard__h .lnk{margin-left:auto;color:var(--acc);font-size:12px;text-transform:none;letter-spacing:0;}

/* ===== GALLERY ===== */
.gal{padding:0;overflow:hidden;}
.gal__main{position:relative;aspect-ratio:4/3;background:#ddd;}
[data-tema="adult"] .gal__main{aspect-ratio:3/4;}
.gal__main img{object-position:center top;}
.gal__main img,.gal__main .ch-foto-ph{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;}
.gal__main .gal__empty{width:100%;height:100%;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#e8e8ec;color:#888;font-size:.9rem;font-weight:600;}
.gal__bdg{position:absolute;top:12px;left:12px;z-index:2;}
[data-tema="adult"] .gal__bdg .verok{background:rgba(252,238,245,.96);box-shadow:0 1px 4px rgba(233,30,99,.08);}
.gal__cat{position:absolute;top:12px;left:118px;background:#212121;color:#fff;font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;z-index:2;}
[data-tema="adult"] .verok--hero{
  background:#E91E63;color:#fff;font-weight:700;font-size:12px;
  padding:6px 14px 6px 8px;gap:8px;
}
[data-tema="adult"] .verok--hero .verok__ic--hero svg{width:20px;height:20px;display:block;}
[data-tema="adult"] .verok--green{
  background:#22c55e;color:#fff;font-weight:700;font-size:12px;
  padding:5px 12px 5px 8px;gap:7px;
}
[data-tema="adult"] .verok--green .verok__ic--green svg{width:18px;height:18px;display:block;}
[data-tema="adult"] .idhead .verok--green{flex:0 0 auto;margin-top:3px;}
[data-tema="adult"] .catpill{
  display:inline-flex;align-items:center;background:#fff;color:#E91E63;
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:999px;line-height:1;border:1px solid #f3c0d4;
}
.gal__count{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:800;padding:5px 10px;border-radius:8px;z-index:2;}
.gal__arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.85);border:none;font-size:18px;color:#333;z-index:2;display:flex;align-items:center;justify-content:center;}
.gal__arrow.l{left:10px;} .gal__arrow.r{right:10px;}
.gal__thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;}
.gal__thumbs .t{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:#ccc;}
.gal__thumbs .t img,.gal__thumbs .t .ch-foto-ph{width:100%;height:100%;object-fit:cover;}
.gal__thumbs .t.lock{display:flex;align-items:center;justify-content:center;background:#1f2937;color:#fff;font-size:12px;font-weight:900;flex-direction:column;gap:2px;}

/* ===== BLOQUE PRECIO/CONTACTO ===== */
.tri{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;align-items:start;}
.tri > div{position:relative;padding:0 18px 0 14px;}
.tri > div:first-child{padding-left:4px;}
.tri > div:last-child{padding-right:4px;}
.tri > div:not(:last-child)::after{content:"";position:absolute;right:0;top:8%;height:84%;width:1px;background:var(--line);}
.tri .lbl{font-size:11px;color:#5d1b24;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.precio-block{display:flex;flex-direction:column;align-items:flex-start;line-height:1.15;}
.precio-desde{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:12px;font-weight:600;color:#5d1b24;margin:0 0 4px;
}
.precio-big{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:30px;font-weight:700;color:#E91E63;line-height:1;letter-spacing:-.02em;
}
.precio-sub{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:12px;font-weight:600;color:#5d1b24;margin-top:5px;
}
.mini{font-size:13px;font-weight:700;color:var(--ink);line-height:1.45;}
.urg{margin-top:10px;background:#ecfdf5;border:1px solid #a7f3d0;color:#047857;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:900;display:inline-block;}
.contact-box{margin-top:18px;padding:14px;border-radius:16px;background:#ffe8f0;border:1px solid #f3d0de;}
[data-tema="pro"] .contact-box,[data-tema="empresa"] .contact-box{background:#eef4ff;border-color:#dbeafe;}
.contact-box .pcard__h{margin:0 0 12px;font-size:11px;letter-spacing:.6px;}
.contact{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:0;}
[data-tema="pro"] .contact,[data-tema="empresa"] .contact{grid-template-columns:repeat(3,1fr);gap:10px;}
.contact a{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;color:var(--ink);background:#FFFFFF;min-height:48px;}
.contact a .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex:0 0 auto;}
.ic-wa{background:#25D366;} .ic-tel{background:#2563eb;} .ic-msg{background:#7c3aed;} .ic-web{background:#0ea5e9;} .ic-loc{background:#ef4444;} .ic-save{background:#64748b;} .ic-mail{background:#f59e0b;} .ic-tg{background:#229ED9;} .ic-ig{background:#e1306c;} .ic-of{background:#00aff0;} .ic-x{background:#111;}
.feat-line{display:flex;gap:14px 22px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:600;}
.feat-line span{display:inline-flex;align-items:center;gap:6px;}

/* ===== IDENTITY (col derecha arriba) ===== */
.idhead{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.idhead h1{margin:0;font-size:24px;font-weight:700;color:var(--ink);}
.idhead .age{margin-left:auto;font-size:16px;font-weight:600;color:#52525b;}
.verok{
  display:inline-flex;align-items:center;gap:7px;
  background:#FCEEF5;color:#E91E63;
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-weight:600;font-size:12px;
  padding:6px 14px 6px 10px;border-radius:999px;line-height:1;
}
.verok__ic{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;color:#E91E63;}
.verok__ic svg{width:18px;height:18px;display:block;}
.verok__txt{letter-spacing:.01em;}
[data-tema="pro"] .verok,[data-tema="empresa"] .verok{background:#e0ecff;color:#1d4ed8;}
[data-tema="pro"] .verok__ic,[data-tema="empresa"] .verok__ic{color:#1d4ed8;}
.vchip{display:inline-flex;align-items:center;gap:4px;background:#eef2ff;color:var(--acc);border:1px solid var(--line);font-size:11px;font-weight:900;padding:3px 9px;border-radius:999px;}
[data-tema="adult"] .vchip{background:#fff;border-color:var(--acc);}
.idsub{margin:4px 0 0;color:var(--muted);font-weight:800;font-size:14px;}
.idloc{display:flex;align-items:center;gap:10px;margin-top:10px;font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:16px;font-weight:700;color:#212121;flex-wrap:wrap;line-height:1.2;}
.idloc__ic{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
.idloc__ic svg{width:20px;height:20px;display:block;}
.idloc.idloc--horario{color:var(--text);font-weight:600;font-size:15px;}
.idloc__horario{font-size:13px;font-weight:600;color:var(--muted,#64748b);}
.idloc .ch-shield{width:18px;height:21px;} .idloc .ch-flag{width:24px;height:17px;}
.idloc .li-ic{display:inline-flex;align-items:center;} .idloc .li-ic svg{width:19px;height:19px;}
.idloc .li-pin{color:#E91E63;}
.idloc .av{color:#22c55e;font-weight:700;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.tabs .tb{background:#f1f5f9;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;color:var(--muted);}
.tabs .tb.on{background:#e0e7ff;color:var(--acc);border-color:#c7d2fe;}
[data-tema="adult"] .tabs .tb.on{background:#ffe4f0;border-color:#ffc9e0;}
.modchips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.modchip{display:inline-flex;align-items:center;gap:8px;background:#f4f4f5;border:none;color:#212121;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;}
.modchip .mc-ic{display:inline-flex;align-items:center;}
.modchip .mc-ic svg{width:20px;height:20px;}
.modchip.mc-pink{background:#ffe6f3;} .modchip.mc-pink .mc-ic{color:#FF0099;}
.modchip.mc-purple{background:#f3e8fb;} .modchip.mc-purple .mc-ic{color:#AB47BC;}
.modchip.mc-orange{background:#ffe9e0;} .modchip.mc-orange .mc-ic{color:#FF7043;}
[data-tema="pro"] .modchip,[data-tema="empresa"] .modchip{background:#eff6ff;color:#1e3a8a;}
[data-tema="pro"] .modchip .mc-ic,[data-tema="empresa"] .modchip .mc-ic{color:#2563eb;}
.quote{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:#5d5566;font-weight:600;}
[data-tema="adult"] .quote{background:var(--card);border-color:var(--line);}
[data-tema="pro"] .quote,[data-tema="empresa"] .quote{background:#f8fafc;border-color:#e2e8f0;}

/* data list */
.dlist{display:flex;flex-direction:column;}
.drow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:16px;}
.drow:last-child{border-bottom:none;}
.drow .dk{display:flex;align-items:center;gap:10px;color:#3f3f46;font-weight:500;min-width:140px;}
.drow .dv{margin-left:auto;text-align:right;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:6px;}
/* ícono de campo: línea rosa, sin fondo (como la referencia) */
.dk .pico{display:inline-flex;align-items:center;justify-content:center;width:24px;flex:0 0 auto;color:#E91E63;}
.dk .pico svg{width:21px;height:21px;}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center;}
.stats .st b{display:block;font-size:20px;font-weight:900;color:var(--acc);}
.stats .st span{font-size:11px;color:var(--muted);font-weight:700;}

/* stat trio (adult: respuesta/nivel/miembro) */
[data-tema="adult"] .pcard--stats{background:var(--card);border:1px solid var(--card-border);border-radius:18px;box-shadow:var(--shadow);padding:22px 8px;}
.trio3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;text-align:center;align-items:stretch;}
.trio3 .t3{position:relative;padding:6px 16px 4px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100%;}
.trio3 .t3:not(:last-child)::after{content:"";position:absolute;right:0;top:12%;height:76%;width:1px;background:var(--line);}
.trio3 .t3 .t3ic{height:auto;display:flex;align-items:center;justify-content:center;margin:0 0 12px;}
.trio3 .t3 .t3ic svg{width:28px;height:28px;}
.trio3 .t3 b{display:block;font-size:14px;font-weight:700;color:var(--ink);margin:0 0 7px;line-height:1.25;letter-spacing:-.1px;}
.trio3 .t3 span{font-size:12px;color:#6b6570;font-weight:400;line-height:1.45;display:block;max-width:148px;margin:0 auto;}

/* servicios */
.svc{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
.svc div{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#374151;line-height:1.3;}

/* ===== Sobre mí (adulto — referencia exacta) ===== */
.sobre-card{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
}
[data-tema="adult"] .sobre-card{
  background:#fef6f9;border:1px solid #f3c0d4;border-radius:20px;
  box-shadow:none;padding:20px 22px 18px;
}
[data-tema="adult"] .sobre-attrs{gap:10px;}
[data-tema="adult"] .sobre-card__desc{margin-bottom:14px;}
[data-tema="adult"] .playout{margin-bottom:0;}
.sobre-card__grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(148px,34%);
  gap:20px 28px;
  align-items:center;
}
.sobre-card__left{min-width:0;}
.sobre-card__head{display:flex;align-items:center;gap:8px;margin:0 0 14px;}
.sobre-card__heart{width:22px;height:22px;flex:0 0 22px;display:block;}
.sobre-card__title{margin:0;font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:18px;font-weight:700;color:#111111;line-height:1;}
.sobre-card__desc{margin:0 0 20px;font-family:'Poppins',"Segoe UI",Arial,sans-serif;font-size:15px;font-weight:400;color:#111111;line-height:1.65;}
.sobre-attrs{display:flex;flex-direction:column;gap:12px;}
.sobre-row{
  display:grid;
  grid-template-columns:24px minmax(92px,max-content) minmax(0,1fr);
  column-gap:10px;
  align-items:center;
  min-height:24px;
}
.sobre-row__ic{
  width:24px;height:24px;
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  background:transparent;border-radius:0;
}
.sobre-row__ic svg{width:22px;height:22px;display:block;}
.sobre-row__lab{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:700;color:#111111;
  white-space:nowrap;
}
.sobre-row__val{
  font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:500;color:#111111;
}
.sobre-card__right{
  display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0;width:100%;
}
[data-tema="adult"] .sobre-card__grid{align-items:stretch;}
[data-tema="adult"] .sobre-card__right{
  justify-content:flex-start;align-self:stretch;height:auto;min-height:100%;
}
[data-tema="adult"] .sobre-card__right .sobre-row{
  width:100%;max-width:200px;margin-top:2px;
}
.sobre-back{
  width:100%;max-width:200px;display:flex;justify-content:center;
  padding-top:10px;margin-top:4px;
}
[data-tema="adult"] .sobre-card__right .sobre-back{margin-top:auto;padding-top:8px;}
.sobre-back .profile-back-btn{width:100%;max-width:184px;}
.sobre-sil{
  width:100%;
  margin:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:0;
}
.sobre-sil__img{
  display:block;
  width:100%;
  max-width:200px;
  height:auto;
  margin:0 auto;
}

/* sobre legacy (pro/empresa) */
.sobre{display:flex;gap:16px;}
.sobre p{margin:0;font-size:14px;font-weight:400;line-height:1.5;color:#212121;}
.silbox{flex:0 0 90px;width:90px;}
.silbox .h{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;font-weight:800;}
.measures{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:13px;}
.measures div{display:flex;gap:6px;} .measures b{color:var(--muted);font-weight:800;}

/* actividad / en vivo */
.feed{display:flex;gap:12px;align-items:flex-start;}
.feed .thumb{flex:0 0 110px;width:110px;aspect-ratio:16/10;border-radius:10px;overflow:hidden;background:#ccc;position:relative;}
.feed .thumb img,.feed .thumb .ch-foto-ph{width:100%;height:100%;object-fit:cover;}
.feed .live{position:absolute;top:6px;right:6px;background:#dc2626;color:#fff;font-size:9px;font-weight:900;padding:2px 6px;border-radius:4px;}
.feed .meta{font-size:13px;color:#4b5563;line-height:1.4;}
.feed .meta .when{color:var(--acc);font-weight:900;font-size:12px;}
.livebox{font-size:13px;color:#4b5563;line-height:1.6;}
.livebox .lbtn{display:inline-block;margin-top:8px;background:var(--acc);color:#fff;border-radius:8px;padding:8px 14px;font-weight:900;font-size:12px;}

/* donaciones (moneda dorada) */
.coinfly{position:absolute;z-index:3;bottom:6px;left:6px;animation:coinfloat 2.8s ease-in-out infinite;}
.coinfly--2{bottom:auto;top:24px;left:auto;right:8px;animation-delay:.5s;}
.coinfly--3{bottom:8px;left:auto;right:10px;animation-delay:1.1s;}
@keyframes coinfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.donrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#92660a;background:linear-gradient(90deg,#fff8e1,#fffdf5);border:1px solid #f3d98a;border-radius:9px;padding:6px 9px;}
.donrow b{color:#7a5408;}
.donaviso{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,#fff8e1,#fffdf6);border:1px solid #f1d27a;box-shadow:0 6px 18px rgba(214,160,20,.18);}
.donaviso__txt{flex:1;display:flex;flex-direction:column;font-size:12.5px;color:#7a5408;line-height:1.4;}
.donaviso__txt b{color:#5c3f06;font-size:13.5px;}
.donaviso__pill{display:inline-flex;align-items:center;gap:5px;background:#ffd34d;color:#5c3f06;font-weight:900;font-size:12px;border-radius:999px;padding:5px 11px;border:1px solid #e6a417;}

/* mapa */
.mapwrap{display:flex;gap:14px;flex-wrap:wrap;}
.mapbox{flex:1 1 200px;min-width:180px;aspect-ratio:4/3;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
.coberlist{flex:1 1 180px;display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;align-content:start;font-size:13px;font-weight:700;color:#374151;}
.coberlist div{display:flex;gap:6px;align-items:center;}
.cober-note{font-size:12px;color:var(--muted);margin-top:8px;}

/* reviews */
.rating{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rating .num{font-size:30px;font-weight:900;color:var(--acc);}
.stars{color:#f59e0b;font-size:14px;letter-spacing:1px;}
.review{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
.review .av{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--muted);}
.review .rb{flex:1;min-width:0;}
.review .rn{font-weight:900;font-size:13px;display:flex;align-items:center;gap:8px;}
.review .rt{font-size:13px;color:#4b5563;margin-top:3px;line-height:1.4;}
.review .rd{font-size:11px;color:var(--muted);white-space:nowrap;}

/* faq */
.faq .q{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--line);font-size:14px;font-weight:700;color:#374151;}
.faq .q:first-child{border-top:none;}
.faq .q .chev{color:var(--muted);}

/* trust row */
.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center;}
.trust .ti{font-size:12px;font-weight:800;color:#475569;}
.trust .ti .em{font-size:22px;color:var(--acc);}

/* bottom ad */
.bottomad{
  position:relative;overflow:hidden;border-radius:20px;color:#fff;
  padding:32px 36px;min-height:128px;margin-top:36px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  box-shadow:0 10px 28px rgba(0,0,0,.14);
}
.bottomad.t-blue{background:linear-gradient(135deg,#0f172a,#1e3a8a);}
.bottomad.t-pink{background:linear-gradient(135deg,#2a0a1e,#c91f68 55%,#ec2d7a);}
[data-tema="adult"] .bottomad{
  min-height:140px;padding:36px 40px;margin-top:16px;
}
.bottomad h3{margin:0;font-size:clamp(22px,2.6vw,30px);font-weight:900;line-height:1.15;}
.bottomad p{margin:10px 0 0;font-size:15px;line-height:1.45;opacity:.94;max-width:52ch;}
.bottomad .cta{
  background:linear-gradient(90deg,var(--acc),var(--acc2));color:#fff;border-radius:999px;
  padding:14px 28px;font-weight:900;font-size:15px;flex:0 0 auto;
}
[data-tema="pro"] .bottomad .cta,[data-tema="empresa"] .bottomad .cta{background:#16a34a;}
/* ProfileLayoutProfesional — salud / cédula */
.pro-cta-cita{display:block;width:100%;margin-top:14px;padding:14px 18px;border:none;border-radius:12px;background:#16a34a;color:#fff;font-size:15px;font-weight:800;text-align:center;box-shadow:0 4px 14px rgba(22,163,74,.28);}
.pro-cta-cita:hover{filter:brightness(1.05);}
.pro-online{display:inline-flex;align-items:center;gap:6px;background:#ecfdf5;border:1px solid #a7f3d0;color:#047857;font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;margin-top:10px;}
.pro-seguros{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pro-seguro-chip{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;}
.pro-consultorio{padding:12px 0;border-bottom:1px solid var(--line);}
.pro-consultorio:last-child{border-bottom:none;padding-bottom:0;}
.pro-consultorio__h{font-size:14px;font-weight:800;color:var(--ink);}
.pro-consultorio__addr{font-size:13px;font-weight:600;color:var(--muted);margin-top:4px;line-height:1.4;}
.pro-consultorio__hrs{font-size:12px;font-weight:700;color:#047857;margin-top:6px;}
.pro-cedula-badge{display:inline-flex;align-items:center;gap:6px;background:#e0ecff;color:#1d4ed8;font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;}
.playout--dominatrix .quote{border-color:#4c1d95;background:#faf5ff;}
.vchip--vip{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;color:#92400e;}
.vchip--lgbt{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-color:#7c3aed;color:#5b21b6;}
.vchip--trans{background:linear-gradient(135deg,#cffafe,#a5f3fc);border-color:#0891b2;color:#0e7490;}
.profile-back-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 36px;border-radius:12px;border:1px solid var(--card-border);
  background:#fff;color:#1a1a1a;font-family:'Poppins',"Segoe UI",Arial,sans-serif;
  font-size:14px;font-weight:600;text-decoration:none;box-shadow:var(--shadow);
}
[data-tema="adult"] .profile-back-btn{border-color:#f3c0d4;color:#E91E63;}
[data-tema="adult"] .profile-back-btn svg{width:18px;height:18px;flex:0 0 18px;color:#E91E63;}

[data-tema="adult"] .pcard--stats{align-self:stretch;display:flex;flex-direction:column;justify-content:center;}
[data-tema="adult"] .pcard--stats .trio3{width:100%;}

}

const safe = S.chSafe;

function _rainOverlay(){
  var el=document.getElementById('rainOverlay');
  if(!el){ el=document.createElement('div'); el.id='rainOverlay'; el.className='rain-overlay'; document.body.appendChild(el); }
  return el;
}
function chRain(nivel){
  var map={
    poca:   {n:12,  spread:1.0, bang:"+10 monedas"},
    media:  {n:55,  spread:1.6, bang:"¡LLUVIA DE MONEDAS! +130"},
    diluvio:{n:160, spread:2.4, bang:"¡DILUVIO! +500 monedas"}
  };
  var cfg=map[nivel]||map.poca, ov=_rainOverlay();
  var bang=document.createElement('div'); bang.className='rain-bang';
  bang.innerHTML=coinMini(true)+'<span>'+cfg.bang+'</span>';
  document.body.appendChild(bang); setTimeout(function(){bang.remove();},1800);
  for(var i=0;i<cfg.n;i++){
    setTimeout(function(){
      var c=document.createElement('span'); c.className='rain-coin';
      var size=16+Math.random()*30, dur=2+Math.random()*2.4;
      c.style.left=(Math.random()*99)+'vw'; c.style.width=size+'px'; c.style.height=size+'px';
      c.style.animationDuration=dur+'s';
      c.innerHTML=coinMini(Math.random()<0.22);
      ov.appendChild(c); setTimeout(function(){c.remove();}, dur*1000+250);
    }, Math.random()*cfg.spread*1000);
  }
  var fl=Math.ceil(cfg.n/3);
  for(var j=0;j<fl;j++){
    setTimeout(function(){
      var f=document.createElement('span'); f.className='rain-flash';
      f.style.left=(Math.random()*98)+'vw'; f.style.top=(8+Math.random()*82)+'vh';
      ov.appendChild(f); setTimeout(function(){f.remove();},1000);
    }, Math.random()*cfg.spread*1000);
  }
}

function contactos(u, adulto){
  u=u||{};
  var links=(window.CariHubPerfilContactos&&CariHubPerfilContactos.contactLinks)
    ?CariHubPerfilContactos.contactLinks(u):[];
  function extAttr(key){
    return (key==="wa"||key==="tg"||key==="ig"||key==="fb"||key==="of"||key==="x"||key==="msg")
      ?' target="_blank" rel="noopener noreferrer"':'';
  }
  if(!adulto){
    return links.map(function(it){
      return '<a href="'+safe(it.href)+'"'+extAttr(it.key)+'><span class="ic ic-brand">'+brandLogoSVG(it.key)+'</span>'+safe(it.label)+'</a>';
    }).join("");
  }
  var html=links.map(function(it){
    return '<a href="'+safe(it.href)+'"'+extAttr(it.key)+'>'+contactIconHTML(it.key)+safe(it.label)+'</a>';
  }).join("");
  return '<div class="contact">'+html+'</div>';
}
function tiempoHTML(s){

}

function pagosMethodKey(label){
  var s=String(label||"").toLowerCase();
  if(/efectivo/.test(s)) return "efectivo";
  if(/transfer/.test(s)) return "transferencia";
  if(/tarjeta|card/.test(s)) return "tarjeta";
  if(/línea|linea|online/.test(s)) return "online";
  return "default";
}

    '<div class="pagos-row"><span class="pagos-row__ic">'+pagosRowIcon("header")+'</span><span class="pagos-row__txt">Métodos de pago</span></div>'+

  var vis=Math.min(4,n);
  for(var i=0;i<vis;i++) out += '<div class="t">'+foto(seed+"-"+i, tipo)+'</div>';

}

function gratSourceLabel(source){
  if(source==="live") return "En vivo / Transmisión";
  if(source==="actividad") return "Actividad reciente";
  return "Perfil";
}
function formatGratMXN(n){
  return "$"+Number(n).toLocaleString("es-MX")+" MXN";
}
function updateGratSplit(){
  var amt=_gratState.amount||0;
  var fee=Math.round(amt*GRAT_COMISION);
  var net=amt-fee;
  var feeEl=document.getElementById("gratFee");
  var netEl=document.getElementById("gratNet");
  var pctEl=document.getElementById("gratPct");
  if(feeEl) feeEl.textContent=formatGratMXN(fee);
  if(netEl) netEl.textContent=formatGratMXN(net);
  if(pctEl) pctEl.textContent=String(Math.round(GRAT_COMISION*100));
}
function openGratificarModal(perfilId, source, nombreDisplay){
  _gratState.perfil=perfilId||"";
  _gratState.nombre=nombreDisplay||perfilId||"";
  _gratState.source=source||"perfil";
  _gratState.amount=100;
  var modal=document.getElementById("gratModal");
  var ctx=document.getElementById("gratModalCtx");
  var title=document.getElementById("gratModalTitle");
  if(title) title.textContent="Gratificar a "+(_gratState.nombre||"perfil");
  if(ctx) ctx.textContent=gratSourceLabel(_gratState.source);
  document.querySelectorAll("#gratAmounts button").forEach(function(b){
    b.classList.toggle("is-on", Number(b.getAttribute("data-amt"))===_gratState.amount);
  });
  updateGratSplit();
  if(modal){
    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden","false");
  }
}
function closeGratificarModal(){
  var modal=document.getElementById("gratModal");
  if(modal){
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden","true");
  }
}
function pickGratAmount(n){
  _gratState.amount=n;
  document.querySelectorAll("#gratAmounts button").forEach(function(b){
    b.classList.toggle("is-on", Number(b.getAttribute("data-amt"))===n);
  });
  updateGratSplit();
}
function confirmarGratificacion(){
  if(window.CariHubPerfilPublico&&CariHubPerfilPublico.initFirebaseIfNeeded){
    CariHubPerfilPublico.initFirebaseIfNeeded();
  }
  if(window.CariHubPerfilGratificar&&CariHubPerfilGratificar.confirmar){
    var r=CariHubPerfilGratificar.confirmar(_gratState);
    if(r==="done") closeGratificarModal();
    return;
  }
  var fee=Math.round(_gratState.amount*GRAT_COMISION);
  var net=_gratState.amount-fee;
  alert(
    "Vista previa — Gratificación\n\n"+
    "Perfil: "+_gratState.perfil+"\n"+
    "Desde: "+gratSourceLabel(_gratState.source)+"\n"+
    "Monto: "+formatGratMXN(_gratState.amount)+"\n"+
    "Comisión plataforma ("+Math.round(GRAT_COMISION*100)+"%): "+formatGratMXN(fee)+"\n"+
    "Transferencia al perfil: "+formatGratMXN(net)+"\n\n"+
    "Siguiente paso: enlazar cuenta de pago del visitante."
  );
  closeGratificarModal();
}
document.addEventListener("click", function(e){
  var btn=e.target.closest(".feed-grat-btn");
  if(btn){
    openGratificarModal(
      btn.getAttribute("data-grat-perfil"),
      btn.getAttribute("data-grat-source"),
      btn.getAttribute("data-grat-nombre")
    );
    return;
  }
  if(e.target.id==="gratModal") closeGratificarModal();
});

  var i=((idx%n)+n)%n;
  posts.forEach(function(el,j){
    el.style.display=j===i?"":"none";
  });
  imgs.forEach(function(el,j){
    el.classList.toggle("is-active",j===i);
    el.setAttribute("aria-hidden",j===i?"false":"true");
  });
  dots.forEach(function(dot,j){ dot.classList.toggle("is-on",j===i); });
  return i;
}
var actNegocioTimers=[];

function startActividadNegocioRotation(){

}

function pbSlideDots(count){
  if(count<2) return "";
  var h="";
  for(var i=0;i<count;i++){
    h+='<span class="pb-slot__dot'+(i===0?" is-on":"")+'"></span>';
  }
  return '<div class="pb-slot__dots" aria-hidden="true">'+h+'</div>';
}
function pbRenderSlide(slide,isFirst){
  var active=isFirst?" is-active":"";
  var ah=isFirst?"false":"true";
  if(slide.t==="img"){
    return '<div class="pb-slot__slide'+active+'" aria-hidden="'+ah+'">'+
      '<img src="'+slide.src+'" alt="'+safe(slide.alt||"")+'" decoding="async"></div>';
  }
  return '<div class="pb-slot__slide pb-slot__slide--html '+slide.cls+active+'" aria-hidden="'+ah+'">'+slide.html+'</div>';
}
function pbRotSlot(cfg){
  if(window.CariHubBannerGeneral&&window.CariHubBannerGeneral.mixSlideObjects&&cfg.slides){
    cfg=Object.assign({},cfg,{slides:window.CariHubBannerGeneral.mixSlideObjects(cfg.slides)});
  }
  var slides=cfg.slides||[];
  var body="";
  for(var i=0;i<slides.length;i++) body+=pbRenderSlide(slides[i],i===0);
  var cls="pb-slot"+(cfg.center?" pb--center":"")+(cfg.bottom?" pb-slot--bottom":"");
  return '<a class="'+cls+'" href="'+safe(cfg.href||"#")+'" aria-label="'+safe(cfg.label||"Espacio publicitario")+'">'+
    '<div class="pb-slot__stage" data-pb-stage>'+body+pbSlideDots(slides.length)+'</div></a>';
}
function goPbSlide(stage,nextIdx){
  if(!stage) return 0;
  var slides=stage.querySelectorAll(".pb-slot__slide");
  var dots=stage.querySelectorAll(".pb-slot__dot");
  if(!slides.length) return 0;
  var idx=((nextIdx%slides.length)+slides.length)%slides.length;
  slides.forEach(function(sl,i){
    var on=i===idx;
    sl.classList.toggle("is-active",on);
    sl.setAttribute("aria-hidden",on?"false":"true");
  });
  dots.forEach(function(dot,i){ dot.classList.toggle("is-on",i===idx); });
  return idx;
}
var pbRotateTimers=[];
function stopPbBannerRotation(){
  pbRotateTimers.forEach(function(t){ clearInterval(t); clearTimeout(t); });
  pbRotateTimers=[];
}
function startPbBannerRotation(){
  stopPbBannerRotation();
  document.querySelectorAll("[data-pb-stage]").forEach(function(stage,slot){
    var slides=stage.querySelectorAll(".pb-slot__slide");
    if(slides.length<2) return;
    var state={idx:0};
    var every=PB_ROTATE_MS[slot]||5200;
    var wait=PB_ROTATE_DELAY[slot]||0;
    var kick=setTimeout(function(){
      state.idx=goPbSlide(stage,state.idx+1);
      var loop=setInterval(function(){ state.idx=goPbSlide(stage,state.idx+1); },every);
      pbRotateTimers.push(loop);
    },wait);
    pbRotateTimers.push(kick);
  });
  if(window.CariHubBannerPerfil&&CariHubBannerPerfil.mount) CariHubBannerPerfil.mount();
}

    '</svg>';

}

function queryPerfilPreview(){
  if(window.CariHubPerfilPublico&&CariHubPerfilPublico.queryPerfilPublico){
    return CariHubPerfilPublico.queryPerfilPublico();
  }
  try{
    var p=new URL(location.href).searchParams;
    return{
      id:p.get("id")||"",
      vista:p.get("vista")||"",
      resVista:p.get("resVista")||"",
      from:p.get("from")||"",
      categoria:p.get("categoria")||"",
      pais:p.get("pais")||"",
      estado:p.get("estado")||"",
      ciudad:p.get("ciudad")||""
    };
  }catch(e){
    return{id:"",vista:"",resVista:"",from:"",categoria:"",pais:"",estado:"",ciudad:""};
  }
}
function ocultarSwitcherSiResultados(fromResultados){ fromResultados=true;
  if(!fromResultados) return;
  document.body.classList.add("perfil-desde-resultados");
  var sw=document.querySelector(".switcher");
  if(!sw) return;
  sw.hidden=true;
  sw.setAttribute("aria-hidden","true");
}
function resolverVistaPerfil(u,q){
  q=q||{};
  var vista="";
  if(u&&window.CariHubFieldEngineLite){
    if(CariHubFieldEngineLite.enriquecerPerfilPublico){
      CariHubFieldEngineLite.enriquecerPerfilPublico(u,{
        subcategoriaId:u.subcategoriaId,
        categoria:u.categoria||u.categoriaPublica||q.categoria,
        sectorId:u.sectorId
      });
    }
    if(u.__vista) vista=u.__vista;
    if(!vista&&CariHubFieldEngineLite.resolvePublicPresentation){
      var pres=CariHubFieldEngineLite.resolvePublicPresentation({
        subcategoriaId:u.subcategoriaId,
        categoria:u.categoria||u.categoriaPublica||q.categoria,
        sectorId:u.sectorId
      });
      if(pres&&pres.vistaPerfil) vista=pres.vistaPerfil;
    }
  }
  if(!vista&&u&&window.CariHubResultadosDemo&&CariHubResultadosDemo.vistaDeCategoria){
    vista=CariHubResultadosDemo.vistaDeCategoria(u.categoria||u.categoriaPublica||q.categoria);
  }
  return normalizarVistaPreview(vista)||"adult";
}
function normalizarVistaPreview(vista){
  var v=String(vista||"").trim();
  if(!v) return "";
  var alias={escort:"adult",acompanante:"adult",adulto:"adult",edecan:"adult"};
  return alias[v.toLowerCase()]||v;
}
function resolverPerfilDesdeQuery(q){
  q=q||queryPerfilPreview();
  var vista=normalizarVistaPreview(q.vista)||"";
  var perfil=null;
  if(q.id&&window.CariHubResultadosDemo&&CariHubResultadosDemo.perfilPorId){
    perfil=CariHubResultadosDemo.perfilPorId(q.id,{
      categoria:q.categoria,pais:q.pais,estado:q.estado,ciudad:q.ciudad
    });
    if(perfil&&perfil.__vista) vista=perfil.__vista;
  }
  if(!vista&&q.categoria){
    if(window.CariHubFieldEngineLite&&CariHubFieldEngineLite.resolvePublicPresentation){
      var pres=CariHubFieldEngineLite.resolvePublicPresentation({
        categoria:q.categoria,
        subcategoriaId:CariHubFieldEngineLite.lookupSubcategoriaId(q.categoria)
      });
      if(pres&&pres.vistaPerfil) vista=pres.vistaPerfil;
    }else if(window.CariHubResultadosDemo&&CariHubResultadosDemo.vistaDeCategoria){
      vista=CariHubResultadosDemo.vistaDeCategoria(q.categoria);
    }
  }
  if(!vista) vista="adult";
  return{vista:vista,perfil:perfil};
}
function demoAssetDesdeResultados(src){
  if(window.CariHubPerfilPublico&&CariHubPerfilPublico.demoAssetPath){
    return CariHubPerfilPublico.demoAssetPath(src);

  var s=String(src||"").trim();
  if(!s) return s;
  if(/^(\.\.|\/|https?:)/.test(s)) return s;
  return ""+s.replace(/^\.\//,"");
}

function readFitDesignW(availW){

    if(window.__dashEmbedDesignW&&window.__dashEmbedDesignW>0){
      return Math.max(240,Math.min(window.__dashEmbedDesignW,FIT_DESIGN_W_EMBED));

    if(availW<400){

    }
    return FIT_DESIGN_W_EMBED;

function measureFitArea(outer){
  var rect = outer.getBoundingClientRect();
  var vw = document.documentElement.clientWidth || window.innerWidth || 800;
  var availW = Math.max(280, outer.clientWidth || rect.width || vw);
  return { availW: availW };
}
function applyFit(){
  var outer = document.getElementById("fitOuter");
  var spacer = document.getElementById("fitSpacer");
  var root = document.getElementById("fitRoot");
  var hint = document.getElementById("fitHint");
  if(!outer || !spacer || !root) return;
  if(!document.body.classList.contains("fit")){
    document.documentElement.classList.remove("fit");
    root.style.cssText = "";
    spacer.style.cssText = "";
    outer.scrollTop = 0;
    if(hint) hint.textContent = "";
    window.scrollTo(0, 0);
    return;
  }
  document.documentElement.classList.add("fit");
  window.scrollTo(0, 0);
  outer.scrollTop = 0;
  root.style.transform = "none";
  root.style.zoom = "";
  var area = measureFitArea(outer);
  var pad = 2;
  var designW = readFitDesignW(area.availW);
  root.style.width = designW + "px";
  var contentH = Math.max(1, root.scrollHeight || root.offsetHeight);
  var scaleW = Math.min(1, (area.availW - pad) / designW);
  var scale = scaleW;
  var cropH=recortarEmbedDashboard();
  var offsetY=0;
  if(cropH){
    contentH=cropH.height;
    offsetY=cropH.offset;
  }
  var maxH = window.__dashEmbedMaxH;
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    if(maxH && maxH > 0){
      scale = Math.min(scaleW, maxH / contentH, 1);
    }else{
      scale = Math.min(scaleW, 1);
    }
  }else if(document.body.classList.contains("perfil-embed-dashboard")){
    scale = Math.min(1, (area.availW - pad) / designW);
    scale = Math.max(0.32, scale);
  }else{
    scale = Math.max(0.38, scaleW);
  }
  var scaledH = Math.ceil(contentH * scale);
  if(!document.body.classList.contains("perfil-embed-dashboard-inicio") && maxH && maxH > 0 && scaledH > maxH){
    scale = scale * (maxH / scaledH);
    scaledH = Math.ceil(contentH * scale);
  }
  spacer.style.width = "100%";
  spacer.style.height = scaledH + "px";
  spacer.style.margin = "0";
  root.style.transformOrigin = "top left";
  root.style.transform = "translateY(" + (-offsetY) + "px) scale(" + scale + ")";
  if(document.body.classList.contains("perfil-embed-dashboard-inicio")){
    outer.style.overflow="hidden";
    marcarPersonalizableEmbed();
    try{
      window.parent.postMessage({
        type:"carihub-embed-resize",
        height:scaledH,
        scope:"inicio"
      },"*");
    }catch(e){}
  }else if(document.body.classList.contains("perfil-embed-dashboard")){
    outer.style.overflow="hidden";
    marcarPersonalizableEmbed();
    try{
      window.parent.postMessage({type:"carihub-embed-resize",height:Math.min(480,Math.max(220,Math.ceil(contentH*scale)))},"*");
    }catch(e){}
  }
  if(hint){
    hint.textContent = "Ancho panel · " + Math.round(area.availW) + "px · "
      + Math.round(scale * 100) + "% · scroll ↓";
  }
}

      window.__dashEmbedDesignW=(isFinite(dw)&&dw>0)?dw:null;
    }
    if(ev.data.maxHeight != null){
      var mh=Number(ev.data.maxHeight);
      window.__dashEmbedMaxH=(isFinite(mh)&&mh>0)?mh:null;
    }
    bumpFitDelays();
    return;
  }
});
wirePersonalizeEmbed();
bumpFitDelays();
</script>

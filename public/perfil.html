<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirigiendo al perfil…</title>
<script>
(function () {
  var u = new URL(window.location.href);
  u.pathname = u.pathname.replace(/\/perfil(?:\.html)?$/i, '/perfil-publico.html');
  if (u.searchParams.get('id') && !u.searchParams.get('from')) {
    u.searchParams.set('from', 'resultados');
  }
  location.replace(u.toString());
})();
</script>
</head>
<body>
<p>Redirigiendo al perfil…</p>
</body>
</html>

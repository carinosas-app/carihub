<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --rosa3:#d83b78;
  --fondo:#fff1f7;
  --texto:#252432;
  --gris:#6b6170;
  --verde:#25D366;
  --sombra:0 16px 40px rgba(0,0,0,.14);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
}

body{
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at left 18%, rgba(236,45,122,.17), transparent 28%),
    radial-gradient(circle at right 38%, rgba(236,45,122,.12), transparent 30%),
    linear-gradient(180deg,#fff6fb 0%,#f7edf2 55%,#fff7fb 100%);
  color:var(--texto);
}

button{
  font-family:Arial,sans-serif;
}

.pagina{
  max-width:930px;
  margin:0 auto;
  padding:14px 12px 42px;
}

/* BANNERS SUPERIORES - SAFARI */
.top-banners{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  gap:8px;
  margin-bottom:18px;
  align-items:stretch;
  width:100%;
}

.banner-destacado{
  width:23%;
  min-width:0;
}

.banner-publicidad{
  width:54%;
  min-width:0;
}

.banner-publicidad,
.banner-destacado{
  min-height:94px;
  border-radius:24px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  user-select:none;
  -webkit-user-select:none;
}

.banner-publicidad{
  background:linear-gradient(90deg,#ffffff,#ffe0ef,#ffffff);
  border:3px solid var(--rosa);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:10px 12px;
  box-shadow:
    0 12px 30px rgba(236,45,122,.24),
    0 0 0 5px rgba(255,255,255,.68),
    inset 0 0 22px rgba(255,255,255,.75);
}

.banner-publicidad::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.60),transparent);
  transform:translateX(-120%);
  -webkit-transform:translateX(-120%);
  animation:brilloCariHub 4s infinite;
  -webkit-animation:brilloCariHub 4s infinite;
  pointer-events:none;
}

@keyframes brilloCariHub{
  0%{transform:translateX(-120%);}
  45%{transform:translateX(120%);}
  100%{transform:translateX(120%);}
}

@-webkit-keyframes brilloCariHub{
  0%{-webkit-transform:translateX(-120%);}
  45%{-webkit-transform:translateX(120%);}
  100%{-webkit-transform:translateX(120%);}
}

.banner-publicidad .icono{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:14px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:23px;
  box-shadow:0 5px 14px rgba(236,45,122,.30);
  z-index:1;
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
  z-index:1;
  min-width:0;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:16px;
  font-weight:900;
  line-height:1;
  letter-spacing:.6px;
}

.banner-publicidad .texto p{
  margin:5px 0 7px;
  color:#5c4b55;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:var(--rosa);
  color:white;
  font-size:8px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
}

.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  box-shadow:
    0 10px 24px rgba(236,45,122,.26),
    inset 0 0 15px rgba(255,255,255,.20);
}

.banner-destacado::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,.28),transparent 45%);
  pointer-events:none;
}

.banner-destacado .estrella{
  font-size:20px;
  margin-bottom:4px;
  z-index:1;
}

.banner-destacado h3{
  margin:0;
  font-size:11px;
  font-weight:900;
  letter-spacing:.5px;
  z-index:1;
}

.banner-destacado p{
  margin:4px 0 0;
  font-size:7px;
  font-weight:700;
  line-height:1.15;
  z-index:1;
}

/* LOADER */
.loader-card{
  background:white;
  padding:18px;
  border-radius:28px;
  box-shadow:var(--sombra);
  overflow:hidden;
}

.loader-line,
.loader-img{
  background:linear-gradient(90deg,#f3dbe6,#fff,#f3dbe6);
  background-size:220% 100%;
  animation:skeleton 1.4s infinite;
  border-radius:16px;
}

.loader-img{
  height:340px;
  margin-bottom:16px;
}

.loader-line{
  height:18px;
  margin:10px 0;
}

.loader-line.corta{width:55%;}
.loader-line.media{width:78%;}

@keyframes skeleton{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* PERFIL PREMIUM */
.perfil-card{
  background:white;
  border-radius:34px;
  overflow:hidden;
  box-shadow:
    0 18px 44px rgba(0,0,0,.16),
    -12px 0 28px rgba(236,45,122,.08),
    12px 0 28px rgba(236,45,122,.08);
  margin-bottom:28px;
}

.hero-perfil{
  position:relative;
  width:100%;
  background:#ffe4ef;
}

.hero-perfil img{
  width:100%;
  height:520px;
  object-fit:cover;
  display:block;
}

.hero-perfil::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:48%;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.68));
  pointer-events:none;
}

.badge-top{
  position:absolute;
  top:14px;
  left:14px;
  z-index:3;
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.badge{
  background:rgba(255,255,255,.95);
  color:#b51558;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  box-shadow:0 5px 14px rgba(0,0,0,.18);
}

.badge.verificada{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
}

.titulo-hero{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;
  z-index:4;
  color:white;
}

.titulo-hero h1{
  margin:0 0 7px;
  font-size:42px;
  line-height:1;
  text-shadow:0 3px 12px rgba(0,0,0,.38);
}

.titulo-hero p{
  margin:0;
  font-size:16px;
  font-weight:900;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}

.perfil-body{
  padding:17px;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.info-item{
  background:#fff3f8;
  border:1px solid #ffd3e4;
  padding:12px;
  border-radius:18px;
}

.info-item span{
  display:block;
  color:#9f174f;
  font-size:11px;
  font-weight:900;
  margin-bottom:4px;
  text-transform:uppercase;
}

.info-item b{
  display:block;
  color:#231c25;
  font-size:15px;
  line-height:1.25;
}

.seccion-texto{
  background:white;
  border-left:5px solid var(--rosa);
  padding:13px;
  border-radius:15px;
  color:#4a3f48;
  font-size:16px;
  line-height:1.42;
  margin:13px 0;
}

.seccion-texto h3{
  margin:0 0 8px;
  color:var(--rosa3);
  font-size:19px;
}

.whatsapp{
  display:block;
  width:100%;
  text-align:center;
  margin-top:17px;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:17px;
  border-radius:22px;
  font-size:20px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(37,211,102,.25);
}

.whatsapp:active{
  transform:scale(.985);
}

.galeria{
  margin-top:22px;
}

.galeria h2{
  margin:0 0 13px;
  color:var(--rosa3);
  font-size:25px;
}

.galeria-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.galeria-grid img{
  width:100%;
  border-radius:22px;
  display:block;
  box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.estado-box{
  background:white;
  border-radius:24px;
  padding:18px;
  box-shadow:
    0 8px 24px rgba(0,0,0,.10),
    -8px 0 22px rgba(236,45,122,.06),
    8px 0 22px rgba(236,45,122,.06);
}

.estado-box h2{
  color:var(--rosa3);
  margin:0 0 8px;
}

.estado-box p{
  margin:8px 0 0;
  color:var(--gris);
  font-size:16px;
  line-height:1.35;
}

.acciones-finales{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 10px 26px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* MODAL */
.modal-anuncio{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:18px;
}

.modal-anuncio.activo{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.modal-header{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
  padding:18px;
  text-align:center;
}

.modal-header h2{
  margin:0;
  font-size:25px;
}

.modal-body{
  padding:18px;
}

.modal-body p{
  margin:10px 0;
  font-size:16px;
  line-height:1.35;
}

.modal-body b{
  color:#111;
}

.modal-botones{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:0 18px 18px;
}

.modal-botones a,
.modal-botones button{
  display:block;
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  text-align:center;
  font-weight:900;
  font-size:16px;
  text-decoration:none;
  cursor:pointer;
}

.btn-wa{
  background:#25D366;
  color:white;
}

.btn-cerrar{
  background:#777;
  color:white;
}

@media(max-width:600px){
  .pagina{
    padding:10px 10px 32px;
  }

  .top-banners{
    gap:6px;
    margin-bottom:16px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:19px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .hero-perfil img{
    height:440px;
  }

  .titulo-hero h1{
    font-size:34px;
  }

  .titulo-hero p{
    font-size:14px;
  }

  .perfil-card{
    border-radius:30px;
  }

  .info-grid{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .info-item{
    padding:10px;
    border-radius:16px;
  }

  .info-item b{
    font-size:14px;
  }

  .whatsapp{
    font-size:18px;
    padding:16px;
    border-radius:19px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="pagina">

  <div id="bannersSuperioresCariHub" class="top-banners">

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_ciudad_1')">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Destacado de la ciudad</p>
    </div>

    <div class="banner-publicidad" onclick="abrirInfoAnuncio('publicidad')">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>VER DATOS</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_ciudad_2')">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad local</p>
    </div>

  </div>

  <div id="contenido">
    <div class="loader-card">
      <div class="loader-img"></div>
      <div class="loader-line corta"></div>
      <div class="loader-line media"></div>
      <div class="loader-line"></div>
    </div>
  </div>

</div>

<div class="modal-anuncio" id="modalAnuncio">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitulo">Publicidad</h2>
    </div>

    <div class="modal-body" id="modalContenido"></div>

    <div class="modal-botones">
      <a class="btn-wa" id="modalWhatsApp" href="#" target="_blank">Contactar por WhatsApp</a>
      <button class="btn-cerrar" onclick="cerrarInfoAnuncio()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let ciudadActualPerfil = "Ciudad seleccionada";

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function textoSeguro(t){
  return String(t || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function limpiarTelefono(t){
  return String(t || "").replace(/\D/g,"");
}

function abrirInfoAnuncio(tipo){
  const modal = document.getElementById("modalAnuncio");
  const titulo = document.getElementById("modalTitulo");
  const contenido = document.getElementById("modalContenido");
  const wa = document.getElementById("modalWhatsApp");

  let datos = {
    titulo:"Publicidad disponible",
    nombre:"Espacio disponible para anunciante",
    categoria:"Publicidad / negocio / perfil",
    ubicacion:"Disponible por ciudad",
    horario:"Atención por panel interno próximamente",
    promocion:"Pregunta por precios, duración y destacado",
    descripcion:"Este espacio puede mostrar tu negocio, marca, servicio o perfil destacado.",
    telefono:"528112304664"
  };

  if(tipo.includes("destacado")){
    datos.titulo = "Perfil destacado de la ciudad";
    datos.nombre = "Espacio destacado disponible";
    datos.categoria = "Destacado local";
    datos.ubicacion = ciudadActualPerfil || "Ciudad seleccionada";
    datos.promocion = "Aparece arriba en perfiles de esta ciudad.";
    datos.descripcion = "Ideal para perfiles que quieren más visibilidad dentro de su ciudad.";
  }

  titulo.textContent = datos.titulo;

  contenido.innerHTML = `
    <p><b>Nombre:</b> ${textoSeguro(datos.nombre)}</p>
    <p><b>Categoría:</b> ${textoSeguro(datos.categoria)}</p>
    <p><b>Ubicación:</b> ${textoSeguro(datos.ubicacion)}</p>
    <p><b>Horario:</b> ${textoSeguro(datos.horario)}</p>
    <p><b>Promoción:</b> ${textoSeguro(datos.promocion)}</p>
    <p><b>Descripción:</b> ${textoSeguro(datos.descripcion)}</p>
  `;

  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  wa.href = "https://wa.me/" + datos.telefono + "?text=" + msg;

  modal.classList.add("activo");
}

function cerrarInfoAnuncio(){
  document.getElementById("modalAnuncio").classList.remove("activo");
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="history.back()">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html?abrir=registro'">Registrarse</button>
    </div>
  `;
}

async function cargarPerfil(){
  const id = obtenerParametro("id");
  const contenido = document.getElementById("contenido");

  if(!id){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Perfil no encontrado</h2>
        <p>No llegó el ID del perfil.</p>
      </div>
      ${botonesFinales()}
    `;
    return;
  }

  try{
    const doc = await db.collection("usuarios").doc(id).get();

    if(!doc.exists){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no encontrado</h2>
          <p>Este perfil no existe o fue eliminado.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const u = doc.data();

    ciudadActualPerfil = u.ciudad || "Ciudad seleccionada";

    let vencido = false;

    if(u.vencido === true){
      vencido = true;
    }

    if(u.fechaVencimiento){
      const fechaV = u.fechaVencimiento.toDate
        ? u.fechaVencimiento.toDate()
        : new Date(u.fechaVencimiento);

      if(fechaV < new Date()){
        vencido = true;
      }
    }

    if(u.aprobado !== true || u.activo !== true || vencido){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no disponible</h2>
          <p>Este perfil no está activo públicamente.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const tel = limpiarTelefono(u.telefono || "");
    const msg = encodeURIComponent("Hola, vi tu perfil en CariHub y me gustaría recibir más información.");

    const nombre = u.nombre || "Perfil";
    const foto = u.fotoURL || "";
    const categoria = u.categoria || "";
    const pais = u.pais || "";
    const estado = u.estado || "";
    const ciudad = u.ciudad || "";
    const descripcion = u.descripcion || "";
    const descripcionCompleta = u.descripcionCompleta || "";
    const precio = u.precio || "Consultar";
    const modalidad = u.modalidad || "Consultar";
    const horario = u.horario || "";
    const zona = u.zona || "";
    const servicios = u.servicios || "";

    contenido.innerHTML = `
      <div class="perfil-card">

        <div class="hero-perfil">
          ${foto ? `<img src="${textoSeguro(foto)}" alt="Foto pública" loading="eager">` : ""}

          <div class="badge-top">
            <span class="badge verificada">Verificada</span>
            ${categoria ? `<span class="badge">${textoSeguro(categoria)}</span>` : ""}
          </div>

          <div class="titulo-hero">
            <h1>${textoSeguro(nombre)}</h1>
            <p>📍 ${textoSeguro(ciudad)}, ${textoSeguro(estado)}</p>
          </div>
        </div>

        <div class="perfil-body">

          <div class="info-grid">
            <div class="info-item">
              <span>Categoría</span>
              <b>${textoSeguro(categoria)}</b>
            </div>

            <div class="info-item">
              <span>Ciudad</span>
              <b>${textoSeguro(ciudad)}</b>
            </div>

            <div class="info-item">
              <span>Precio</span>
              <b>${textoSeguro(precio)}</b>
            </div>

            <div class="info-item">
              <span>Modalidad</span>
              <b>${textoSeguro(modalidad)}</b>
            </div>

            <div class="info-item">
              <span>Estado</span>
              <b>${textoSeguro(estado)}</b>
            </div>

            <div class="info-item">
              <span>País</span>
              <b>${textoSeguro(pais)}</b>
            </div>
          </div>

          ${descripcion ? `
            <div class="seccion-texto">
              <h3>Descripción</h3>
              ${textoSeguro(descripcion)}
            </div>
          ` : ""}

          ${descripcionCompleta ? `
            <div class="seccion-texto">
              <h3>Información completa</h3>
              ${textoSeguro(descripcionCompleta)}
            </div>
          ` : ""}

          ${horario ? `
            <div class="seccion-texto">
              <h3>Horario</h3>
              ${textoSeguro(horario)}
            </div>
          ` : ""}

          ${zona ? `
            <div class="seccion-texto">
              <h3>Zona</h3>
              ${textoSeguro(zona)}
            </div>
          ` : ""}

          ${servicios ? `
            <div class="seccion-texto">
              <h3>Servicios / detalles</h3>
              ${textoSeguro(servicios)}
            </div>
          ` : ""}

          ${tel ? `
            <a class="whatsapp" href="https://wa.me/${tel}?text=${msg}" target="_blank">
              Contactar por WhatsApp
            </a>
          ` : ""}

          ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
            <div class="galeria">
              <h2>Fotos públicas</h2>
              <div class="galeria-grid">
                ${u.fotosExtraURL.map(f => `
                  <img src="${textoSeguro(f)}" alt="Foto pública extra" loading="lazy">
                `).join("")}
              </div>
            </div>
          ` : ""}

        </div>
      </div>

      ${botonesFinales()}
    `;

  }catch(error){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 112" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="lunaPink" x1="8" y1="6" x2="92" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD0E4"/>
      <stop offset=".28" stop-color="#FF7EB8"/>
      <stop offset=".72" stop-color="#FF4D96"/>
      <stop offset="1" stop-color="#C91563"/>
    </linearGradient>
    <linearGradient id="lunaGold" x1="0" y1="0" x2="100" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6D0"/>
      <stop offset=".45" stop-color="#E8C766"/>
      <stop offset="1" stop-color="#9A6B12"/>
    </linearGradient>
    <linearGradient id="lunaShine" x1="18" y1="18" x2="52" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heartPink" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB8D8"/>
      <stop offset="1" stop-color="#FF4D96"/>
    </linearGradient>
  </defs>
  <!-- Luna en C  borde dorado -->
  <path fill="url(#lunaPink)" stroke="url(#lunaGold)" stroke-width="1.8" stroke-linejoin="round"
    d="M58 18
       C34 12 12 30 10 56
       C8 78 20 98 42 102
       C54 105 66 98 70 84
       C52 98 28 92 20 66
       C14 46 24 24 46 18
       C50 17 54 17 58 18Z"/>
  <path fill="url(#lunaShine)" opacity=".45"
    d="M24 30 C32 22 44 20 54 24 C42 26 32 36 28 50 C26 38 24 34 24 30Z"/>
  <!-- Silueta de mujer (recorte interior) -->
  <path fill="var(--logo-cutout,#0D1118)"
    d="M34 34
       C30 38 28 46 29 56
       C30 66 34 76 40 86
       C42 78 43 68 42 58
       C40 46 37 36 34 34Z"/>
  <path fill="var(--logo-cutout,#0D1118)"
    d="M32 36 C28 44 27 54 29 64 C31 72 36 80 41 86 C38 74 36 62 35 50 C34 42 33 38 32 36Z"/>
  <!-- Mechón / cabello -->
  <path stroke="var(--logo-cutout,#0D1118)" stroke-width="1.1" fill="none" opacity=".55"
    d="M31 34 Q27 48 29 62 M33 32 Q30 44 32 56"/>
  <!-- Ojo cerrado y pestańas del perfil -->
  <path stroke="#FF6AAD" stroke-width=".85" stroke-linecap="round"
    d="M38 50 L36 48 M39 49 L37 47 M40 50 L39 48"/>
  <!-- Corazón inferior (bajo la barbilla) -->
  <path fill="url(#heartPink)" stroke="url(#lunaGold)" stroke-width="1.15"
    d="M38 88 C34 84 30 87 30 91 C30 96 38 100 38 100 C38 100 46 96 46 91 C46 87 42 84 38 88Z"/>
  <!-- Corazón superior en la punta de la luna -->
  <path fill="url(#heartPink)" stroke="url(#lunaGold)" stroke-width="1.35"
    d="M74 6 C68 0 60 4 60 12 C60 20 74 26 74 26 C74 26 88 20 88 12 C88 4 80 0 74 6Z"/>
  <!-- Pestańas del corazón superior -->
  <path stroke="#FF6AAD" stroke-width=".75" stroke-linecap="round"
    d="M64 8 L62 4 M66 7 L64 3 M68 8 L67 4 M70 9 L69 5 M72 9 L71 5"/>
</svg>

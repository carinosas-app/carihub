<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Vista previa espacio en vivo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1538"/>
      <stop offset="55%" stop-color="#1a0f28"/>
      <stop offset="100%" stop-color="#0d0814"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff4081" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff4081" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff4081" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="760" height="320" fill="url(#bg)"/>
  <rect width="760" height="320" fill="url(#glow)"/>
  <ellipse cx="380" cy="160" rx="180" ry="90" fill="#ff4081" opacity="0.12" filter="url(#soft)"/>
  <!-- Monitor / transmisiˇn -->
  <rect x="118" y="72" width="320" height="176" rx="18" fill="#120a1c" stroke="#ff4081" stroke-width="3"/>

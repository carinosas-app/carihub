  <rect x="470" y="98" width="172" height="124" rx="14" fill="#1b1026" stroke="#5c3d72" stroke-width="2"/>
  <circle cx="556" cy="150" r="28" fill="#2d1a3d" stroke="#ff4081" stroke-width="3"/>
  <circle cx="556" cy="150" r="10" fill="#ff4081"/>

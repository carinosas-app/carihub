<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 320" role="img" aria-label="Vista previa: alguien publicˇ un estado">
  <defs>
    <linearGradient id="bgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f9"/>
      <stop offset="100%" stop-color="#fce4ef"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="118" cy="118" r="52"/>
    </clipPath>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e91e63" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="760" height="320" fill="url(#bgE)"/>
  <!-- Tarjeta de estado publicado -->
  <rect x="36" y="36" width="688" height="248" rx="22" fill="#fff" filter="url(#cardShadow)"/>
  <!-- Avatar con anillo verde (estado activo) -->
  <circle cx="118" cy="118" r="58" fill="none" stroke="#22c55e" stroke-width="5"/>
  <image href="../../preview/img/violeta-1.png" x="66" y="66" width="104" height="104" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  <!-- Badge -->
  <rect x="56" y="168" width="124" height="28" rx="14" fill="#22c55e"/>
  <text x="118" y="187" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">ESTADO</text>
  <!-- Texto del estado -->
  <text x="200" y="98" fill="#1a1c2e" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Violeta publicˇ un estado</text>
  <text x="200" y="128" fill="#6b6170" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Hoy, 10:30 AM</text>
  <text x="200" y="162" fill="#3b2430" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">Actualizˇ su disponibilidad y subiˇ</text>
  <text x="200" y="188" fill="#3b2430" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">nuevas fotos a su galerÝa.</text>
  <!-- Miniatura del estado -->
  <rect x="200" y="208" width="88" height="58" rx="10" fill="#f8dce8" stroke="#f5c2d6" stroke-width="2"/>
  <image href="../../preview/img/violeta-3.png" x="202" y="210" width="84" height="54" preserveAspectRatio="xMidYMid slice" clip-path="inset(0 round 8px)"/>
  <rect x="298" y="208" width="380" height="58" rx="10" fill="#fff7fb" stroke="#f8dce8" stroke-width="2"/>
  <text x="318" y="242" fill="#c2185b" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Espacio para tu estado publicado</text>
</svg>

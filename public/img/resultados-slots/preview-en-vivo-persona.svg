<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 320" role="img" aria-label="Vista previa: transmisión en vivo">
  <defs>
    <linearGradient id="liveShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.05)"/>
      <stop offset="55%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Foto de la persona en vivo -->
  <image href="../../preview/img/violeta-2.png" x="0" y="0" width="760" height="320" preserveAspectRatio="xMidYMid slice"/>
  <rect width="760" height="320" fill="url(#liveShade)"/>
  <!-- LIVE -->
  <rect x="28" y="24" width="132" height="40" rx="20" fill="#e91e63"/>
  <circle cx="52" cy="44" r="7" fill="#fff"/>
  <circle cx="52" cy="44" r="4" fill="#e91e63"/>
  <text x="72" y="50" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="900">EN VIVO</text>
  <!-- Viewers -->
  <rect x="580" y="24" width="152" height="36" rx="18" fill="rgba(0,0,0,0.55)"/>
  <text x="656" y="48" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">128 viendo</text>
  <!-- Nombre y título del live -->
  <text x="36" y="268" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Mariana · en vivo ahora</text>
  <text x="36" y="296" fill="#f8dce8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Presentación y preguntas en directo</text>
  <!-- Icono cámara -->
  <circle cx="680" cy="250" r="34" fill="rgba(233,30,99,0.92)"/>
  <polygon points="668,236 668,264 692,250" fill="#fff"/>
</svg>

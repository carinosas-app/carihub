<script>
(function () {
  try {
    var cat = new URLSearchParams(location.search).get('categoria') || '';
    if (!cat) return;
    var k = cat.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    var s = 'adultos';
    if (k.indexOf('restaur') >= 0 || k.indexOf('marisquer') >= 0 || k.indexOf('taquer') >= 0 || k.indexOf('gastronom') >= 0) s = 'restaurantes';
    else if (k.indexOf('medic') >= 0 || k.indexOf('doctor') >= 0 || k.indexOf('enfermer') >= 0 || k.indexOf('dent') >= 0 || k.indexOf('salud') >= 0) s = 'salud';
    else if (k.indexOf('bienestar') >= 0 || k.indexOf('yoga') >= 0 || k.indexOf('masaje') >= 0 && k.indexOf('erot') < 0) s = 'bienestar';
    else if (k.indexOf('mecan') >= 0 || k.indexOf('vulcaniz') >= 0 || k.indexOf('automo') >= 0) s = 'automotriz';
    else if (k.indexOf('abogad') >= 0 || k.indexOf('contador') >= 0 || k.indexOf('profesion') >= 0) s = 'profesionales';
    else if (k.indexOf('plomer') >= 0 || k.indexOf('limpieza') >= 0 || k.indexOf('hogar') >= 0) s = 'hogar';
    else if (k.indexOf('tienda') >= 0 || k.indexOf('comercio') >= 0) s = 'comercio';
    else if (k.indexOf('veterin') >= 0 || k.indexOf('mascot') >= 0 || k.indexOf('pet') >= 0) s = 'mascotas';
    else if (k.indexOf('evento') >= 0 || k.indexOf('banquet') >= 0 || k.indexOf('dj') >= 0) s = 'eventos';
    else if (k.indexOf('escuela') >= 0 || k.indexOf('tutor') >= 0 || k.indexOf('educac') >= 0) s = 'educacion';
    else if (k.indexOf('tecno') >= 0 || k.indexOf('comput') >= 0 || k.indexOf('software') >= 0) s = 'tecnologia';
    else if (k.indexOf('mudanz') >= 0 || k.indexOf('flete') >= 0 || k.indexOf('transport') >= 0) s = 'transporte';
    else if (k.indexOf('industr') >= 0 || k.indexOf('maquin') >= 0) s = 'industria';
    else if (k.indexOf('inmobil') >= 0 || k.indexOf('bienes') >= 0 || k.indexOf('casa') >= 0 && k.indexOf('escort') < 0) s = 'bienes-raices';
    document.body.setAttribute('data-sector', s);
    /* LGBTQ+ FOUC — misma lista/norma que CariHubResultadosSector.esSubcategoriaLgbt (exact match). */
    var lgbtCanon = [
      'escort gay',
      'antro restaurant bar lgbt',
      'trans',
      'femboy',
      'lesbians',
      'tom boy',
      'tom fem'
    ];
    var lgbtKey = String(cat || '')
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[-_]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
    for (var i = 0; i < lgbtCanon.length; i++) {
      if (lgbtKey === lgbtCanon[i]) {
        document.body.setAttribute('data-subtema', 'lgbt');
        break;
      }
    }
  } catch (e) { /* tema temprano opcional */ }
})();
</script>

<script>
(function () {
  /* Demo del IDE: solo localhost / ?preview=1 — producción usa perfiles reales de Firestore.
     Opt-in emulator (?firebaseEmulator=1 | localStorage | __CARIHUB_FIREBASE_EMULATOR__)
     alinea con carihub-core.js: no forzar preview; permite perfiles registrados. */
  var p = new URLSearchParams(location.search);
  if (p.has('vista')) return;

  var emuQ = p.get('firebaseEmulator');
  if (emuQ === '1' || emuQ === 'true') return;
  if (emuQ === '0' || emuQ === 'false') {
    /* explicit off — keep local demo fallback below when on localhost */
  } else {
    try {
      if (window.__CARIHUB_FIREBASE_EMULATOR__ === true) return;
      if (window.__CARIHUB_FIREBASE_EMULATOR__ === false) {
        /* explicit off via window flag */
      } else if (window.localStorage) {
        var ls = localStorage.getItem('carihub.firebaseEmulator');
        if (ls === '1' || ls === 'true') return;
      }
    } catch (e) { /* ignore */ }
  }

  var host = location.hostname;
  var esDev = host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:' || p.get('preview') === '1';
  if (!esDev) return;
  p.set('vista', 'con-resultados');
  if (!p.has('categoria')) p.set('categoria', 'Cariñosas');
  if (!p.has('pais')) p.set('pais', 'México');
  if (!p.has('estado')) p.set('estado', 'Nuevo León');
  if (!p.has('ciudad')) p.set('ciudad', 'Monterrey');
  location.replace(location.pathname + '?' + p.toString());
})();
</script>

<script>
(function () {
  'use strict';

  var FILTRO = 'todos';
  var TODOS = [];
  var Q = { categoria: 'Cariñosas', pais: 'México', estado: '', ciudad: '' };

  /** Fallback embebido — funciona aunque falle resultados-demo.js */
  var perfilesFallback = [
    {
      __id: 'demo-violeta',
      nombre: 'Violeta',
      edad: 24,
      categoria: 'Cariñosas',
      ciudad: 'Monterrey',
      estado: 'Nuevo León',
      zona: 'San Pedro',
      ubicacion: 'San Pedro, Monterrey',
      precio: '2,000',
      tagline: 'Complaciente y cariñosa, trato de novia.',
      observaciones: ['Complaciente', 'Cariñosa', 'Trato de novia'],
      modalidades: ['recibe', 'hotel', 'domicilio'],
      verificada: true,
      nueva: true,
      disponibilidad: 'Consultar disponibilidad',
      respuestaRapida: true,
      fotoURL: 'img/resultados-demo/violeta-1.png',
      fotosCount: 15
    },
    {
      __id: 'demo-mariana',
      nombre: 'Mariana',
      edad: 23,
      categoria: 'Cariñosas',
      ciudad: 'Monterrey',
      estado: 'Nuevo León',
      zona: 'Monterrey Centro',
      ubicacion: 'Monterrey Centro',
      precio: '1,800',
      tagline: 'Acompañante elegante, discreta y muy atenta.',
      observaciones: ['Acompañante', 'Elegante', 'Discreta', 'Atenta'],
      modalidades: ['recibe', 'hotel'],
      verificada: true,
      nueva: false,
      disponibilidad: 'Consultar disponibilidad',
      respuestaRapida: true,
      fotoURL: 'img/resultados-demo/violeta-2.png',
      fotosCount: 12
    },
    {
      __id: 'demo-sofia',
      nombre: 'Sofía',
      edad: 22,
      categoria: 'Cariñosas',
      ciudad: 'Apodaca',
      estado: 'Nuevo León',
      zona: 'Apodaca',
      ubicacion: 'Apodaca, Nuevo León',
      precio: '1,500',
      tagline: 'Linda, divertida y muy complaciente.',
      observaciones: ['Linda', 'Divertida', 'Complaciente'],
      modalidades: ['recibe', 'hotel', 'domicilio'],
      verificada: true,
      nueva: false,
      disponibilidad: 'Ocupada',
      respuestaRapida: true,
      fotoURL: 'img/resultados-demo/violeta-3.png',
      fotosCount: 18
    }
  ];

  function refreshQ() {
    if (window.CariHubResultadosDemo && CariHubResultadosDemo.queryFromLocation) {
      Q = CariHubResultadosDemo.queryFromLocation();
    }
    try {
      if (window.CariHubResultadosSector && Q && Q.categoria) {
        CariHubResultadosSector.aplicarTemaSector(Q.categoria);
      }
    } catch (e) { /* tema opcional */ }
    try { syncSbarPickerTheme(); } catch (e) { /* picker opcional */ }
    try {
      if (window.CHUI && CHUI.aplicarTema && Q && Q.categoria) {
        CHUI.aplicarTema(Q.categoria);
      }
    } catch (e) { /* opcional */ }
    remountResultadosBanners();
  }

  function remountResultadosBanners() {
    try {
      if (window.CariHubBannerResultadosPrincipales && CariHubBannerResultadosPrincipales.mount) {
        CariHubBannerResultadosPrincipales.mount({ Q: Q, force: true });
      }
    } catch (e) { /* banners opcionales */ }
  }

  function safeTxt(t) {
    if (window.CHUI && CHUI.chSafe) return CHUI.chSafe(t);
    return String(t == null ? '' : t)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  var RES_META = null;

  function perfilesBase() {
    if (window.CariHubResultadosDemo && CariHubResultadosDemo.componerListaResultados) {
      var comp = CariHubResultadosDemo.componerListaResultados(Q);
      RES_META = comp.meta || null;
      return comp.perfiles || [];
    }
    return [];
  }

  function setListaVacia(list, esVacio) {
    if (!list) return;
    list.classList.toggle('res-lista--vacio', !!esVacio);
  }

  function renderProfilesLocal(list, perfiles) {
    if (!list) return;
    if (!perfiles || !perfiles.length) {
      setListaVacia(list, true);
      if (window.CariHubResultadosDemo && CariHubResultadosDemo.vacioResultadosHTML) {
        list.innerHTML = CariHubResultadosDemo.vacioResultadosHTML(Q);
      }
      if (window.CariHubResultadosDemo && CariHubResultadosDemo.syncBannersVista) {
        CariHubResultadosDemo.syncBannersVista(true, Q);
      } else if (window.CariHubBannerResultadosPrincipales && CariHubBannerResultadosPrincipales.mount) {
        CariHubBannerResultadosPrincipales.mount({ Q: Q, force: true });
      }
      return;
    }
    setListaVacia(list, false);
    list.innerHTML = perfiles.map(function (u) {
      try {
        if (window.CariHubResultadosDemo && CariHubResultadosDemo.cardHTML) {
          return CariHubResultadosDemo.cardHTML(u, Q);
        }
      } catch (e) { /* fallback mínimo */ }
      return '<article class="pcard res-card"><div class="res-card__body"><h2 class="res-card__name">' + safeTxt(u.nombre) + '</h2></div></article>';
    }).join('');
  }

  function renderProfiles(list, perfiles) {
    if (!list) return;
    var items = perfiles || [];
    try {
      if (window.CariHubResultadosDemo && CariHubResultadosDemo.renderProfiles) {
        CariHubResultadosDemo.renderProfiles(list, items, { filtro: FILTRO, Q: Q });
        return;
      }
    } catch (e) {
      console.warn('renderProfiles demo:', e);
    }
    renderProfilesLocal(list, items);
  }

  function bootResultadosDemo() {
    var list = document.getElementById('profilesList');
    if (!list) return;
    refreshQ();

    function pintar() {
      var perfiles = perfilesBase();
      TODOS = perfiles || [];
      renderProfiles(list, TODOS);
      if (window.CariHubFavoritos && CariHubFavoritos.prepararUsuario) {
        CariHubFavoritos.prepararUsuario()
          .then(function () { return CariHubFavoritos.sincronizarBotones(list); })
          .catch(function () { /* opcional */ });
      }
      if (typeof scheduleFit === 'function') scheduleFit();
      else if (typeof syncResListaSlots === 'function') syncResListaSlots();
    }

    var preview = vistaPreviaActiva();
    if (!preview && window.CariHubResultadosRegistrados && typeof CariHubResultadosRegistrados.cargar === 'function') {
      list.setAttribute('aria-busy', 'true');
      CariHubResultadosRegistrados.cargar().then(pintar).catch(function () {
        pintar();
      }).finally(function () {
        list.removeAttribute('aria-busy');
      });
      return;
    }
    pintar();
  }

  function aplicarVista() {
    var list = document.getElementById('profilesList');
    if (!list) return;
    refreshQ();

    function pintar() {
      TODOS = perfilesBase() || [];
      renderProfiles(list, TODOS);
      if (window.CariHubFavoritos && CariHubFavoritos.prepararUsuario) {
        CariHubFavoritos.prepararUsuario()
          .then(function () { return CariHubFavoritos.sincronizarBotones(list); })
          .catch(function () { /* opcional */ });
      }
      if (typeof scheduleFit === 'function') scheduleFit();
      else if (typeof syncResListaSlots === 'function') syncResListaSlots();
    }

    var preview = vistaPreviaActiva();
    if (!preview && window.CariHubResultadosRegistrados && typeof CariHubResultadosRegistrados.cargar === 'function') {
      CariHubResultadosRegistrados.cargar().then(pintar).catch(pintar);
      return;
    }
    pintar();
  }

  window.resBuscarCerca = function () {
    if (!navigator.geolocation) {
      alert('Tu navegador no permite detectar ubicación.');
      location.href = 'index.html';
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function () { location.href = 'index.html?buscar=cerca'; },
      function () {
        alert('No se pudo detectar ubicación. Puedes seleccionar ciudad manualmente.');
        location.href = 'index.html';
      }
    );
  };

  window.resVolverInicio = function () {
    location.href = 'index.html';
  };

  window.resVolverAnterior = function () {
    try {
      if (window.history.length > 1) {
        history.back();
        return;
      }
    } catch (e) { /* noop */ }
    resVolverInicio();
  };

  function paisesLista() {
    if (typeof TODOS_LOS_PAISES !== 'undefined' && TODOS_LOS_PAISES.length) {
      return TODOS_LOS_PAISES.slice();
    }
    if (typeof PAISES_PRINCIPALES !== 'undefined' && PAISES_PRINCIPALES.length) {
      return PAISES_PRINCIPALES.slice();
    }
    return ['México'];
  }

  function estadosDePais(pais) {
    if (typeof ESTADOS !== 'undefined' && ESTADOS[pais]) {
      return ESTADOS[pais].slice();
    }
    return [];
  }

  function ciudadesDe(pais, estado) {
    if (typeof CIUDADES !== 'undefined' && CIUDADES[pais] && CIUDADES[pais][estado]) {
      return CIUDADES[pais][estado].slice();
    }
    return [];
  }

  function fillSelect(el, items, selected) {
    if (!el) return;
    var list = (items && items.length) ? items : ['—'];
    var sel = selected && list.indexOf(selected) >= 0 ? selected : list[0];
    el.innerHTML = list.map(function (v) {
      var isSel = (v === sel) ? ' selected' : '';
      return '<option value="' + safeTxt(v) + '"' + isSel + '>' + safeTxt(v) + '</option>';
    }).join('');
    el.value = sel;
  }

  function fillSelectOpcional(el, items, selected, placeholder) {
    if (!el) return;
    var ph = placeholder || 'Todos';
    var opts = [{ v: '', t: ph }];
    (items || []).forEach(function (v) { opts.push({ v: v, t: v }); });
    var sel = (selected != null) ? selected : '';
    el.innerHTML = opts.map(function (o) {
      var isSel = (o.v === sel) ? ' selected' : '';
      return '<option value="' + safeTxt(o.v) + '"' + isSel + '>' + safeTxt(o.t) + '</option>';
    }).join('');
    el.value = sel;
  }

  function refreshSbarOpciones(clearUbic) {
    var pais = document.getElementById('resSbarPais');
    var estado = document.getElementById('resSbarEstado');
    var ciudad = document.getElementById('resSbarCiudad');
    if (!pais || !estado || !ciudad) return;
    if (clearUbic) {
      estado.value = '';
      ciudad.value = '';
    }
    var estSel = estado.value || '';
    var estados = estadosDePais(pais.value);
    if (estSel && estados.indexOf(estSel) < 0) estados.unshift(estSel);
    fillSelectOpcional(estado, estados, estSel, 'Todos los estados');
    var est = estado.value || '';
    var ciudades = est ? ciudadesDe(pais.value, est) : [];
    var ciuSel = ciudad.value || '';
    if (ciuSel && ciudades.indexOf(ciuSel) < 0) ciudades.unshift(ciuSel);
    fillSelectOpcional(ciudad, ciudades, ciuSel, 'Todas las ciudades');
    syncSbarLabels();
  }

  function syncSbarEstados() {
    refreshSbarOpciones(false);
  }

  function syncQFromSbar() {
    var cat = document.getElementById('resSbarCat');
    var pais = document.getElementById('resSbarPais');
    var estado = document.getElementById('resSbarEstado');
    var ciudad = document.getElementById('resSbarCiudad');
    if (cat) Q.categoria = cat.value || Q.categoria;
    if (pais) Q.pais = pais.value || Q.pais;
    if (estado) Q.estado = estado.value || '';
    if (ciudad) Q.ciudad = ciudad.value || '';
  }

  function syncSbarLabels() {
    var map = [
      { sel: 'resSbarCat', lbl: 'resSbarCatLabel', empty: 'Categoría' },
      { sel: 'resSbarPais', lbl: 'resSbarPaisLabel', empty: 'País' },
      { sel: 'resSbarEstado', lbl: 'resSbarEstadoLabel', empty: 'Todos' },
      { sel: 'resSbarCiudad', lbl: 'resSbarCiudadLabel', empty: 'Todas' }
    ];
    map.forEach(function (m) {
      var el = document.getElementById(m.sel);
      var lbl = document.getElementById(m.lbl);
      if (!el || !lbl) return;
      var opt = el.options[el.selectedIndex];
      var txt = (opt && opt.textContent) ? opt.textContent.trim() : '';
      lbl.textContent = txt || m.empty;
    });
  }

  function sbarSelectEl(field) {
    var ids = { cat: 'resSbarCat', pais: 'resSbarPais', estado: 'resSbarEstado', ciudad: 'resSbarCiudad' };
    return document.getElementById(ids[field] || '');
  }

  function sectorActivoResultados() {
    if (window.CariHubResultadosSector && CariHubResultadosSector.sectorDeCategoria && Q && Q.categoria) {
      return CariHubResultadosSector.sectorDeCategoria(Q.categoria);
    }
    return 'adultos';
  }

  /** Subcategorías del sector actual desde el schema index (misma fuente que
      renderiza las tarjetas). value = subcategoriaId canónico → sin fuga entre
      sectores. Adultos conserva su catálogo (labels comerciales: Cariñosas…). */
  function sbarCategoriasDeSchema(sectorId) {
    var idx = window.CARIHUB_REGISTRO_SCHEMA_INDEX;
    if (!idx || !idx.byId) return [];
    var out = [];
    var vistos = {};
    Object.keys(idx.byId).forEach(function (k) {
      var row = idx.byId[k];
      if (!row || row.sectorId !== sectorId) return;
      var val = String(row.subcategoriaId || '').trim();
      if (!val || vistos[val]) return;
      vistos[val] = true;
      out.push({ value: val, label: String(row.subcategoria || val).trim() });
    });
    out.sort(function (a, b) { return a.label.localeCompare(b.label, 'es'); });
    return out;
  }

  function sbarCategoriasEntries() {
    var entries = [];
    var sectorId = sectorActivoResultados();

    if (sectorId && sectorId !== 'adultos') {
      entries = sbarCategoriasDeSchema(sectorId);
    }

    if (!entries.length && window.CariHubCatalogos && CariHubCatalogos.categorias) {
      CariHubCatalogos.categorias().forEach(function (c) {
        entries.push({ value: c.label, label: c.label });
      });
    }

    if (!entries.length) {
      ['Cariñosas', 'Masajes', 'Stripper'].forEach(function (v) {
        entries.push({ value: v, label: v });
      });
    }

    var sel = (Q && Q.categoria) ? String(Q.categoria).trim() : '';
    if (sel && !entries.some(function (e) { return e.value === sel || e.label === sel; })) {
      var lbl = sel;
      if (window.CariHubCatalogos && CariHubCatalogos.labelCategoria) {
        lbl = CariHubCatalogos.labelCategoria(sel) || sel;
      }
      entries.unshift({ value: sel, label: lbl });
    }

    return entries;
  }

  function fillSelectEntries(el, entries, selectedValue) {
    if (!el || !entries || !entries.length) return;
    var sel = String(selectedValue || '').trim();
    var match = entries.find(function (e) { return e.value === sel || e.label === sel; });
    if (!match && window.CariHubCatalogos && CariHubCatalogos.labelCategoria && sel) {
      var resolved = CariHubCatalogos.labelCategoria(sel);
      match = entries.find(function (e) { return e.value === resolved || e.label === resolved; });
      if (match) sel = match.value;
    }
    if (!match) sel = entries[0].value;
    el.innerHTML = entries.map(function (e) {
      var isSel = (e.value === sel) ? ' selected' : '';
      return '<option value="' + safeTxt(e.value) + '"' + isSel + '>' + safeTxt(e.label) + '</option>';
    }).join('');
    el.value = sel;
  }

  function sbarPickerEntries(field) {
    var entries = [];
    if (field === 'cat') {
      return sbarCategoriasEntries();
    }
    if (field === 'pais') {
      paisesLista().forEach(function (v) {
        entries.push({ value: v, label: v });
      });
      return entries;
    }
    if (field === 'estado') {
      entries.push({ value: '', label: 'Todos los estados' });
      var pais = sbarSelectEl('pais');
      var paisVal = pais ? pais.value : Q.pais;
      var estadoEl = sbarSelectEl('estado');
      var estSel = estadoEl ? estadoEl.value : (Q.estado || '');
      estadosDePais(paisVal).forEach(function (v) {
        entries.push({ value: v, label: v });
      });
      if (estSel && !entries.some(function (e) { return e.value === estSel; })) {
        entries.push({ value: estSel, label: estSel });
      }
      return entries;
    }
    if (field === 'ciudad') {
      entries.push({ value: '', label: 'Todas las ciudades' });
      var paisEl = sbarSelectEl('pais');
      var estadoEl2 = sbarSelectEl('estado');
      var ciudadEl = sbarSelectEl('ciudad');
      var paisVal2 = paisEl ? paisEl.value : Q.pais;
      var estVal = estadoEl2 ? estadoEl2.value : Q.estado;
      var ciuSel = ciudadEl ? ciudadEl.value : (Q.ciudad || '');
      if (estVal) {
        ciudadesDe(paisVal2, estVal).forEach(function (v) {
          entries.push({ value: v, label: v });
        });
      }
      if (ciuSel && !entries.some(function (e) { return e.value === ciuSel; })) {
        entries.push({ value: ciuSel, label: ciuSel });
      }
      return entries;
    }
    return entries;
  }

  var sbarPickerOpenField = null;
  var sbarPickerEntriesCache = null;

  /* Campos con buscador manual (país/estado/ciudad). Categoría no lo necesita. */
  function sbarFieldUsaBuscador(field) {
    return field === 'pais' || field === 'estado' || field === 'ciudad';
  }

  /* Estado/ciudad admiten valores escritos manualmente (no listados). País no. */
  function sbarFieldAdmiteManual(field) {
    return field === 'estado' || field === 'ciudad';
  }

  /* Inyecta un valor (listado o escrito a mano) en el <select> y dispara change. */
  function sbarCommitValue(field, valor) {
    valor = String(valor == null ? '' : valor).trim();
    var select = sbarSelectEl(field);
    if (!select) return;
    if (valor) {
      var existe = Array.prototype.some.call(select.options, function (o) { return o.value === valor; });
      if (!existe) {
        var opt = document.createElement('option');
        opt.value = valor;
        opt.textContent = valor;
        select.appendChild(opt);
      }
    }
    select.value = valor;
    try {
      select.dispatchEvent(new Event('change', { bubbles: true }));
    } catch (e) {
      var ev = document.createEvent('Event');
      ev.initEvent('change', true, true);
      select.dispatchEvent(ev);
    }
    syncSbarLabels();
    closeSbarPicker();
  }

  function mountSbarPickerSheen() {
    var host = document.getElementById('resSbarPickerSheen');
    if (!host || host.dataset.mounted === '1') return;
    var sector = sectorActivoResultados();
    var esLgbt = document.body.getAttribute('data-subtema') === 'lgbt';
    var esAdultos = sector === 'adultos' && !esLgbt;
    if (esAdultos && window.CariHubPinkSheen && CariHubPinkSheen.htmlDestellosRosaCarihub) {
      var capa = document.createElement('div');
      capa.className = 'res-sbar-picker__destellos carihub-pink-sheen__destellos';
      capa.setAttribute('aria-hidden', 'true');
      capa.innerHTML = CariHubPinkSheen.htmlDestellosRosaCarihub();
      host.appendChild(capa);
    } else if (window.CariHubSectorSparkles && CariHubSectorSparkles.ensureLayer) {
      CariHubSectorSparkles.ensureLayer(host, esLgbt ? 'lgbt' : sector);
    }
    host.dataset.mounted = '1';
  }

  function syncSbarPickerTheme() {
    var picker = document.getElementById('resSbarPicker');
    var panel = picker ? picker.querySelector('.res-sbar-picker__panel') : null;
    if (!panel) return;
    var sector = sectorActivoResultados();
    var esLgbt = document.body.getAttribute('data-subtema') === 'lgbt';
    var esAdultos = sector === 'adultos' && !esLgbt;
    panel.classList.toggle('carihub-pink-sheen', esAdultos);
    panel.classList.toggle('res-sbar-picker__panel--lgbt', esLgbt);
    panel.classList.toggle('res-sbar-picker__panel--sector', !esAdultos && !esLgbt);
    if (esLgbt) {
      panel.setAttribute('data-subtema', 'lgbt');
    } else {
      panel.removeAttribute('data-subtema');
    }
    if (sector && !esLgbt) {
      panel.setAttribute('data-sector', sector);
    } else if (esLgbt) {
      panel.setAttribute('data-sector', 'adultos');
    } else {
      panel.removeAttribute('data-sector');
    }
    var sheen = document.getElementById('resSbarPickerSheen');
    if (sheen && sheen.dataset.mounted === '1') {
      sheen.innerHTML = '';
      sheen.dataset.mounted = '0';
      mountSbarPickerSheen();
    }
  }

  function bootSbarPickerSheenLater() {
    if (document.getElementById('resSbarPickerSheen') &&
        document.getElementById('resSbarPickerSheen').dataset.mounted !== '1') {
      mountSbarPickerSheen();
    }
  }

  function closeSbarPicker() {
    var picker = document.getElementById('resSbarPicker');
    if (!picker) return;
    picker.hidden = true;
    picker.setAttribute('aria-hidden', 'true');
    sbarPickerOpenField = null;
    sbarPickerEntriesCache = null;
    var searchWrap = document.getElementById('resSbarPickerSearch');
    var searchInput = document.getElementById('resSbarPickerInput');
    if (searchWrap) searchWrap.hidden = true;
    if (searchInput) searchInput.value = '';
    document.querySelectorAll('.res-sbar-btn[data-sbar-field]').forEach(function (btn) {
      btn.classList.remove('is-picker-open');
    });
  }

  var SBAR_PICKER_W = 268;
  var SBAR_PICKER_H = 286;
  var SBAR_PICKER_H_GEO = 318;

  function sbarPickerHeight(field) {
    return sbarFieldUsaBuscador(field) ? SBAR_PICKER_H_GEO : SBAR_PICKER_H;
  }

  function syncSbarPickerSearch(field) {

    if (!wrap || !input) return;
    var show = sbarFieldUsaBuscador(field);

    input.placeholder = placeholders[field] || 'Buscar…';

  function renderSbarPickerList(field, entries, current, query) {
    var list = document.getElementById('resSbarPickerList');
    if (!list) return;
    list.innerHTML = '';
    query = String(query || '').trim().toLowerCase();

    if (field === 'ciudad') {
      var estadoPick = sbarSelectEl('estado');
      if (!estadoPick || !estadoPick.value) {
        list.innerHTML = '<li class="res-sbar-picker__empty">Selecciona un estado para ver municipios.</li>';
        return;
      }
    }

    if (!entries || !entries.length) {
      if (query && sbarFieldAdmiteManual(field)) {
        list.innerHTML =
          '<li class="res-sbar-picker__empty">Sin coincidencias. Presiona Enter para usar «' +
          safeTxt(query) + '».</li>';
      } else {
        list.innerHTML = '<li class="res-sbar-picker__empty">No hay opciones disponibles.</li>';
      }
      return;
    }

    var filtered = entries;
    if (query) {
      filtered = entries.filter(function (entry) {
        return String(entry.label || entry.value || '').toLowerCase().indexOf(query) >= 0;
      });
    }

    if (!filtered.length) {
      if (query && sbarFieldAdmiteManual(field)) {
        list.innerHTML =
          '<li class="res-sbar-picker__empty">Sin coincidencias. Presiona Enter para usar «' +
          safeTxt(query) + '».</li>';
      } else {
        list.innerHTML = '<li class="res-sbar-picker__empty">No hay resultados para «' + safeTxt(query) + '».</li>';
      }
      return;
    }

    filtered.forEach(function (entry) {
      var li = document.createElement('li');
      li.setAttribute('role', 'presentation');
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'res-sbar-picker__item' + (entry.value === current ? ' is-selected' : '');
      btn.setAttribute('role', 'option');
      btn.setAttribute('aria-selected', entry.value === current ? 'true' : 'false');
      btn.textContent = entry.label;
      btn.dataset.value = entry.value;
      btn.addEventListener('click', function () {
        sbarCommitValue(field, entry.value);
      });
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  function positionSbarPicker(anchor, panel) {
    if (!anchor || !panel) return;
    var rect = anchor.getBoundingClientRect();
    var panelW = SBAR_PICKER_W;
    var panelH = sbarPickerOpenField ? sbarPickerHeight(sbarPickerOpenField) : SBAR_PICKER_H;
    var gap = 10;
    var left = rect.left + (rect.width - panelW) / 2;
    var top = rect.top - panelH - gap;
    if (top < 8) top = rect.bottom + gap;
    left = Math.max(8, Math.min(left, window.innerWidth - panelW - 8));
    top = Math.max(8, Math.min(top, window.innerHeight - panelH - 8));
    panel.style.left = Math.round(left) + 'px';
    panel.style.top = Math.round(top) + 'px';
    panel.style.height = panelH + 'px';
    panel.style.minHeight = panelH + 'px';
    panel.style.maxHeight = panelH + 'px';
  }

  function openSbarPicker(field, anchor) {
    var picker = document.getElementById('resSbarPicker');
    var list = document.getElementById('resSbarPickerList');
    var title = document.getElementById('resSbarPickerTitle');
    var select = sbarSelectEl(field);
    if (!picker || !list || !select || !anchor) return;

    syncSbarPickerTheme();
    syncSbarPickerSearch(field);

    var titles = {
      cat: 'Categoría',
      pais: 'País',
      estado: 'Estado',
      ciudad: 'Ciudad / Municipio'
    };
    if (title) title.textContent = titles[field] || 'Elegir';

    var entries = sbarPickerEntries(field);
    sbarPickerEntriesCache = entries;
    var current = select.value;
    renderSbarPickerList(field, entries, current, '');

    document.querySelectorAll('.res-sbar-btn[data-sbar-field]').forEach(function (btn) {
      btn.classList.toggle('is-picker-open', btn === anchor);
    });

    sbarPickerOpenField = field;
    picker.hidden = false;
    picker.setAttribute('aria-hidden', 'false');
    var panel = picker.querySelector('.res-sbar-picker__panel');
    requestAnimationFrame(function () {
      positionSbarPicker(anchor, panel);
      var searchInput = document.getElementById('resSbarPickerInput');
      if (searchInput && sbarFieldUsaBuscador(field)) {
        try { searchInput.focus({ preventScroll: true }); } catch (e) { searchInput.focus(); }
      }

    var selectedBtn = list.querySelector('.res-sbar-picker__item.is-selected');

  function initSbarPicker() {
    bootSbarPickerSheenLater();
    document.querySelectorAll('.res-sbar-btn[data-sbar-field]').forEach(function (btn) {

        e.preventDefault();
        var field = btn.getAttribute('data-sbar-field');

    document.querySelectorAll('[data-sbar-picker-close]').forEach(function (el) {
      el.addEventListener('click', closeSbarPicker);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeSbarPicker();
    });
    window.addEventListener('resize', function () {
      if (sbarPickerOpenField) {
        var anchor = document.querySelector('.res-sbar-btn[data-sbar-field="' + sbarPickerOpenField + '"]');
        var panel = document.querySelector('.res-sbar-picker__panel');

    var searchInput = document.getElementById('resSbarPickerInput');

      searchInput.dataset.wired = '1';

        if (!sbarPickerOpenField) return;
        var select = sbarSelectEl(sbarPickerOpenField);

        renderSbarPickerList(
          sbarPickerOpenField,
          sbarPickerEntriesCache || sbarPickerEntries(sbarPickerOpenField),
          current,
          searchInput.value
        );
      });
      searchInput.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' || !sbarPickerOpenField) return;
        e.preventDefault();
        var val = searchInput.value.trim();
        if (!val) return;
        if (sbarFieldAdmiteManual(sbarPickerOpenField)) {
          sbarCommitValue(sbarPickerOpenField, val);
          return;
        }
        if (sbarPickerOpenField === 'pais') {
          var entries = sbarPickerEntriesCache || sbarPickerEntries('pais');
          var match = entries.find(function (entry) {
            return String(entry.label || '').toLowerCase() === val.toLowerCase() ||
              String(entry.value || '').toLowerCase() === val.toLowerCase();
          });
          if (match) sbarCommitValue('pais', match.value);
        }
      });
    }
    if (searchGo && searchGo.dataset.wired !== '1') {
      searchGo.dataset.wired = '1';
      searchGo.addEventListener('click', function () {
        if (!searchInput || !sbarPickerOpenField) return;
        var val = searchInput.value.trim();
        if (!val) return;
        if (sbarFieldAdmiteManual(sbarPickerOpenField)) {
          sbarCommitValue(sbarPickerOpenField, val);
          return;

  /* Lienzo resultados: escala uniforme, sin recortar (ver --res-design-w en CSS) */
  var FIT_DESIGN_W = 1120;
  function readFitDesignW() {
    try {
      var v = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--res-design-w'));
      if (v > 0) return v;
    } catch (e) { /* noop */ }

  /* Topes por cantidad de tarjetas: pocas → más altas y más aire; muchas → compactas. */
  /* minH garantiza que TODAS las filas de datos (ubicación, categoría, badges
     como «Colabora en redes») quepan sin recortarse por overflow. */
  function resCardLimits(n) {
    if (n <= 1) return { minH: 360, maxH: 470, gapBase: 18, gapMaxExtra: 64 };
    if (n === 2) return { minH: 348, maxH: 440, gapBase: 20, gapMaxExtra: 52 };
    if (n === 3) return { minH: 344, maxH: 400, gapBase: 16, gapMaxExtra: 32 };
    if (n === 4) return { minH: 342, maxH: 384, gapBase: 12, gapMaxExtra: 20 };
    return { minH: 340, maxH: 372, gapBase: 10, gapMaxExtra: 10 };
  }

  function syncResListaSlots() {
    var list = document.getElementById('profilesList');
    var docRoot = document.documentElement;
    if (!list) return;

    if (list.classList.contains('res-lista--vacio')) {
      document.body.classList.remove('res-cards-fit');
      document.body.classList.add('res-empty-fit');
      document.body.removeAttribute('data-res-count');
      docRoot.style.removeProperty('--res-card-h');
      docRoot.style.removeProperty('--res-lista-gap');
      return;
    }

    document.body.classList.remove('res-empty-fit');

    var n = list.querySelectorAll('.pcard.res-card').length;
    document.body.classList.add('res-cards-fit');
    document.body.setAttribute('data-res-count', String(Math.min(n, 6)));

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        runResListaSlotMeasure(list, docRoot);
        requestAnimationFrame(function () {
          runResListaSlotMeasure(list, docRoot);
        });
      });
    });
  }

  /* Distribuye el alto disponible entre el número REAL de tarjetas:
     - 1-2 tarjetas → altas (tope alto) + más separación → llenan la pantalla.
     - 3-4-5 → se reducen progresivamente.
     - Muchas → alto mínimo y scroll.
     El banner inferior queda pegado al fondo (margin-top:auto en CSS). */
  function runResListaSlotMeasure(list, docRoot) {
    if (!list) return;
    var cards = list.querySelectorAll('.pcard.res-card');
    var n = cards.length;
    if (!n) {
      docRoot.style.removeProperty('--res-card-h');
      docRoot.style.removeProperty('--res-lista-gap');
      return;
    }
    var lim = resCardLimits(n);
    var scroll = document.getElementById('resScroll');
    if (!scroll) return;
    var avail = scroll.clientHeight;
    if (avail < 48) {
      setTimeout(syncResListaSlots, 50);
      return;
    }
    var scrollGap = parseFloat(getComputedStyle(scroll).rowGap || getComputedStyle(scroll).gap) || lim.gapBase;
    var banner = scroll.querySelector('.res-bottom');
    var extra = 0;
    if (banner) { extra += banner.offsetHeight + scrollGap; }
    var listAvail = avail - extra;

    var ideal = Math.floor((listAvail - lim.gapBase * Math.max(0, n - 1)) / n);
    /* Siempre respetar minH (datos completos) y maxH (no gigante). Si con minH
       no caben todas, la lista hace scroll — preferimos datos completos. */
    var cardH = Math.max(lim.minH, Math.min(lim.maxH, ideal));

    /* Si con el tope aún sobra espacio (pocas tarjetas), reparte parte del
       sobrante en la separación entre tarjetas (más aire, se ve completo). */
    var gap = lim.gapBase;
    if (n > 1) {
      var slack = listAvail - (cardH * n + lim.gapBase * (n - 1));
      if (slack > 0) {
        gap = lim.gapBase + Math.min(lim.gapMaxExtra, Math.floor(slack / (n - 1)));
      }
    }

    docRoot.style.setProperty('--res-card-h', cardH + 'px');
    docRoot.style.setProperty('--res-lista-gap', gap + 'px');
    list.scrollTop = 0;
  }

  var RES_MOBILE_MQ = window.matchMedia('(max-width: 720px)');

  function isResMobileViewport() {
    return RES_MOBILE_MQ.matches;
  }

  function shouldHidePreviewBar() {
    try {
      if (new URL(location.href).searchParams.get('preview') === '1') return false;
    } catch (e) { /* opcional */ }
    if (isResMobileViewport()) return true;
    var host = location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return false;
    return true;
  }

  function syncResPreviewBar() {
    var bar = document.getElementById('resPreviewSwitcher');
    if (!bar) return;
    var hide = shouldHidePreviewBar();
    bar.hidden = hide;
    bar.classList.toggle('res-preview-switcher--hidden', hide);
    bar.setAttribute('aria-hidden', hide ? 'true' : 'false');
  }

  function readFitAvailSize(outer) {
    var rectH = 0;
    var rectW = 0;
    if (outer) {
      var rect = outer.getBoundingClientRect();
      rectH = rect.height || 0;
      rectW = rect.width || 0;
      if (rectH < 1) rectH = outer.clientHeight || 0;
      if (rectW < 1) rectW = outer.clientWidth || 0;
    }
    if (isResMobileViewport() && window.visualViewport) {
      if (rectH < 1) rectH = window.visualViewport.height;
      if (rectW < 1) rectW = window.visualViewport.width;
    }
    if (rectH < 1) rectH = window.innerHeight || 720;
    if (rectW < 1) rectW = window.innerWidth || 360;
    return {
      w: Math.max(280, rectW),
      h: Math.max(420, rectH)
    };
  }

  function scheduleFit() {
    requestAnimationFrame(function () {
      requestAnimationFrame(applyFit);
    });
  }
  function applyFit() {
    var outer = document.getElementById('fitOuter');
    var spacer = document.getElementById('fitSpacer');
    var root = document.getElementById('fitRoot');
    var shell = document.querySelector('.res-shell');
    if (!outer || !spacer || !root) return;

    syncResPreviewBar();
    var mobile = isResMobileViewport();
    document.body.classList.toggle('res-mobile', mobile);
    document.documentElement.classList.toggle('res-mobile', mobile);

    document.body.classList.add('fit');
    document.documentElement.classList.add('fit');
    root.style.transform = 'none';
    var designW = readFitDesignW();
    root.style.width = designW + 'px';
    root.style.left = '50%';
    /* Tras ocultar barra preview, medir altura real del contenedor (no visualViewport entero) */
    var size = readFitAvailSize(outer);
    var availH = size.h;
    var availW = size.w;
    var scale = Math.min(1, (availW - 4) / designW);
    scale = Math.max(0.32, scale);
    var designH = Math.ceil(availH / scale);
    if (shell) shell.style.height = designH + 'px';
    spacer.style.width = '100%';
    spacer.style.height = Math.ceil(availH) + 'px';
    root.style.height = designH + 'px';
    root.style.transformOrigin = 'top center';
    root.style.transform = 'translateX(-50%) scale(' + scale + ')';
    syncResListaSlots();
    setTimeout(syncResListaSlots, 120);
  }
  document.body.classList.add('fit');
  document.documentElement.classList.add('fit');
  if (typeof RES_MOBILE_MQ.addEventListener === 'function') {
    RES_MOBILE_MQ.addEventListener('change', scheduleFit);
  } else if (typeof RES_MOBILE_MQ.addListener === 'function') {
    RES_MOBILE_MQ.addListener(scheduleFit);
  }
  window.addEventListener('resize', scheduleFit);
  window.addEventListener('load', function () {
    syncResPreviewBar();
    scheduleFit();
  });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', scheduleFit);
  }
  if (window.ResizeObserver) {
    var fitRo = new ResizeObserver(scheduleFit);
    fitRo.observe(document.getElementById('fitOuter'));
    var lista = document.getElementById('profilesList');
    if (lista) fitRo.observe(lista);
  }
  setTimeout(scheduleFit, 80);
  setTimeout(scheduleFit, 400);
})();
</script>
</body>

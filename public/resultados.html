<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --rosa3:#d83b78;
  --fondo:#fff1f7;
  --texto:#252432;
  --gris:#6b6170;
  --verde:#25D366;
  --sombra:0 16px 40px rgba(0,0,0,.14);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
}

body{
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at left 18%, rgba(236,45,122,.17), transparent 28%),
    radial-gradient(circle at right 38%, rgba(236,45,122,.12), transparent 30%),
    linear-gradient(180deg,#fff6fb 0%,#f7edf2 55%,#fff7fb 100%);
  color:var(--texto);
}

button{
  font-family:Arial,sans-serif;
}

.pagina{
  max-width:930px;
  margin:0 auto;
  padding:14px 12px 42px;
}

/* BANNERS SUPERIORES - COMPATIBLE SAFARI */
.top-banners{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  gap:8px;
  margin-bottom:18px;
  align-items:stretch;
  width:100%;
}

.banner-destacado{
  width:23%;
  min-width:0;
}

.banner-publicidad{
  width:54%;
  min-width:0;
}

.banner-publicidad,
.banner-destacado{
  min-height:94px;
  border-radius:24px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  user-select:none;
  -webkit-user-select:none;
}

.banner-publicidad{
  background:linear-gradient(90deg,#ffffff,#ffe0ef,#ffffff);
  border:3px solid var(--rosa);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:10px 12px;
  box-shadow:
    0 12px 30px rgba(236,45,122,.24),
    0 0 0 5px rgba(255,255,255,.68),
    inset 0 0 22px rgba(255,255,255,.75);
}

.banner-publicidad::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.60),transparent);
  transform:translateX(-120%);
  -webkit-transform:translateX(-120%);
  animation:brilloCariHub 4s infinite;
  -webkit-animation:brilloCariHub 4s infinite;
  pointer-events:none;
}

@keyframes brilloCariHub{
  0%{transform:translateX(-120%);}
  45%{transform:translateX(120%);}
  100%{transform:translateX(120%);}
}

@-webkit-keyframes brilloCariHub{
  0%{-webkit-transform:translateX(-120%);}
  45%{-webkit-transform:translateX(120%);}
  100%{-webkit-transform:translateX(120%);}
}

.banner-publicidad .icono{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:14px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:23px;
  box-shadow:0 5px 14px rgba(236,45,122,.30);
  z-index:1;
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
  z-index:1;
  min-width:0;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:16px;
  font-weight:900;
  line-height:1;
  letter-spacing:.6px;
}

.banner-publicidad .texto p{
  margin:5px 0 7px;
  color:#5c4b55;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:var(--rosa);
  color:white;
  font-size:8px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
}

.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  box-shadow:
    0 10px 24px rgba(236,45,122,.26),
    inset 0 0 15px rgba(255,255,255,.20);
}

.banner-destacado::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,.28),transparent 45%);
  pointer-events:none;
}

.banner-destacado .estrella{
  font-size:20px;
  margin-bottom:4px;
  z-index:1;
}

.banner-destacado h3{
  margin:0;
  font-size:11px;
  font-weight:900;
  letter-spacing:.5px;
  z-index:1;
}

.banner-destacado p{
  margin:4px 0 0;
  font-size:7px;
  font-weight:700;
  line-height:1.15;
  z-index:1;
}

/* RESUMEN */
.resumen-busqueda{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:16px;
  border-radius:26px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.10);
  border:1px solid rgba(255,255,255,.8);
}

.resumen-busqueda h1{
  margin:0 0 8px;
  color:var(--rosa);
  font-size:27px;
  line-height:1.05;
}

.resumen-busqueda p{
  margin:0;
  color:var(--gris);
  font-size:15px;
  line-height:1.35;
  font-weight:700;
}

.chips-busqueda{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:12px;
}

.chip{
  background:#fff;
  color:#9f174f;
  border:1px solid #ffd1e3;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

/* CAJAS */
.estado-box{
  background:white;
  padding:18px;
  border-radius:24px;
  margin-bottom:18px;
  box-shadow:
    0 8px 24px rgba(0,0,0,.10),
    -8px 0 22px rgba(236,45,122,.06),
    8px 0 22px rgba(236,45,122,.06);
}

.estado-box h2,
.estado-box h3{
  color:var(--rosa);
  margin:0 0 8px;
}

.estado-box p{
  margin:8px 0 0;
  color:var(--gris);
  font-size:16px;
  line-height:1.35;
}

/* LOADER */
.loader-card{
  background:white;
  padding:18px;
  border-radius:28px;
  box-shadow:var(--sombra);
  overflow:hidden;
}

.loader-line,
.loader-img{
  background:linear-gradient(90deg,#f3dbe6,#fff,#f3dbe6);
  background-size:220% 100%;
  animation:skeleton 1.4s infinite;
  border-radius:16px;
}

.loader-img{
  height:270px;
  margin-bottom:16px;
}

.loader-line{
  height:18px;
  margin:10px 0;
}

.loader-line.corta{width:55%;}
.loader-line.media{width:78%;}

@keyframes skeleton{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* CARDS */
.card{
  position:relative;
  background:white;
  border-radius:34px;
  padding:0;
  margin-bottom:30px;
  box-shadow:
    0 18px 44px rgba(0,0,0,.16),
    -12px 0 28px rgba(236,45,122,.08),
    12px 0 28px rgba(236,45,122,.08);
  overflow:hidden;
}

.card-foto-wrap{
  position:relative;
  width:100%;
  background:#ffe4ef;
}

.card img.foto-principal{
  width:100%;
  height:355px;
  object-fit:cover;
  display:block;
}

.card-foto-wrap::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:42%;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.58));
  pointer-events:none;
}

.badge-top{
  position:absolute;
  top:14px;
  left:14px;
  z-index:3;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.badge{
  background:rgba(255,255,255,.94);
  color:#b51558;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  box-shadow:0 5px 14px rgba(0,0,0,.18);
}

.badge.verificada{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
}

.card-titulo-foto{
  position:absolute;
  left:18px;
  right:18px;
  bottom:16px;
  z-index:4;
  color:white;
}

.card-titulo-foto h3{
  margin:0 0 6px;
  font-size:34px;
  line-height:1;
  text-shadow:0 3px 12px rgba(0,0,0,.35);
}

.card-titulo-foto p{
  margin:0;
  font-size:15px;
  font-weight:900;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}

.card-body{
  padding:17px;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.info-item{
  background:#fff3f8;
  border:1px solid #ffd3e4;
  padding:12px;
  border-radius:18px;
}

.info-item span{
  display:block;
  color:#9f174f;
  font-size:11px;
  font-weight:900;
  margin-bottom:4px;
  text-transform:uppercase;
}

.info-item b{
  display:block;
  color:#231c25;
  font-size:15px;
  line-height:1.2;
}

.descripcion-card{
  background:#fff;
  border-left:5px solid var(--rosa);
  padding:12px;
  border-radius:14px;
  color:#4a3f48;
  font-size:15px;
  line-height:1.35;
  margin:12px 0 0;
}

.btn-ver{
  display:block;
  width:100%;
  background:linear-gradient(90deg,#d94481,#ec2d7a);
  color:white;
  text-align:center;
  padding:17px;
  border-radius:22px;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  margin-top:17px;
  box-shadow:0 8px 20px rgba(217,68,129,.27);
  border:none;
  cursor:pointer;
}

.btn-ver:active{
  transform:scale(.985);
}

.acciones-finales{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 10px 26px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* MODAL */
.modal-anuncio{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:18px;
}

.modal-anuncio.activo{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.modal-header{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
  padding:18px;
  text-align:center;
}

.modal-header h2{
  margin:0;
  font-size:25px;
}

.modal-body{
  padding:18px;
}

.modal-body p{
  margin:10px 0;
  font-size:16px;
  line-height:1.35;
}

.modal-botones{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:0 18px 18px;
}

.modal-botones a,
.modal-botones button{
  display:block;
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  text-align:center;
  font-weight:900;
  font-size:16px;
  text-decoration:none;
  cursor:pointer;
}

.btn-wa{
  background:#25D366;
  color:white;
}

.btn-cerrar{
  background:#777;
  color:white;
}

@media(max-width:600px){
  .pagina{
    padding:10px 10px 32px;
  }

  .top-banners{
    gap:6px;
    margin-bottom:16px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:19px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .resumen-busqueda h1{
    font-size:24px;
  }

  .card{
    border-radius:30px;
    margin-bottom:26px;
  }

  .card img.foto-principal{
    height:330px;
  }

  .card-titulo-foto h3{
    font-size:31px;
  }

  .info-grid{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .info-item{
    padding:10px;
    border-radius:16px;
  }

  .info-item b{
    font-size:14px;
  }

  .btn-ver{
    font-size:19px;
    padding:16px;
    border-radius:19px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="pagina">

  <div id="bannersSuperioresCariHub" class="top-banners">

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_estado_1')">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Destacado del estado</p>
    </div>

    <div class="banner-publicidad" onclick="abrirInfoAnuncio('publicidad')">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>VER DATOS</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_estado_2')">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad estatal</p>
    </div>

  </div>

  <div class="resumen-busqueda">
    <h1>Resultados CariHub</h1>
    <p id="textoResumenBusqueda">Cargando búsqueda seleccionada...</p>
    <div class="chips-busqueda" id="chipsBusqueda"></div>
  </div>

  <div id="lista">
    <div class="loader-card">
      <div class="loader-img"></div>
      <div class="loader-line corta"></div>
      <div class="loader-line media"></div>
      <div class="loader-line"></div>
    </div>
  </div>

</div>

<div class="modal-anuncio" id="modalAnuncio">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitulo">Publicidad</h2>
    </div>

    <div class="modal-body" id="modalContenido"></div>

    <div class="modal-botones">
      <a class="btn-wa" id="modalWhatsApp" href="#" target="_blank">Contactar por WhatsApp</a>
      <button class="btn-cerrar" onclick="cerrarInfoAnuncio()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function textoSeguro(t){
  return String(t || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

function pintarResumenBusqueda(){
  const resumen = document.getElementById("textoResumenBusqueda");
  const chips = document.getElementById("chipsBusqueda");

  resumen.innerText = "Mostrando perfiles activos según tu búsqueda.";

  const datos = [
    categoria || "Categoría",
    pais || "País",
    estado || "Estado",
    ciudad || "Ciudad"
  ];

  chips.innerHTML = datos.map(x => `<span class="chip">${textoSeguro(x)}</span>`).join("");
}

function abrirPerfil(id){
  if(!id){
    alert("No se encontró el ID del perfil.");
    return;
  }

  const url = "./perfil.html?id=" + encodeURIComponent(id) + "&v=" + Date.now();
  window.location.assign(url);
}

function abrirInfoAnuncio(tipo){
  const modal = document.getElementById("modalAnuncio");
  const titulo = document.getElementById("modalTitulo");
  const contenido = document.getElementById("modalContenido");
  const wa = document.getElementById("modalWhatsApp");

  let datos = {
    titulo:"Publicidad disponible",
    nombre:"Espacio disponible para anunciante",
    categoria:"Publicidad / negocio / perfil",
    ubicacion:"Disponible por estado o ciudad",
    horario:"Atención por panel interno próximamente",
    promocion:"Pregunta por precios, duración y destacado",
    descripcion:"Este espacio puede mostrar tu negocio, marca, servicio o perfil destacado.",
    telefono:"528112304664"
  };

  if(tipo.includes("destacado")){
    datos.titulo = "Perfil destacado del estado";
    datos.nombre = "Espacio destacado disponible";
    datos.categoria = "Destacado estatal";
    datos.ubicacion = estado || "Estado seleccionado";
    datos.promocion = "Aparece arriba en resultados del estado.";
    datos.descripcion = "Ideal para perfiles que quieren más visibilidad dentro del estado.";
  }

  titulo.textContent = datos.titulo;

  contenido.innerHTML = `
    <p><b>Nombre:</b> ${textoSeguro(datos.nombre)}</p>
    <p><b>Categoría:</b> ${textoSeguro(datos.categoria)}</p>
    <p><b>Ubicación:</b> ${textoSeguro(datos.ubicacion)}</p>
    <p><b>Horario:</b> ${textoSeguro(datos.horario)}</p>
    <p><b>Promoción:</b> ${textoSeguro(datos.promocion)}</p>
    <p><b>Descripción:</b> ${textoSeguro(datos.descripcion)}</p>
  `;

  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  wa.href = "https://wa.me/" + datos.telefono + "?text=" + msg;

  modal.classList.add("activo");
}

function cerrarInfoAnuncio(){
  document.getElementById("modalAnuncio").classList.remove("activo");
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="window.location.href='index.html'">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html?abrir=registro'">Registrarse</button>
    </div>
  `;
}

function cardPerfil(id,u){
  const nombre = u.nombre || "Perfil";
  const foto = u.fotoURL || "";
  const ciudadPerfil = u.ciudad || "";
  const estadoPerfil = u.estado || "";
  const categoriaPerfil = u.categoria || "";
  const precio = u.precio || "Consultar";
  const modalidad = u.modalidad || "Consultar";
  const descripcion = u.descripcion || u.descripcionCompleta || "";

  return `
    <div class="card">
      <div class="card-foto-wrap">
        ${foto ? `<img class="foto-principal" src="${textoSeguro(foto)}" alt="Foto pública" loading="eager">` : ""}
        
        <div class="badge-top">
          <span class="badge verificada">Verificada</span>
          <span class="badge">${textoSeguro(categoriaPerfil)}</span>
        </div>

        <div class="card-titulo-foto">
          <h3>${textoSeguro(nombre)}</h3>
          <p>📍 ${textoSeguro(ciudadPerfil)}, ${textoSeguro(estadoPerfil)}</p>
        </div>
      </div>

      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <span>Categoría</span>
            <b>${textoSeguro(categoriaPerfil)}</b>
          </div>

          <div class="info-item">
            <span>Ciudad</span>
            <b>${textoSeguro(ciudadPerfil)}</b>
          </div>

          <div class="info-item">
            <span>Precio</span>
            <b>${textoSeguro(precio)}</b>
          </div>

          <div class="info-item">
            <span>Modalidad</span>
            <b>${textoSeguro(modalidad)}</b>
          </div>
        </div>

        ${descripcion ? `<div class="descripcion-card">${textoSeguro(descripcion)}</div>` : ""}

        <button class="btn-ver" type="button" onclick="abrirPerfil('${id}')">
          Ver perfil completo
        </button>
      </div>
    </div>
  `;
}

async function cargarPerfilesPublicos(){
  const base = db.collection("usuarios")
    .where("aprobado","==",true)
    .where("activo","==",true)
    .where("vencido","==",false);

  const ahora = firebase.firestore.Timestamp.now();

  const [snapVigentes, snapSinFecha] = await Promise.all([
    base.where("fechaVencimiento",">",ahora).get(),
    base.where("fechaVencimiento","==",null).get()
  ]);

  const porId = new Map();

  snapVigentes.forEach(doc => porId.set(doc.id, doc));
  snapSinFecha.forEach(doc => porId.set(doc.id, doc));

  return Array.from(porId.values());
}

async function cargarResultados(){
  pintarResumenBusqueda();

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div class="loader-card">
      <div class="loader-img"></div>
      <div class="loader-line corta"></div>
      <div class="loader-line media"></div>
      <div class="loader-line"></div>
    </div>
  `;

  try{
    const docs = await cargarPerfilesPublicos();

    lista.innerHTML = "";

    let encontrados = 0;

    for(const doc of docs){
      const u = doc.data();

      let vencido = false;

      if(u.vencido === true){
        vencido = true;
      }

      if(u.fechaVencimiento){
        const fechaV = u.fechaVencimiento.toDate
          ? u.fechaVencimiento.toDate()
          : new Date(u.fechaVencimiento);

        if(fechaV < new Date()){
          vencido = true;
        }
      }

      if(vencido) continue;
      if(u.activo !== true) continue;

      const exacto =
        normalizarTexto(u.categoria) === normalizarTexto(categoria) &&
        normalizarTexto(u.pais) === normalizarTexto(pais) &&
        normalizarTexto(u.estado) === normalizarTexto(estado) &&
        normalizarTexto(u.ciudad) === normalizarTexto(ciudad);

      if(!exacto) continue;

      encontrados++;

      lista.innerHTML += cardPerfil(doc.id,u);
    }

    if(encontrados === 0){
      lista.innerHTML = `
        <div class="estado-box">
          <h3>No encontramos perfiles</h3>
          <p>No hay perfiles activos en esta búsqueda todavía.</p>
        </div>
      `;
    }

    lista.innerHTML += botonesFinales();

  }catch(error){
    lista.innerHTML = `
      <div class="estado-box">
        <h3>Error</h3>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarResultados();
</script>

  padding:14px;

}

.btn-buscar{

  background:#ff1493;
  color:white;

.btn-cerca{

  color:white;

.btn-volver{

/* MOBILE */

}

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCp68DynjT63T9wHorCLxwBGkSEo_mYPUI",
  authDomain: "carihub-app.firebaseapp.com",
  projectId: "carihub-app",
  storageBucket: "carihub-app.firebasestorage.app",
  messagingSenderId: "236894758884",
  appId: "1:236894758884:web:5713e39a26c71f025a49f1"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



function abrirAnuncio(){

window.location.href = "registro-banner.html";

}
function obtenerParametro(nombre){

const url = new URL(window.location.href);

return url.searchParams.get(nombre) || "";

}

function normalizarTexto(t){

return String(t||"")
.replace(/[^\p{L}\p{N}\s]/gu,"")
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");
function cargarListas(){

const paisSeleccionado =
document.getElementById("filtroPais").value || pais;

const estadoSeleccionado =
document.getElementById("filtroEstado").value || estado;

const listaPaises =
document.getElementById("listaPaises");

listaPaises.innerHTML = "";

TODOS_LOS_PAISES
.sort((a,b)=>a.localeCompare(b))
.forEach(nombrePais=>{

listaPaises.innerHTML +=
`<option value="${nombrePais}">`;

});
const listaEstados =
document.getElementById("listaEstados");

listaEstados.innerHTML = "";

if(ESTADOS[paisSeleccionado]){

ESTADOS[paisSeleccionado]
.sort((a,b)=>a.localeCompare(b))
.forEach(nombreEstado=>{

listaEstados.innerHTML +=
`<option value="${nombreEstado}">`;

});

}
const listaCiudades =
document.getElementById("listaCiudades");

listaCiudades.innerHTML = "";

if(
CIUDADES[paisSeleccionado]
&&
CIUDADES[paisSeleccionado][estadoSeleccionado]
){

CIUDADES[paisSeleccionado][estadoSeleccionado]
.sort((a,b)=>a.localeCompare(b))
.forEach(nombreCiudad=>{

listaCiudades.innerHTML +=
`<option value="${nombreCiudad}">`;

});

}
}
document
.getElementById("filtroPais")
.addEventListener("change",()=>{

document.getElementById("filtroEstado").value = "";
document.getElementById("filtroCiudad").value = "";

cargarListas();

});

document
.getElementById("filtroEstado")
.addEventListener("change",()=>{

document.getElementById("filtroCiudad").value = "";

cargarListas();

});
function llenarFiltros(){

document.getElementById("filtroCategoria").value = categoria;
if(
!document.getElementById("filtroCategoria").value
&& categoria
){
document.getElementById("otraCategoria").value = categoria;
}

document.getElementById("filtroPais").value = pais;

document.getElementById("filtroEstado").value = estado;

document.getElementById("filtroCiudad").value = ciudad;

}

function actualizarBusqueda(){

let nuevaCategoria =
document.getElementById("filtroCategoria").value;

const categoriaManual =
document.getElementById("otraCategoria").value;

if(categoriaManual.trim()!==""){

nuevaCategoria = categoriaManual.trim();

}

const nuevoPais =
document.getElementById("filtroPais").value;

const nuevoEstado =
document.getElementById("filtroEstado").value;

const nuevaCiudad =
document.getElementById("filtroCiudad").value;

history.replaceState(
null,
"",
`resultados.html?categoria=${encodeURIComponent(nuevaCategoria)}&pais=${encodeURIComponent(nuevoPais)}&estado=${encodeURIComponent(nuevoEstado)}&ciudad=${encodeURIComponent(nuevaCiudad)}`
);

cargarResultados();

}

function buscarCerca(){

navigator.geolocation.getCurrentPosition(

(posicion)=>{

if(window.mostrarModalCariHub){
mostrarModalCariHub({
tipo: "exito",
titulo: "Ubicación detectada",
mensaje: "📍 Ubicación detectada correctamente"
});
} else {
alert("📍 Ubicación detectada correctamente");
}

console.log(
posicion.coords.latitude,
posicion.coords.longitude
);

},

(error)=>{

if(window.mostrarModalCariHub){
mostrarModalCariHub({
tipo: "error",
titulo: "Ubicación no disponible",
mensaje: "❌ No pudimos obtener tu ubicación."
});
} else {
alert("❌ No pudimos obtener tu ubicación.");
}

}

);

}

async function cargarResultados(){

const lista = document.getElementById("lista");

lista.innerHTML = `
<div class="estado-box">
<h2>Buscando perfiles...</h2>
</div>
`;

try{
const snap = await db.collection("usuarios")
.where("aprobado","==",true)
.get();

lista.innerHTML = "";

let encontrados = 0;

for(const doc of snap.docs){

const u = doc.data();

if(u.activo !== true) continue;
const categoriaActual =
document.getElementById("filtroCategoria").value
||
document.getElementById("otraCategoria").value;

const paisActual =
document.getElementById("filtroPais").value;

const estadoActual =
document.getElementById("filtroEstado").value;

const ciudadActual =
document.getElementById("filtroCiudad").value;

const coincideCategoria =
!categoriaActual ||
normalizarTexto(u.categoria)
.includes(normalizarTexto(categoriaActual));

const coincidePais =
!paisActual ||
normalizarTexto(u.pais)
.includes(normalizarTexto(paisActual));

const coincideEstado =
!estadoActual ||
normalizarTexto(u.estado)
.includes(normalizarTexto(estadoActual));

const coincideCiudad =
!ciudadActual ||
normalizarTexto(u.ciudad)
.includes(normalizarTexto(ciudadActual));

const exacto =
coincideCategoria &&
coincidePais &&
coincideEstado &&
coincideCiudad;

if(exacto){

encontrados++;

lista.innerHTML += `

<div class="card">

${u.fotoURL ? `
<img src="${u.fotoURL}">
` : ""}

<h3>${u.nombre || ""}</h3>

<p>
<b>💋 Categoría:</b>
${u.categoria || ""}
</p>

<p class="precio">
💰 ${u.precio || "Sin precio"}
</p>

${u.lugar ? `
<p>
<b>📍 Lugar:</b>
${u.lugar}
</p>
` : ""}

<p>
<b>🏙️ Ciudad:</b>
${u.ciudad || ""}
</p>

<div class="botones-card">

${u.contactos?.whatsapp?.activo ? `
<a class="btn-contacto whatsapp"
href="https://wa.me/${u.contactos.whatsapp.valor}"
target="_blank">
WhatsApp
</a>
` : ""}

${u.contactos?.telegram?.activo ? `
<a class="btn-contacto telegram"
href="https://t.me/${u.contactos.telegram.valor.replace("@","")}"
target="_blank">
Telegram
</a>
` : ""}

${u.contactos?.instagram?.activo ? `
<a class="btn-contacto instagram"
href="https://instagram.com/${u.contactos.instagram.valor.replace("@","")}"
target="_blank">
Instagram
</a>
` : ""}

${u.contactos?.interno?.activo ? `
<a class="btn-contacto interno"
href="mensajes.html?id=${doc.id}">
Mensaje
</a>
` : ""}

<a class="btn-contacto ver-perfil"
href="perfil.html?id=${doc.id}">
Ver perfil
</a>

</div>

</div>

`;

}

}

if(encontrados === 0){

lista.innerHTML = `

<div class="estado-box">

<h2>No encontramos perfiles</h2>

<p>Intenta otra búsqueda.</p>

<a
href="registro.html"
class="btn-contacto ver-perfil"
style="margin-top:20px;display:block;">

🔥 REGISTRARSE

</a>

</div>

`;

}

}catch(error){

lista.innerHTML = `

<div class="estado-box">

<h2>Error</h2>

<p>${error.message}</p>

</div>

`;

}

}

cargarListas();

llenarFiltros();

cargarResultados();
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista previa — Resultados Cariñosas</title>
<script>
(function () {
  var p = new URLSearchParams(location.search);
  if (!p.has('vista')) p.set('vista', 'con-resultados');
  if (!p.has('categoria')) p.set('categoria', 'Cariñosas');
  if (!p.has('pais')) p.set('pais', 'México');
  if (!p.has('estado')) p.set('estado', 'Nuevo León');
  if (!p.has('ciudad')) p.set('ciudad', 'Monterrey');
  location.replace('../resultados.html?' + p.toString());
})();
</script>
</head>
<body>
<p>Abriendo vista previa de resultados… <a href="../resultados.html?vista=con-resultados&amp;categoria=Cariñosas&amp;pais=México&amp;estado=Nuevo%20León&amp;ciudad=Monterrey">Ir manualmente</a></p>
</body>
</html>

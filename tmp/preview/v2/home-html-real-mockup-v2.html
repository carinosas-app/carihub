<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCKUP v2 — Home HTML real (assets reales)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --rosa:#e91e8c;
  --ancho:390px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Montserrat,Arial,sans-serif;
  background:#e8e8e8;
}
.mockup-tag{
  position:sticky;top:0;z-index:9999;
  background:#111;color:#fff;
  padding:8px 12px;font-size:11px;text-align:center;
  border-bottom:3px solid #ff9800;
}
.mockup-tag strong{color:#ffb74d}
.phone{
  width:var(--ancho);max-width:100%;margin:0 auto;
  background:#fff;overflow:hidden;
  box-shadow:0 0 0 1px #d8d8d8,0 24px 64px rgba(0,0,0,.14);
}
.slice{
  width:100%;height:auto;display:block;vertical-align:top;
}
.home-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 4px;background:#fff;
}
.logo-img{height:48px;width:auto;display:block}
.header-actions-img{height:32px;width:auto;display:block}
.home-ads-principal{
  display:grid;grid-template-columns:1fr 1fr;gap:5px;
  padding:4px 8px 8px;background:#fff;
}
.ad-principal{
  border-radius:10px;overflow:hidden;display:block;line-height:0;
  box-shadow:0 3px 12px rgba(233,30,140,.14);
}
.ad-principal img{width:100%;height:auto;display:block}
.home-cta{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:0 8px 8px;background:#fff;
}
.cta-card{border-radius:10px;overflow:hidden;line-height:0;border:1px solid #ecd0df}
.cta-card img{width:100%;height:auto;display:block}
.home-ad-inferior{padding:0 8px 16px;background:#fff}
.ad-inferior{border-radius:14px;overflow:hidden;display:block;line-height:0;box-shadow:0 6px 20px rgba(233,30,140,.22)}
.ad-inferior img{width:100%;height:auto;display:block}
</style>
</head>
<body>
<div class="mockup-tag"><strong>MOCKUP v2</strong> — Assets reales extraídos de la captura de referencia. <code>public/index.html</code> sin modificar.</div>

<div class="phone" id="mockupV2">
  <header class="home-header">
    <img class="logo-img" src="assets/logo-hd.png" alt="Cariñosas">
    <img class="header-actions-img" src="assets/header-actions.png" alt="Favoritos y menú">
  </header>

  <img class="slice" src="assets/hero-full.png" alt="Encuentra acompañantes cariñosas cerca de ti">
  <img class="slice" src="assets/search-section.png" alt="¿Dónde quieres buscar?">
  <img class="slice" src="assets/zonas-only.png" alt="Zonas cercanas populares">
  <img class="slice" src="assets/categorias-only.png" alt="Explora categorías">

  <section class="home-ads-principal" aria-label="Banners publicitarios principales">
    <a class="ad-principal" href="#"><img src="assets/ad-principal-izq.webp" alt="¡ANÚNCIATE AQUÍ!"></a>
    <a class="ad-principal" href="#"><img src="assets/ad-principal-der.webp" alt="¡ANÚNCIATE AQUÍ!"></a>
  </section>

  <section class="home-cta">
    <div class="cta-card"><img src="assets/cta-cerca.png" alt="Cerca de ti"></div>
    <div class="cta-card"><img src="assets/cta-registro.png" alt="Registro y búsqueda avanzada"></div>
  </section>

  <img class="slice" src="assets/trust-row.png" alt="Perfiles verificados, privacidad, contacto, actualizados">

  <section class="home-ad-inferior">
    <a class="ad-inferior" href="#"><img src="assets/ad-inferior.webp" alt="¡ANÚNCIATE AQUÍ!"></a>
  </section>
</div>
</body>
</html>

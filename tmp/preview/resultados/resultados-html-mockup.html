<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados — mockup responsive</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#1c1c1e;font-family:Arial,sans-serif;color:#fff}

.mockup-tag{
  position:sticky;top:0;z-index:9999;background:#111;color:#fff;
  padding:8px 12px;font-size:11px;text-align:center;border-bottom:3px solid #ff9800;
}
.mockup-tag strong{color:#ffb74d}
.mockup-tag button{
  margin-left:8px;padding:3px 8px;border:1px solid #666;border-radius:6px;
  background:#222;color:#fff;font-size:10px;cursor:pointer;font-family:inherit;
}
.mockup-tag button.is-on{background:#e91e63;border-color:#e91e63}
.mockup-tag .proto-vista-btns,
.mockup-tag .proto-zoom-btns{display:inline-flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.mockup-tag .proto-vista-btns button,
.mockup-tag .proto-zoom-btns button{margin-left:0}
.mockup-tag .proto-zoom-btns{margin-left:6px}
.mockup-tag .proto-zoom-label{
  display:inline-block;margin-top:4px;font-size:9px;color:#ccc;
}
.proto-nav-bar{
  display:flex;gap:4px;align-items:center;margin-top:6px;width:100%;
}
.proto-nav-bar input{
  flex:1;min-width:0;padding:5px 8px;border-radius:6px;border:1px solid #555;
  background:#1a1a1a;color:#fff;font-size:10px;font-family:Consolas,Monaco,monospace;
}
.proto-nav-bar input:focus{
  outline:none;border-color:#e91e63;box-shadow:0 0 0 2px rgba(233,30,99,.25);
}
.proto-nav-bar button{
  margin-left:0;flex:0 0 auto;padding:5px 10px;
}
.proto-hint{
  margin-top:4px;font-size:8.5px;line-height:1.35;color:#aaa;
}
.proto-metrics{
  display:block;font-size:9px;line-height:1.5;color:#ffb74d;
  margin-top:5px;font-family:Consolas,Monaco,monospace;text-align:center;
}

:root{
  --iphone-w:414px;--iphone-h:896px;
  --tablet-w:820px;--tablet-h:1180px;
  --tablet-h-w:1180px;--tablet-h-h:820px;
  --laptop-w:1366px;--laptop-h:768px;
  --proto-shell-w:var(--iphone-w);
  --proto-shell-h:var(--iphone-h);
}

body.proto-active{
  display:flex;flex-direction:column;align-items:center;
  width:100%;min-height:100dvh;padding:8px 12px 24px;
  overflow-x:hidden;overflow-y:auto;
}
body.proto-active .mockup-tag{
  position:relative;width:var(--proto-shell-w);max-width:calc(100vw - 24px);
  min-width:280px;margin:0;border-radius:14px 14px 0 0;
}
body.proto-active .device-stage-wrap{margin:0 auto 24px;overflow:hidden;flex-shrink:0}
body.proto-active .device-stage{transform-origin:top left}
body.proto-active .device-shell{
  width:var(--proto-shell-w);height:var(--proto-shell-h);
  overflow:hidden;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.5);
}
body.proto-active .device-shell__screen{width:100%;height:100%;background:#e8e8e8}
body.proto-active .proto-scale-wrap{transform-origin:top center;margin:0 auto;width:100%;height:100%}
body.proto-active .proto-iframe{
  display:block;width:100%;height:100%;border:0;background:#fff6fb;
  pointer-events:auto;
}
body.proto-active .device-shell__screen{
  pointer-events:auto;
}

body.proto-iphone{--proto-shell-w:var(--iphone-w);--proto-shell-h:var(--iphone-h)}
body.proto-iphone .device-shell{
  border:11px solid #1c1c1e;border-radius:44px;background:#000;
  box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 0 0 1px #3a3a3c;
}
body.proto-iphone .device-shell::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:148px;height:28px;background:#1c1c1e;border-radius:0 0 18px 18px;z-index:10;
}
body.proto-iphone .device-shell::after{
  content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  width:118px;height:4px;background:rgba(255,255,255,.28);border-radius:99px;z-index:10;
}
body.proto-iphone .device-shell__screen{
  border-radius:34px;overflow-x:hidden;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

body.proto-tablet{--proto-shell-w:var(--tablet-w);--proto-shell-h:var(--tablet-h)}
body.proto-tablet .device-shell{border:14px solid #1c1c1e;border-radius:28px;background:#111}
body.proto-tablet .device-shell::before{
  content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;background:#2a2a2a;border-radius:50%;z-index:10;
  box-shadow:inset 0 0 0 1px #444;
}
body.proto-tablet .device-shell__screen{border-radius:16px;overflow:hidden}

body.proto-tablet-h{--proto-shell-w:var(--tablet-h-w);--proto-shell-h:var(--tablet-h-h)}
body.proto-tablet-h .device-shell{border:14px solid #1c1c1e;border-radius:22px;background:#111}
body.proto-tablet-h .device-shell::before{
  content:'';position:absolute;left:9px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;background:#2a2a2a;border-radius:50%;z-index:10;
  box-shadow:inset 0 0 0 1px #444;
}
body.proto-tablet-h .device-shell__screen{border-radius:12px;overflow:hidden}

body.proto-laptop{--proto-shell-w:var(--laptop-w);--proto-shell-h:var(--laptop-h)}
body.proto-laptop .device-stage{padding-bottom:0}
body.proto-laptop .device-shell{
  border:10px solid #2a2a2a;border-bottom:0;border-radius:12px 12px 0 0;background:#1a1a1a;
}
body.proto-laptop .device-shell__screen{overflow:hidden}
body.proto-laptop .device-laptop-base{
  display:block;width:calc(var(--laptop-w) + 20px);height:22px;margin:0 auto;
  background:linear-gradient(180deg,#3d3d3d 0%,#252525 55%,#1a1a1a 100%);
  border-radius:0 0 14px 14px;box-shadow:0 12px 28px rgba(0,0,0,.35);
}
body.proto-laptop .device-laptop-base::after{
  content:'';display:block;width:68px;height:4px;margin:7px auto 0;
  background:#111;border-radius:99px;
}
.device-laptop-base{display:none}
</style>
</head>
<body class="proto-active proto-iphone">

<div class="mockup-tag">
  <strong>RESULTADOS — mockup</strong> · <code>public/resultados.html</code> ·
  <span class="proto-vista-btns" role="group" aria-label="Elegir dispositivo">
    <button type="button" data-vista="iphone" title="iPhone 11 — 414×896">📱 iPhone 11</button>
    <button type="button" data-vista="tablet" title="iPad vertical — 820×1180">📱 Tablet ↕</button>
    <button type="button" data-vista="tablet-h" title="iPad horizontal — 1180×820">📱 Tablet ↔</button>
    <button type="button" data-vista="laptop" title="Laptop — 1366×768">💻 Laptop</button>
  </span>
  <span class="proto-zoom-btns" role="group" aria-label="Zoom del marco">
    <button type="button" id="protoZoomOut" title="Alejar (Ctrl + rueda)">− Zoom</button>
    <button type="button" id="protoZoomReset" title="Restablecer zoom">100%</button>
    <button type="button" id="protoZoomIn" title="Acercar (Ctrl + rueda)">+ Zoom</button>
  </span>
  <div class="proto-zoom-label">Ctrl + rueda del mouse sobre el marco · o usa + / −</div>
  <div class="proto-nav-bar">
    <input type="text" id="protoUrlInput" spellcheck="false" aria-label="URL a abrir en el marco" value="http://localhost:8782/resultados.html?categoria=Escort&amp;pais=M%C3%A9xico&amp;estado=Nuevo%20Le%C3%B3n&amp;ciudad=Monterrey">
    <button type="button" id="protoUrlGo" title="Ir a la URL">Ir</button>
    <button type="button" id="protoUrlReload" title="Recargar">↻</button>
    <button type="button" id="protoUrlResultados" title="Pantalla resultados Monterrey">📋 Resultados</button>
  </div>
  <div class="proto-hint">Haz clic <strong>dentro del marco</strong> para escribir, tocar botones y desplazarte. Aquí arriba puedes pegar otra URL.</div>
  <div class="proto-metrics" id="protoMetrics" aria-live="polite"></div>
</div>

<div class="device-stage-wrap" id="deviceStageWrap">
  <div class="device-stage" id="deviceStage">
    <div class="device-shell" id="deviceShell">
      <div class="device-shell__screen" id="deviceScreen">
        <div class="proto-scale-wrap" id="protoScaleWrap">
          <iframe
            class="proto-iframe"
            id="protoIframe"
            title="Pantalla resultados"
            src="http://localhost:8782/resultados.html?categoria=Escort&amp;pais=M%C3%A9xico&amp;estado=Nuevo%20Le%C3%B3n&amp;ciudad=Monterrey"
            loading="eager"
          ></iframe>
        </div>
      </div>
    </div>
    <div class="device-laptop-base" id="deviceLaptopBase" aria-hidden="true"></div>
  </div>
</div>

<script>
(function () {
  var RESULTADOS_URL = 'http://localhost:8782/resultados.html?categoria=Escort&pais=M%C3%A9xico&estado=Nuevo%20Le%C3%B3n&ciudad=Monterrey';
  var DEFAULT_ZOOM = 1.4;

  var DEVICES = {
    iphone: { w: 414, h: 896, label: 'iPhone 11', bezel: 22, baseH: 0 },
    tablet: { w: 820, h: 1180, label: 'Tablet vertical (iPad)', bezel: 28, baseH: 0 },
    'tablet-h': { w: 1180, h: 820, label: 'Tablet horizontal (iPad)', bezel: 28, baseH: 0 },
    laptop: { w: 1366, h: 768, label: 'Laptop', bezel: 20, baseH: 22 }
  };

  function getProtoVista() {
    if (document.body.classList.contains('proto-iphone')) return 'iphone';
    if (document.body.classList.contains('proto-tablet-h')) return 'tablet-h';
    if (document.body.classList.contains('proto-tablet')) return 'tablet';
    if (document.body.classList.contains('proto-laptop')) return 'laptop';
    return 'iphone';
  }

  var userZoom = DEFAULT_ZOOM;
  var ZOOM_MIN = 0.5;
  var ZOOM_MAX = 2.2;
  var ZOOM_STEP = 0.1;

  function loadUserZoom() {
    var zoomParam = parseFloat((location.search.match(/[?&]zoom=([0-9.]+)/) || [])[1]);
    if (!isNaN(zoomParam)) {
      userZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomParam / 100));
      return;
    }
    try {
      var saved = parseFloat(localStorage.getItem('carihub_proto_zoom_resultados'));
      if (!isNaN(saved)) userZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, saved));
      else userZoom = DEFAULT_ZOOM;
    } catch (e) {
      userZoom = DEFAULT_ZOOM;
    }
  }

  function saveUserZoom() {
    try { localStorage.setItem('carihub_proto_zoom_resultados', String(userZoom)); } catch (e) {}
  }

  function setUserZoom(next) {
    userZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, next));
    saveUserZoom();
    updateProtoMetrics();
  }

  function fitProtoDevice() {
    var stage = document.getElementById('deviceStage');
    var stageWrap = document.getElementById('deviceStageWrap');
    var tag = document.querySelector('.mockup-tag');
    var vista = getProtoVista();
    var dev = DEVICES[vista];
    if (!stage || !stageWrap || !dev) return 1;

    var shellW = dev.w + dev.bezel;
    var shellH = dev.h + dev.bezel + (dev.baseH || 0);
    var maxW = Math.max(320, document.documentElement.clientWidth - 16);
    var tagH = tag ? tag.offsetHeight : 0;
    var maxH = Math.max(280, window.innerHeight - tagH - 20);
    var deskByW = maxW / shellW;
    var deskByH = maxH / shellH;
    var deskFit = Math.min(deskByW, deskByH);
    if (vista === 'iphone' || vista === 'tablet') deskFit = Math.min(deskByW, deskByH * 1.15);
    deskFit = Math.max(0.72, deskFit);
    var desk = Math.min(deskFit * userZoom, ZOOM_MAX);

    var visW = Math.round(shellW * desk);
    var visH = Math.round(shellH * desk);

    if (tag) tag.style.width = visW + 'px';
    stageWrap.style.width = visW + 'px';
    stageWrap.style.height = visH + 'px';
    stage.style.width = shellW + 'px';
    stage.style.height = shellH + 'px';
    stage.style.transform = 'scale(' + desk + ')';
    stage.style.transformOrigin = 'top left';

    return desk;
  }

  function updateProtoMetrics() {
    var el = document.getElementById('protoMetrics');
    var vista = getProtoVista();
    var dev = DEVICES[vista];
    if (!el || !dev) return;
    var scale = fitProtoDevice();
    el.innerHTML =
      '<strong>' + dev.label + '</strong> — pantalla ' + dev.w + ' × ' + dev.h + ' px · ' +
      'Escala marco: <strong>' + Math.round(scale * 100) + '%</strong> · ' +
      'Zoom extra: <strong>' + Math.round(userZoom * 100) + '%</strong> · ' +
      '<strong>desliza dentro del marco</strong> para ver el resto';
    var resetBtn = document.getElementById('protoZoomReset');
    if (resetBtn) resetBtn.textContent = Math.round(userZoom * 100) + '%';
  }

  function setProtoVista(vista) {
    if (!DEVICES[vista]) vista = 'iphone';
    document.body.classList.remove('proto-iphone', 'proto-tablet', 'proto-tablet-h', 'proto-laptop');
    document.body.classList.add('proto-active', 'proto-' + vista);
    Object.keys(DEVICES).forEach(function (v) {
      var btn = document.querySelector('[data-vista="' + v + '"]');
      if (btn) btn.classList.toggle('is-on', v === vista);
    });
    try { localStorage.setItem('carihub_proto_vista_resultados', vista); } catch (e) {}
    requestAnimationFrame(updateProtoMetrics);
    setTimeout(updateProtoMetrics, 300);
  }

  var protoVista = 'iphone';
  try {
    var saved = localStorage.getItem('carihub_proto_vista_resultados');
    if (saved && DEVICES[saved]) protoVista = saved;
  } catch (e) {}
  var vistaParam = (location.search.match(/[?&]vista=(iphone|tablet-h|tablet|laptop)/) || [])[1];
  if (vistaParam) protoVista = vistaParam;

  loadUserZoom();
  setProtoVista(protoVista);
  document.querySelectorAll('[data-vista]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      setProtoVista(btn.getAttribute('data-vista'));
    });
  });

  var zoomIn = document.getElementById('protoZoomIn');
  var zoomOut = document.getElementById('protoZoomOut');
  var zoomReset = document.getElementById('protoZoomReset');
  if (zoomIn) zoomIn.addEventListener('click', function () { setUserZoom(userZoom + ZOOM_STEP); });
  if (zoomOut) zoomOut.addEventListener('click', function () { setUserZoom(userZoom - ZOOM_STEP); });
  if (zoomReset) zoomReset.addEventListener('click', function () { setUserZoom(1); });

  var stageWrap = document.getElementById('deviceStageWrap');
  if (stageWrap) {
    stageWrap.addEventListener('wheel', function (e) {
      if (!e.ctrlKey) return;
      e.preventDefault();
      setUserZoom(userZoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
    }, { passive: false });
  }

  var protoIframe = document.getElementById('protoIframe');
  var protoUrlInput = document.getElementById('protoUrlInput');
  var protoUrlGo = document.getElementById('protoUrlGo');
  var protoUrlReload = document.getElementById('protoUrlReload');
  var protoUrlResultados = document.getElementById('protoUrlResultados');

  function goResultadosScreen() {
    if (!protoUrlInput) return;
    protoUrlInput.value = RESULTADOS_URL;
    navigateProtoFrame();
  }

  function normalizeProtoUrl(raw) {
    var url = String(raw || '').trim();
    if (!url) return '';
    if (/^https?:\/\//i.test(url)) return url;
    if (url.charAt(0) === '/') return 'http://localhost:8782' + url;
    return 'http://localhost:8782/' + url.replace(/^\//, '');
  }

  function navigateProtoFrame() {
    if (!protoIframe || !protoUrlInput) return;
    var url = normalizeProtoUrl(protoUrlInput.value);
    if (!url) return;
    protoUrlInput.value = url;
    protoIframe.src = url;
    try { localStorage.setItem('carihub_proto_url_resultados', url); } catch (e) {}
  }

  if (protoUrlGo) protoUrlGo.addEventListener('click', navigateProtoFrame);
  if (protoUrlResultados) protoUrlResultados.addEventListener('click', goResultadosScreen);
  if (protoUrlReload && protoIframe) {
    protoUrlReload.addEventListener('click', function () {
      try { protoIframe.contentWindow.location.reload(); }
      catch (e) { protoIframe.src = protoIframe.src; }
    });
  }
  if (protoUrlInput) {
    protoUrlInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        navigateProtoFrame();
      }
    });
    try {
      var savedUrl = localStorage.getItem('carihub_proto_url_resultados');
      if (savedUrl && /resultados\.html/i.test(savedUrl)) {
        protoUrlInput.value = savedUrl;
        if (protoIframe) protoIframe.src = savedUrl;
      } else {
        protoUrlInput.value = RESULTADOS_URL;
        if (protoIframe) protoIframe.src = RESULTADOS_URL;
      }
    } catch (e) {
      protoUrlInput.value = RESULTADOS_URL;
      if (protoIframe) protoIframe.src = RESULTADOS_URL;
    }
  }

  window.addEventListener('resize', updateProtoMetrics);
  window.addEventListener('load', updateProtoMetrics);
})();
</script>
</body>
</html>

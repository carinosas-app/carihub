<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:Arial,sans-serif;
  background:var(--fondo);
  color:var(--texto);
}

/* PANTALLA ACOSTADA SIMULADA */
.app-horizontal{
  width:100vw;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--fondo);
  -webkit-overflow-scrolling:touch;
  padding:14px;
}

/* PUBLICIDAD SUPERIOR */
.publicidad-top{
  width:100%;
  min-height:78px;
  background:linear-gradient(90deg,#ffffff,#ffe0ed);
  border:3px solid var(--rosa);
  border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--rosa);
  font-weight:900;
  cursor:pointer;
  margin-bottom:14px;
}

.publicidad-top .titulo{
  font-size:24px;
  letter-spacing:2px;
}

.publicidad-top .subtitulo{
  font-size:15px;
  margin-top:5px;
}

/* CUERPO HORIZONTAL */
.layout-horizontal{
  display:grid;
  grid-template-columns:115px minmax(460px, 1fr) 115px;
  gap:14px;
  align-items:start;
  min-height:calc(100vh - 120px);
}

/* BANNERS LATERALES CON SCROLL */
.columna-banner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}

.side-box{
  width:100%;
  border-radius:22px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  line-height:1.1;
  cursor:pointer;
  padding:10px;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  letter-spacing:2px;
}

.side-destacado{
  min-height:260px;
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  color:white;
  border:3px solid white;
  font-size:16px;
}

.side-publicidad{
  min-height:430px;
  background:white;
  color:var(--rosa);
  border:3px solid var(--rosa);
  font-size:16px;
}

/* PERFIL */
.contenido{
  width:100%;
}

.card{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-bottom:22px;
}

.perfil-grid{
  display:grid;
  grid-template-columns:45% 55%;
  gap:18px;
  align-items:start;
}

.foto-principal{
  width:100%;
  max-height:360px;
  object-fit:cover;
  border-radius:20px;
  display:block;
}

h1{
  color:var(--rosa);
  font-size:34px;
  margin:0 0 12px;
}

.info p{
  font-size:18px;
  line-height:1.35;
  margin:10px 0;
}

.info b{
  color:#111;
}

.whatsapp{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:16px;
  border-radius:14px;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
  margin-top:18px;
}

.galeria{
  margin-top:22px;
}

.galeria h2{
  color:var(--rosa);
  font-size:28px;
  margin:0 0 16px;
}

.galeria-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.galeria img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:18px;
  display:block;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.14);
}

.estado-box h2{
  color:var(--rosa);
  margin:0 0 8px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* FORZAR ACOSTADO CUANDO EL CELULAR ESTÁ VERTICAL */
@media (orientation: portrait){
  body{
    width:100vh;
    height:100vw;
  }

  .app-horizontal{
    position:fixed;
    top:0;
    left:100vw;
    width:100vh;
    height:100vw;
    transform:rotate(90deg);
    transform-origin:top left;
    overflow-y:auto;
    overflow-x:hidden;
    padding:10px;
  }

  .publicidad-top{
    min-height:62px;
    margin-bottom:10px;
    border-radius:16px;
  }

  .publicidad-top .titulo{
    font-size:20px;
  }

  .publicidad-top .subtitulo{
    font-size:12px;
  }

  .layout-horizontal{
    grid-template-columns:82px minmax(420px, 1fr) 82px;
    gap:10px;
    min-height:calc(100vw - 86px);
  }

  .side-box{
    border-radius:16px;
    padding:7px;
    letter-spacing:1px;
  }

  .side-destacado{
    min-height:190px;
    font-size:12px;
  }

  .side-publicidad{
    min-height:320px;
    font-size:12px;
  }

  .card{
    padding:12px;
    border-radius:20px;
    margin-bottom:16px;
  }

  .perfil-grid{
    grid-template-columns:220px 1fr;
    gap:12px;
  }

  .foto-principal{
    max-height:230px;
    border-radius:16px;
  }

  h1{
    font-size:25px;
  }

  .info p{
    font-size:15px;
    margin:6px 0;
  }

  .whatsapp{
    font-size:16px;
    padding:13px;
    margin-top:10px;
  }

  .galeria h2{
    font-size:22px;
  }

  .galeria-grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .galeria img{
    height:150px;
  }

  .acciones-finales{
    padding:12px;
    margin-top:18px;
  }

  .acciones-finales button{
    padding:14px;
    font-size:16px;
  }
}

/* SI YA ESTÁ ACOSTADO NORMAL */
@media (orientation: landscape){
  .app-horizontal{
    position:relative;
  }
}
</style>
</head>

<body>

<div class="app-horizontal">

  <div class="publicidad-top" onclick="irCuestionarioAnuncio()">
    <div class="titulo">PUBLICIDAD</div>
    <div class="subtitulo">Anúnciate aquí o anuncia tu negocio aquí</div>
  </div>

  <div class="layout-horizontal">

    <div class="columna-banner">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

    <div class="contenido" id="contenido">
      <div class="estado-box">
        <h2>Cargando perfil...</h2>
      </div>
    </div>

    <div class="columna-banner">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function limpiarTelefono(t){
  return String(t||"").replace(/\D/g,"");
}

function irCuestionarioAnuncio(){
  window.location.href = "index.html?abrir=anuncio";
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="history.back()">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarPerfil(){

  const id = obtenerParametro("id");
  const contenido = document.getElementById("contenido");

  if(!id){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Perfil no encontrado</h2>
        <p>No llegó el ID del perfil.</p>
      </div>
      ${botonesFinales()}
    `;
    return;
  }

  try{

    const doc = await db.collection("usuarios").doc(id).get();

    if(!doc.exists){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no encontrado</h2>
          <p>Este perfil no existe o fue eliminado.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const u = doc.data();

    let vencido = false;

    if(u.vencido === true){
      vencido = true;
    }

    if(u.fechaVencimiento){
      const fechaV = u.fechaVencimiento.toDate
        ? u.fechaVencimiento.toDate()
        : new Date(u.fechaVencimiento);

      if(fechaV < new Date()){
        vencido = true;
      }
    }

    if(u.aprobado !== true || u.activo !== true || vencido){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no disponible</h2>
          <p>Este perfil no está activo públicamente.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const tel = limpiarTelefono(u.telefono || "");
    const msg = encodeURIComponent("Hola, vi tu perfil en CariHub y me gustaría recibir más información.");

    contenido.innerHTML = `
      <div class="card">

        <div class="perfil-grid">

          <div>
            ${u.fotoURL ? `
              <img class="foto-principal" src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
            ` : ""}
          </div>

          <div>
            <h1>${textoSeguro(u.nombre || "Perfil")}</h1>

            <div class="info">
              <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
              <p><b>País:</b> ${textoSeguro(u.pais || "")}</p>
              <p><b>Estado:</b> ${textoSeguro(u.estado || "")}</p>
              <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
              <p><b>Descripción:</b> ${textoSeguro(u.descripcion || "")}</p>
              <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>
              <p><b>Modalidad:</b> ${textoSeguro(u.modalidad || "")}</p>

              ${u.horario ? `<p><b>Horario:</b> ${textoSeguro(u.horario)}</p>` : ""}
              ${u.zona ? `<p><b>Zona:</b> ${textoSeguro(u.zona)}</p>` : ""}
              ${u.servicios ? `<p><b>Servicios:</b> ${textoSeguro(u.servicios)}</p>` : ""}
            </div>

            ${tel ? `
              <a class="whatsapp" href="https://wa.me/${tel}?text=${msg}" target="_blank">
                Contactar por WhatsApp
              </a>
            ` : ""}
          </div>

        </div>

        ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
          <div class="galeria">
            <h2>Fotos públicas</h2>
            <div class="galeria-grid">
              ${u.fotosExtraURL.map(f=>`
                <img src="${textoSeguro(f)}" alt="Foto pública extra">
              `).join("")}
            </div>
          </div>
        ` : ""}

      </div>

      ${botonesFinales()}
    `;

  }catch(error){

    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>

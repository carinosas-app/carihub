<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f7edf2;
  color:var(--texto);
}

.contenido{
  max-width:900px;
  margin:0 auto;
  padding:14px 12px 35px;
}

/* ORDEN: DESTACADO - PUBLICIDAD GRANDE - DESTACADO */
.top-banners{
  display:grid;
  grid-template-columns:.85fr 1.8fr .85fr;
  gap:10px;
  margin-bottom:18px;
  align-items:stretch;
}

.banner-publicidad,
.banner-destacado{
  min-height:98px;
  border-radius:22px;
  box-shadow:0 5px 18px rgba(0,0,0,.12);
  cursor:pointer;
  overflow:hidden;
}

.banner-publicidad{
  background:linear-gradient(90deg,#ffffff,#ffe0ef,#ffffff);
  border:3px solid #ec2d7a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
}

.banner-publicidad .icono{
  width:54px;
  height:54px;
  min-width:54px;
  border-radius:16px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 4px 12px rgba(236,45,122,.28);
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:19px;
  font-weight:900;
  line-height:1;
  letter-spacing:.8px;
}

.banner-publicidad .texto p{
  margin:6px 0 8px;
  color:#5c4b55;
  font-size:12px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:#ec2d7a;
  color:white;
  font-size:9px;
  font-weight:900;
  padding:6px 10px;
  border-radius:999px;
}

.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 8px;
}

.banner-destacado .estrella{
  font-size:25px;
  margin-bottom:5px;
}

.banner-destacado h3{
  margin:0;
  font-size:15px;
  font-weight:900;
  letter-spacing:1px;
}

.banner-destacado p{
  margin:5px 0 0;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

.card{
  background:white;
  border-radius:28px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.10);
  margin-bottom:22px;
}

.foto-principal{
  width:100%;
  border-radius:22px;
  max-height:560px;
  object-fit:cover;
  display:block;
}

h1{
  color:#d83b78;
  font-size:40px;
  margin:16px 0 12px;
}

.info p{
  margin:12px 0;
  font-size:18px;
  line-height:1.38;
}

.info b{
  color:#111;
}

.whatsapp{
  display:block;
  width:100%;
  text-align:center;
  margin-top:18px;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:18px;
  border-radius:20px;
  font-size:21px;
  font-weight:900;
}

.galeria{
  margin-top:22px;
}

.galeria h2{
  margin:0 0 14px;
  color:#d83b78;
  font-size:28px;
}

.galeria img{
  width:100%;
  border-radius:18px;
  margin-bottom:14px;
  display:block;
}

.estado-box{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 4px 18px rgba(0,0,0,.10);
}

.estado-box h2{
  color:#d83b78;
  margin:0 0 8px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:#ec2d7a;
  color:white;
}

@media(max-width:600px){
  .contenido{
    padding:10px 10px 28px;
  }

  .top-banners{
    grid-template-columns:.8fr 1.9fr .8fr;
    gap:6px;
    margin-bottom:14px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:17px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .card{
    border-radius:24px;
    padding:16px;
  }

  .foto-principal{
    border-radius:18px;
    max-height:520px;
  }

  h1{
    font-size:32px;
  }

  .info p{
    font-size:17px;
  }

  .whatsapp{
    font-size:18px;
    padding:16px;
    border-radius:18px;
  }

  .galeria h2{
    font-size:24px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="contenido">

  <div class="top-banners">

    <div class="banner-destacado" onclick="irCuestionarioAnuncio()">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Aparece primero en la zona.</p>
    </div>

    <div class="banner-publicidad" onclick="irCuestionarioAnuncio()">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>MÁS INFORMACIÓN</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="irCuestionarioAnuncio()">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad para tu perfil.</p>
    </div>

  </div>

  <div id="contenido">
    <div class="estado-box">
      <h2>Cargando perfil...</h2>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function textoSeguro(t){
  return String(t || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function limpiarTelefono(t){
  return String(t || "").replace(/\D/g,"");
}

function irCuestionarioAnuncio(){
  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  window.open("https://wa.me/528112304664?text=" + msg, "_blank");
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="history.back()">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarPerfil(){
  const id = obtenerParametro("id");
  const contenido = document.getElementById("contenido");

  if(!id){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Perfil no encontrado</h2>
        <p>No llegó el ID del perfil.</p>
      </div>
      ${botonesFinales()}
    `;
    return;
  }

  try{
    const doc = await db.collection("usuarios").doc(id).get();

    if(!doc.exists){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no encontrado</h2>
          <p>Este perfil no existe o fue eliminado.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const u = doc.data();

    let vencido = false;

    if(u.vencido === true){
      vencido = true;
    }

    if(u.fechaVencimiento){
      const fechaV = u.fechaVencimiento.toDate
        ? u.fechaVencimiento.toDate()
        : new Date(u.fechaVencimiento);

      if(fechaV < new Date()){
        vencido = true;
      }
    }

    if(u.aprobado !== true || u.activo !== true || vencido){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no disponible</h2>
          <p>Este perfil no está activo públicamente.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const tel = limpiarTelefono(u.telefono || "");
    const msg = encodeURIComponent("Hola, vi tu perfil en CariHub y me gustaría recibir más información.");

    contenido.innerHTML = `
      <div class="card">

        ${u.fotoURL ? `
          <img class="foto-principal" src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
        ` : ""}

        <h1>${textoSeguro(u.nombre || "Perfil")}</h1>

        <div class="info">
          <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
          <p><b>País:</b> ${textoSeguro(u.pais || "")}</p>
          <p><b>Estado:</b> ${textoSeguro(u.estado || "")}</p>
          <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
          <p><b>Descripción:</b> ${textoSeguro(u.descripcion || "")}</p>
          <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>
          <p><b>Modalidad:</b> ${textoSeguro(u.modalidad || "")}</p>
          ${u.horario ? `<p><b>Horario:</b> ${textoSeguro(u.horario)}</p>` : ""}
          ${u.zona ? `<p><b>Zona:</b> ${textoSeguro(u.zona)}</p>` : ""}
          ${u.servicios ? `<p><b>Servicios:</b> ${textoSeguro(u.servicios)}</p>` : ""}
        </div>

        ${tel ? `
          <a class="whatsapp" href="https://wa.me/${tel}?text=${msg}" target="_blank">
            Contactar por WhatsApp
          </a>
        ` : ""}

        ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
          <div class="galeria">
            <h2>Fotos públicas</h2>
            ${u.fotosExtraURL.map(f => `
              <img src="${textoSeguro(f)}" alt="Foto pública extra">
            `).join("")}
          </div>
        ` : ""}

      </div>

      ${botonesFinales()}
    `;

  }catch(error){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
}

body{
  font-family:Arial,sans-serif;
  background:var(--fondo);
  color:var(--texto);
  overflow:hidden;
}

/* PUBLICIDAD SUPERIOR FIJA */
.publicidad-top{
  position:fixed;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:94%;
  max-width:900px;
  height:88px;
  background:linear-gradient(90deg,#ffffff,#ffe0ed);
  border:3px solid var(--rosa);
  border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--rosa);
  font-weight:900;
  cursor:pointer;
}

.publicidad-top .titulo{
  font-size:24px;
  letter-spacing:2px;
}

.publicidad-top .subtitulo{
  font-size:14px;
  margin-top:5px;
}

/* TODO ESTO HACE SCROLL */
.scroll-area{
  position:fixed;
  top:108px;
  bottom:0;
  left:0;
  right:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 10px 130px;
}

/* PERFIL + ANUNCIOS A UN SOLO LADO */
.layout{
  max-width:980px;
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,1fr) 82px;
  gap:12px;
  align-items:start;
}

.contenido{
  min-width:0;
}

.columna-anuncios{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.side-box{
  width:100%;
  border-radius:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  cursor:pointer;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  letter-spacing:2px;
  padding:10px 5px;
}

.side-destacado{
  height:230px;
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  color:white;
  border:3px solid white;
  font-size:14px;
}

.side-publicidad{
  height:360px;
  background:white;
  color:var(--rosa);
  border:3px solid var(--rosa);
  font-size:14px;
}

.card{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-bottom:22px;
}

.foto-principal{
  width:100%;
  max-height:520px;
  object-fit:cover;
  border-radius:20px;
  display:block;
}

h1{
  color:var(--rosa);
  font-size:36px;
  margin:18px 0 12px;
}

.info p{
  font-size:19px;
  line-height:1.45;
  margin:12px 0;
}

.info b{
  color:#111;
}

.whatsapp{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:16px;
  border-radius:14px;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
  margin-top:18px;
}

.galeria{
  margin-top:22px;
}

.galeria h2{
  color:var(--rosa);
  font-size:28px;
  margin:0 0 16px;
}

.galeria img{
  width:100%;
  border-radius:18px;
  margin-bottom:16px;
  display:block;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.14);
}

.estado-box h2{
  color:var(--rosa);
  margin:0 0 8px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

@media(max-width:600px){
  .publicidad-top{
    top:8px;
    height:82px;
    width:92%;
    border-radius:18px;
  }

  .publicidad-top .titulo{
    font-size:20px;
  }

  .publicidad-top .subtitulo{
    font-size:12px;
  }

  .scroll-area{
    top:102px;
    padding:10px 8px 130px;
  }

  .layout{
    grid-template-columns:minmax(0,1fr) 58px;
    gap:8px;
  }

  .side-box{
    border-radius:15px;
    letter-spacing:1px;
    padding:8px 4px;
  }

  .side-destacado{
    height:210px;
    font-size:11px;
  }

  .side-publicidad{
    height:320px;
    font-size:11px;
  }

  .card{
    padding:14px;
    border-radius:22px;
  }

  .foto-principal{
    max-height:480px;
  }

  h1{
    font-size:32px;
  }

  .info p{
    font-size:18px;
  }

  .whatsapp{
    font-size:18px;
    padding:15px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="publicidad-top" onclick="irCuestionarioAnuncio()">
  <div class="titulo">PUBLICIDAD</div>
  <div class="subtitulo">Anúnciate aquí o anuncia tu negocio aquí</div>
</div>

<div class="scroll-area">
  <div class="layout">

    <div class="contenido" id="contenido">
      <div class="estado-box">
        <h2>Cargando perfil...</h2>
      </div>
    </div>

    <div class="columna-anuncios">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function limpiarTelefono(t){
  return String(t||"").replace(/\D/g,"");
}

function irCuestionarioAnuncio(){
  window.location.href = "index.html?abrir=anuncio";
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="history.back()">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarPerfil(){

  const id = obtenerParametro("id");
  const contenido = document.getElementById("contenido");

  if(!id){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Perfil no encontrado</h2>
        <p>No llegó el ID del perfil.</p>
      </div>
      ${botonesFinales()}
    `;
    return;
  }

  try{

    const doc = await db.collection("usuarios").doc(id).get();

    if(!doc.exists){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no encontrado</h2>
          <p>Este perfil no existe o fue eliminado.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const u = doc.data();

    let vencido = false;

    if(u.vencido === true){
      vencido = true;
    }

    if(u.fechaVencimiento){
      const fechaV = u.fechaVencimiento.toDate
        ? u.fechaVencimiento.toDate()
        : new Date(u.fechaVencimiento);

      if(fechaV < new Date()){
        vencido = true;
      }
    }

    if(u.aprobado !== true || u.activo !== true || vencido){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no disponible</h2>
          <p>Este perfil no está activo públicamente.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const tel = limpiarTelefono(u.telefono || "");
    const msg = encodeURIComponent("Hola, vi tu perfil en CariHub y me gustaría recibir más información.");

    contenido.innerHTML = `
      <div class="card">

        ${u.fotoURL ? `
          <img class="foto-principal" src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
        ` : ""}

        <h1>${textoSeguro(u.nombre || "Perfil")}</h1>

        <div class="info">
          <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
          <p><b>País:</b> ${textoSeguro(u.pais || "")}</p>
          <p><b>Estado:</b> ${textoSeguro(u.estado || "")}</p>
          <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
          <p><b>Descripción:</b> ${textoSeguro(u.descripcion || "")}</p>
          <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>
          <p><b>Modalidad:</b> ${textoSeguro(u.modalidad || "")}</p>

          ${u.horario ? `<p><b>Horario:</b> ${textoSeguro(u.horario)}</p>` : ""}
          ${u.zona ? `<p><b>Zona:</b> ${textoSeguro(u.zona)}</p>` : ""}
          ${u.servicios ? `<p><b>Servicios:</b> ${textoSeguro(u.servicios)}</p>` : ""}
        </div>

        ${tel ? `
          <a class="whatsapp" href="https://wa.me/${tel}?text=${msg}" target="_blank">
            Contactar por WhatsApp
          </a>
        ` : ""}

        ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
          <div class="galeria">
            <h2>Fotos públicas</h2>
            ${u.fotosExtraURL.map(f=>`
              <img src="${textoSeguro(f)}" alt="Foto pública extra">
            `).join("")}
          </div>
        ` : ""}

      </div>

      ${botonesFinales()}
    `;

  }catch(error){

    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>

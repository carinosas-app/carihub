<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --rosa3:#d83b78;
  --fondo:#fff1f7;
  --texto:#252432;
  --gris:#6b6170;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at left 18%, rgba(236,45,122,.17), transparent 28%),
    radial-gradient(circle at right 38%, rgba(236,45,122,.12), transparent 30%),
    linear-gradient(180deg,#fff6fb 0%,#f7edf2 55%,#fff7fb 100%);
  color:var(--texto);
}

.pagina{
  max-width:930px;
  margin:0 auto;
  padding:14px 12px 40px;
}

/* BLOQUE SUPERIOR: DESTACADO CIUDAD - PUBLICIDAD - DESTACADO CIUDAD */
.top-banners{
  display:grid;
  grid-template-columns:.82fr 1.9fr .82fr;
  gap:8px;
  margin-bottom:20px;
  align-items:stretch;
}

.banner-publicidad,
.banner-destacado{
  min-height:94px;
  border-radius:24px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  user-select:none;
}

.banner-publicidad{
  background:linear-gradient(90deg,#ffffff,#ffe0ef,#ffffff);
  border:3px solid var(--rosa);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:10px 12px;
  box-shadow:
    0 12px 30px rgba(236,45,122,.24),
    0 0 0 5px rgba(255,255,255,.68),
    inset 0 0 22px rgba(255,255,255,.75);
}

.banner-publicidad::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.60),transparent);
  transform:translateX(-120%);
  animation:brilloCariHub 4s infinite;
  pointer-events:none;
}

@keyframes brilloCariHub{
  0%{transform:translateX(-120%);}
  45%{transform:translateX(120%);}
  100%{transform:translateX(120%);}
}

.banner-publicidad .icono{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:14px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:23px;
  box-shadow:0 5px 14px rgba(236,45,122,.30);
  z-index:1;
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
  z-index:1;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:16px;
  font-weight:900;
  line-height:1;
  letter-spacing:.6px;
}

.banner-publicidad .texto p{
  margin:5px 0 7px;
  color:#5c4b55;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:var(--rosa);
  color:white;
  font-size:8px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
}

.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  box-shadow:
    0 10px 24px rgba(236,45,122,.26),
    inset 0 0 15px rgba(255,255,255,.20);
}

.banner-destacado::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,.28),transparent 45%);
  pointer-events:none;
}

.banner-destacado .estrella{
  font-size:20px;
  margin-bottom:4px;
  z-index:1;
}

.banner-destacado h3{
  margin:0;
  font-size:11px;
  font-weight:900;
  letter-spacing:.5px;
  z-index:1;
}

.banner-destacado p{
  margin:4px 0 0;
  font-size:7px;
  font-weight:700;
  line-height:1.15;
  z-index:1;
}

/* PERFIL */
.card{
  position:relative;
  background:white;
  border-radius:32px;
  padding:18px;
  box-shadow:
    0 16px 38px rgba(0,0,0,.15),
    -12px 0 28px rgba(236,45,122,.08),
    12px 0 28px rgba(236,45,122,.08);
  margin-bottom:28px;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  left:0;
  top:24px;
  bottom:24px;
  width:5px;
  background:linear-gradient(180deg,#ff7bb7,#ec2d7a);
  border-radius:999px;
  opacity:.62;
}

.card::after{
  content:"";
  position:absolute;
  right:-45px;
  top:-45px;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(236,45,122,.10),transparent 65%);
  pointer-events:none;
}

.foto-principal{
  width:100%;
  border-radius:24px;
  max-height:560px;
  object-fit:cover;
  display:block;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

h1{
  color:var(--rosa3);
  font-size:40px;
  margin:18px 0 14px;
  line-height:1;
}

.info p{
  margin:12px 0;
  font-size:18px;
  line-height:1.38;
}

.info b{
  color:#111;
}

.whatsapp{
  display:block;
  width:100%;
  text-align:center;
  margin-top:20px;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:18px;
  border-radius:22px;
  font-size:21px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(37,211,102,.25);
}

.galeria{
  margin-top:24px;
}

.galeria h2{
  margin:0 0 14px;
  color:var(--rosa3);
  font-size:28px;
}

.galeria img{
  width:100%;
  border-radius:20px;
  margin-bottom:14px;
  display:block;
  box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.estado-box{
  background:white;
  border-radius:24px;
  padding:18px;
  box-shadow:
    0 8px 24px rgba(0,0,0,.10),
    -8px 0 22px rgba(236,45,122,.06),
    8px 0 22px rgba(236,45,122,.06);
}

.estado-box h2{
  color:var(--rosa3);
  margin:0 0 8px;
}

.estado-box p{
  margin:8px 0 0;
  color:var(--gris);
  font-size:16px;
  line-height:1.35;
}

.acciones-finales{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 10px 26px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* MODAL */
.modal-anuncio{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:18px;
}

.modal-anuncio.activo{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.modal-header{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
  padding:18px;
  text-align:center;
}

.modal-header h2{
  margin:0;
  font-size:25px;
}

.modal-body{
  padding:18px;
}

.modal-body p{
  margin:10px 0;
  font-size:16px;
  line-height:1.35;
}

.modal-body b{
  color:#111;
}

.modal-botones{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:0 18px 18px;
}

.modal-botones a,
.modal-botones button{
  display:block;
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  text-align:center;
  font-weight:900;
  font-size:16px;
  text-decoration:none;
  cursor:pointer;
}

.btn-wa{
  background:#25D366;
  color:white;
}

.btn-cerrar{
  background:#777;
  color:white;
}

@media(max-width:600px){
  .pagina{
    padding:10px 10px 30px;
  }

  .top-banners{
    grid-template-columns:.82fr 1.9fr .82fr;
    gap:6px;
    margin-bottom:16px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:19px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .card{
    padding:15px;
    border-radius:28px;
  }

  .foto-principal{
    border-radius:22px;
    max-height:520px;
  }

  h1{
    font-size:32px;
  }

  .info p{
    font-size:17px;
  }

  .whatsapp{
    font-size:18px;
    padding:16px;
    border-radius:19px;
  }

  .galeria h2{
    font-size:24px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="pagina">

  <div id="bannersSuperioresCariHub" class="top-banners">

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_ciudad_1')">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Destacado de la ciudad</p>
    </div>

    <div class="banner-publicidad" onclick="abrirInfoAnuncio('publicidad')">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>VER DATOS</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_ciudad_2')">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad local</p>
    </div>

  </div>

  <div id="contenido">
    <div class="estado-box">
      <h2>Cargando perfil...</h2>
      <p>Estamos revisando la información pública.</p>
    </div>
  </div>

</div>

<div class="modal-anuncio" id="modalAnuncio">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitulo">Publicidad</h2>
    </div>

    <div class="modal-body" id="modalContenido"></div>

    <div class="modal-botones">
      <a class="btn-wa" id="modalWhatsApp" href="#" target="_blank">Contactar por WhatsApp</a>
      <button class="btn-cerrar" onclick="cerrarInfoAnuncio()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let ciudadActualPerfil = "Ciudad seleccionada";

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function textoSeguro(t){
  return String(t || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function limpiarTelefono(t){
  return String(t || "").replace(/\D/g,"");
}

function abrirInfoAnuncio(tipo){
  const modal = document.getElementById("modalAnuncio");
  const titulo = document.getElementById("modalTitulo");
  const contenido = document.getElementById("modalContenido");
  const wa = document.getElementById("modalWhatsApp");

  let datos = {
    titulo:"Publicidad disponible",
    nombre:"Espacio disponible para anunciante",
    categoria:"Publicidad / negocio / perfil",
    ubicacion:"Disponible por ciudad",
    horario:"Atención por WhatsApp",
    promocion:"Pregunta por precios, duración y destacado",
    descripcion:"Este espacio puede mostrar tu negocio, marca, servicio o perfil destacado.",
    telefono:"528112304664"
  };

  if(tipo.includes("destacado")){
    datos.titulo = "Perfil destacado de la ciudad";
    datos.nombre = "Espacio destacado disponible";
    datos.categoria = "Destacado local";
    datos.ubicacion = ciudadActualPerfil || "Ciudad seleccionada";
    datos.promocion = "Aparece arriba en perfiles de esta ciudad.";
    datos.descripcion = "Ideal para perfiles que quieren más visibilidad dentro de su ciudad.";
  }

  titulo.textContent = datos.titulo;

  contenido.innerHTML = `
    <p><b>Nombre:</b> ${textoSeguro(datos.nombre)}</p>
    <p><b>Categoría:</b> ${textoSeguro(datos.categoria)}</p>
    <p><b>Ubicación:</b> ${textoSeguro(datos.ubicacion)}</p>
    <p><b>Horario:</b> ${textoSeguro(datos.horario)}</p>
    <p><b>Promoción:</b> ${textoSeguro(datos.promocion)}</p>
    <p><b>Descripción:</b> ${textoSeguro(datos.descripcion)}</p>
  `;

  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  wa.href = "https://wa.me/" + datos.telefono + "?text=" + msg;

  modal.classList.add("activo");
}

function cerrarInfoAnuncio(){
  document.getElementById("modalAnuncio").classList.remove("activo");
}

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="history.back()">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html?abrir=registro'">Registrarse</button>
    </div>
  `;
}

async function cargarPerfil(){
  const id = obtenerParametro("id");
  const contenido = document.getElementById("contenido");

  if(!id){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Perfil no encontrado</h2>
        <p>No llegó el ID del perfil.</p>
      </div>
      ${botonesFinales()}
    `;
    return;
  }

  try{
    const doc = await db.collection("usuarios").doc(id).get();

    if(!doc.exists){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no encontrado</h2>
          <p>Este perfil no existe o fue eliminado.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const u = doc.data();

    ciudadActualPerfil = u.ciudad || "Ciudad seleccionada";

    let vencido = false;

    if(u.vencido === true){
      vencido = true;
    }

    if(u.fechaVencimiento){
      const fechaV = u.fechaVencimiento.toDate
        ? u.fechaVencimiento.toDate()
        : new Date(u.fechaVencimiento);

      if(fechaV < new Date()){
        vencido = true;
      }
    }

    if(u.aprobado !== true || u.activo !== true || vencido){
      contenido.innerHTML = `
        <div class="estado-box">
          <h2>Perfil no disponible</h2>
          <p>Este perfil no está activo públicamente.</p>
        </div>
        ${botonesFinales()}
      `;
      return;
    }

    const tel = limpiarTelefono(u.telefono || "");
    const msg = encodeURIComponent("Hola, vi tu perfil en CariHub y me gustaría recibir más información.");

    contenido.innerHTML = `
      <div class="card">

        ${u.fotoURL ? `
          <img class="foto-principal" src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
        ` : ""}

        <h1>${textoSeguro(u.nombre || "Perfil")}</h1>

        <div class="info">
          <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
          <p><b>País:</b> ${textoSeguro(u.pais || "")}</p>
          <p><b>Estado:</b> ${textoSeguro(u.estado || "")}</p>
          <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
          <p><b>Descripción:</b> ${textoSeguro(u.descripcion || "")}</p>
          <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>
          <p><b>Modalidad:</b> ${textoSeguro(u.modalidad || "")}</p>
          ${u.horario ? `<p><b>Horario:</b> ${textoSeguro(u.horario)}</p>` : ""}
          ${u.zona ? `<p><b>Zona:</b> ${textoSeguro(u.zona)}</p>` : ""}
          ${u.servicios ? `<p><b>Servicios:</b> ${textoSeguro(u.servicios)}</p>` : ""}
        </div>

        ${tel ? `
          <a class="whatsapp" href="https://wa.me/${tel}?text=${msg}" target="_blank">
            Contactar por WhatsApp
          </a>
        ` : ""}

        ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
          <div class="galeria">
            <h2>Fotos públicas</h2>
            ${u.fotosExtraURL.map(f => `
              <img src="${textoSeguro(f)}" alt="Foto pública extra">
            `).join("")}
          </div>
        ` : ""}

      </div>

      ${botonesFinales()}
    `;

  }catch(error){
    contenido.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarPerfil();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff1f7;
}

.header{
  background:#e91e63;
  color:white;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.resultados{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  border-radius:18px;
  padding:15px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.18);
}

.card img{
  width:100%;
  border-radius:15px;
  max-height:420px;
  object-fit:cover;
}

.card h3{
  color:#e91e63;
  font-size:28px;
}

.whatsapp{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  margin-top:12px;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:18px;
  margin-bottom:18px;
}
</style>
</head>

<body>

<div class="header">
Resultados CariHub
</div>

<div class="resultados" id="lista"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t||"")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function limpiarTelefono(t){
  return String(t||"").replace(/\D/g,"");
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

async function cargarResultados(){

  const lista=document.getElementById("lista");

  lista.innerHTML=`
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
    </div>
  `;

  try{

    const snap=await db.collection("usuarios")
      .where("aprobado","==",true)
      .get();

    lista.innerHTML="";

    let encontrados=0;

    for(const doc of snap.docs){

      const u=doc.data();

      if(u.activo!==true) continue;

      const exacto =
        normalizarTexto(u.categoria)===normalizarTexto(categoria) &&
        normalizarTexto(u.pais)===normalizarTexto(pais) &&
        normalizarTexto(u.estado)===normalizarTexto(estado) &&
        normalizarTexto(u.ciudad)===normalizarTexto(ciudad);

      if(exacto){

        encontrados++;

        const tel=limpiarTelefono(u.telefono||"");

        lista.innerHTML += `
          <div class="card">

            ${u.fotoURL ? `
              <img src="${u.fotoURL}">
            ` : ""}

            <h3>${u.nombre||""}</h3>

            <p><b>Categoría:</b> ${u.categoria||""}</p>
            <p><b>País:</b> ${u.pais||""}</p>
            <p><b>Estado:</b> ${u.estado||""}</p>
            <p><b>Ciudad:</b> ${u.ciudad||""}</p>
            <p><b>Descripción:</b> ${u.descripcion||""}</p>
            <p><b>Precio:</b> ${u.precio||""}</p>

            ${tel ? `
              <a class="whatsapp"
              href="https://wa.me/${tel}"
              target="_blank">
              Contactar por WhatsApp
              </a>
            ` : ""}

          </div>
        `;
      }
    }

    if(encontrados===0){
      lista.innerHTML=`
        <div class="estado-box">
          <h2>No encontramos perfiles</h2>
          <p>Intenta otra búsqueda.</p>
        </div>
      `;
    }

  }catch(error){

    document.getElementById("lista").innerHTML=`
      <div class="estado-box">
        <h2>Error</h2>
        <p>${error.message}</p>
      </div>
    `;
  }
}

cargarResultados();

</script>

</body>
</html>

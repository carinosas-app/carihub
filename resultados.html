<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at left 18%, rgba(236,45,122,.13), transparent 30%),
    radial-gradient(circle at right 40%, rgba(236,45,122,.12), transparent 30%),
    #f7edf2;
  color:var(--texto);
}

.pagina{
  max-width:930px;
  margin:0 auto;
  padding:14px 12px 38px;
}

/* ARRIBA: DESTACADO ESTADO - PUBLICIDAD GRANDE - DESTACADO ESTADO */
.top-banners{
  display:grid;
  grid-template-columns:.85fr 1.8fr .85fr;
  gap:10px;
  margin-bottom:20px;
  align-items:stretch;
}

.banner-publicidad,
.banner-destacado{
  min-height:98px;
  border-radius:24px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
}

.banner-publicidad{
  background:linear-gradient(90deg,#fff,#ffe1ef,#fff);
  border:3px solid #ec2d7a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  box-shadow:
    0 8px 24px rgba(236,45,122,.20),
    inset 0 0 20px rgba(255,255,255,.65);
}

.banner-publicidad .icono{
  width:54px;
  height:54px;
  min-width:54px;
  border-radius:17px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 4px 12px rgba(236,45,122,.28);
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:19px;
  font-weight:900;
  line-height:1;
  letter-spacing:.8px;
}

.banner-publicidad .texto p{
  margin:6px 0 8px;
  color:#5c4b55;
  font-size:12px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:#ec2d7a;
  color:white;
  font-size:9px;
  font-weight:900;
  padding:6px 10px;
  border-radius:999px;
}

.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 8px;
  box-shadow:
    0 8px 22px rgba(236,45,122,.22),
    inset 0 0 14px rgba(255,255,255,.18);
}

.banner-destacado .estrella{
  font-size:25px;
  margin-bottom:5px;
}

.banner-destacado h3{
  margin:0;
  font-size:15px;
  font-weight:900;
  letter-spacing:1px;
}

.banner-destacado p{
  margin:5px 0 0;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

/* CAJAS */
.estado-box{
  background:white;
  padding:18px;
  border-radius:22px;
  margin-bottom:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.10);
}

.estado-box h2,
.estado-box h3{
  color:var(--rosa);
  margin:0 0 8px;
}

.card{
  position:relative;
  background:white;
  border-radius:30px;
  padding:18px;
  margin-bottom:26px;
  box-shadow:
    0 12px 34px rgba(0,0,0,.14),
    -10px 0 24px rgba(236,45,122,.07),
    10px 0 24px rgba(236,45,122,.07);
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  left:0;
  top:22px;
  bottom:22px;
  width:5px;
  background:linear-gradient(180deg,#ff7bb7,#ec2d7a);
  border-radius:999px;
  opacity:.55;
}

.card img{
  width:100%;
  height:330px;
  object-fit:cover;
  border-radius:22px;
  display:block;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.card h3{
  color:#d83b78;
  font-size:34px;
  margin:18px 0 12px;
}

.card p{
  margin:12px 0;
  font-size:20px;
  line-height:1.35;
}

.card b{
  color:#111;
}

.btn-ver{
  display:block;
  width:100%;
  background:#d94481;
  color:white;
  text-align:center;
  padding:18px;
  border-radius:20px;
  text-decoration:none;
  font-size:21px;
  font-weight:900;
  margin-top:20px;
  box-shadow:0 6px 18px rgba(217,68,129,.24);
}

.acciones-finales{
  background:white;
  border-radius:24px;
  padding:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* MODAL PUBLICIDAD / DESTACADO */
.modal-anuncio{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:18px;
}

.modal-anuncio.activo{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.modal-header{
  background:linear-gradient(90deg,#ec2d7a,#ff4f9a);
  color:white;
  padding:18px;
  text-align:center;
}

.modal-header h2{
  margin:0;
  font-size:25px;
}

.modal-body{
  padding:18px;
}

.modal-body p{
  margin:10px 0;
  font-size:16px;
  line-height:1.35;
}

.modal-body b{
  color:#111;
}

.modal-botones{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:0 18px 18px;
}

.modal-botones a,
.modal-botones button{
  display:block;
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  text-align:center;
  font-weight:900;
  font-size:16px;
  text-decoration:none;
  cursor:pointer;
}

.btn-wa{
  background:#25D366;
  color:white;
}

.btn-cerrar{
  background:#777;
  color:white;
}

@media(max-width:600px){
  .pagina{
    padding:10px 10px 28px;
  }

  .top-banners{
    grid-template-columns:.8fr 1.9fr .8fr;
    gap:6px;
    margin-bottom:14px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:18px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .card{
    padding:15px;
    border-radius:26px;
  }

  .card img{
    height:300px;
    border-radius:20px;
  }

  .card h3{
    font-size:31px;
  }

  .card p{
    font-size:19px;
  }

  .btn-ver{
    font-size:19px;
    padding:16px;
    border-radius:18px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="pagina">

  <div class="top-banners">

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_estado_1')">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Destacado del estado.</p>
    </div>

    <div class="banner-publicidad" onclick="abrirInfoAnuncio('publicidad')">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>VER DATOS</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="abrirInfoAnuncio('destacado_estado_2')">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad estatal.</p>
    </div>

  </div>

  <div id="lista">
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
    </div>
  </div>

</div>

<div class="modal-anuncio" id="modalAnuncio">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitulo">Publicidad</h2>
    </div>

    <div class="modal-body" id="modalContenido"></div>

    <div class="modal-botones">
      <a class="btn-wa" id="modalWhatsApp" href="#" target="_blank">Contactar por WhatsApp</a>
      <button class="btn-cerrar" onclick="cerrarInfoAnuncio()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t||"")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function abrirInfoAnuncio(tipo){
  const modal = document.getElementById("modalAnuncio");
  const titulo = document.getElementById("modalTitulo");
  const contenido = document.getElementById("modalContenido");
  const wa = document.getElementById("modalWhatsApp");

  let datos = {
    titulo:"Publicidad disponible",
    nombre:"Espacio disponible para anunciante",
    categoria:"Publicidad / negocio / perfil",
    ubicacion:"Disponible por estado o ciudad",
    horario:"Atención por WhatsApp",
    promocion:"Pregunta por precios, duración y destacado",
    descripcion:"Este espacio puede mostrar tu negocio, marca, servicio o perfil destacado.",
    telefono:"528112304664"
  };

  if(tipo.includes("destacado")){
    datos.titulo = "Perfil destacado del estado";
    datos.nombre = "Espacio destacado disponible";
    datos.categoria = "Destacado estatal";
    datos.ubicacion = estado || "Estado seleccionado";
    datos.promocion = "Aparece arriba en resultados del estado.";
    datos.descripcion = "Ideal para perfiles que quieren más visibilidad dentro del estado.";
  }

  titulo.textContent = datos.titulo;

  contenido.innerHTML = `
    <p><b>Nombre:</b> ${textoSeguro(datos.nombre)}</p>
    <p><b>Categoría:</b> ${textoSeguro(datos.categoria)}</p>
    <p><b>Ubicación:</b> ${textoSeguro(datos.ubicacion)}</p>
    <p><b>Horario:</b> ${textoSeguro(datos.horario)}</p>
    <p><b>Promoción:</b> ${textoSeguro(datos.promocion)}</p>
    <p><b>Descripción:</b> ${textoSeguro(datos.descripcion)}</p>
  `;

  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  wa.href = "https://wa.me/" + datos.telefono + "?text=" + msg;

  modal.classList.add("activo");
}

function cerrarInfoAnuncio(){
  document.getElementById("modalAnuncio").classList.remove("activo");
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="window.location.href='index.html'">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html?abrir=registro'">Registrarse</button>
    </div>
  `;
}

async function cargarResultados(){

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
      <p>Estamos revisando perfiles disponibles.</p>
    </div>
  `;

  try{
    const snap = await db.collection("usuarios")
      .where("aprobado","==",true)
      .get();

    lista.innerHTML = "";

    let encontrados = 0;

    for(const doc of snap.docs){
      const u = doc.data();

      let vencido = false;

      if(u.vencido === true){
        vencido = true;
      }

      if(u.fechaVencimiento){
        const fechaV = u.fechaVencimiento.toDate
          ? u.fechaVencimiento.toDate()
          : new Date(u.fechaVencimiento);

        if(fechaV < new Date()){
          vencido = true;
        }
      }

      if(vencido) continue;
      if(u.activo !== true) continue;

      const exacto =
        normalizarTexto(u.categoria) === normalizarTexto(categoria) &&
        normalizarTexto(u.pais) === normalizarTexto(pais) &&
        normalizarTexto(u.estado) === normalizarTexto(estado) &&
        normalizarTexto(u.ciudad) === normalizarTexto(ciudad);

      if(!exacto) continue;

      encontrados++;

      lista.innerHTML += `
        <div class="card">

          ${u.fotoURL ? `<img src="${textoSeguro(u.fotoURL)}" alt="Foto pública">` : ""}

          <h3>${textoSeguro(u.nombre || "Perfil")}</h3>

          <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
          <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
          <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>

          <a class="btn-ver" href="perfil.html?id=${encodeURIComponent(doc.id)}">
            Ver perfil
          </a>

        </div>
      `;
    }

    if(encontrados === 0){
      lista.innerHTML = `
        <div class="estado-box">
          <h3>No encontramos perfiles</h3>
          <p>No hay perfiles activos en esta búsqueda todavía.</p>
        </div>
      `;
    }

    lista.innerHTML += botonesFinales();

  }catch(error){
    lista.innerHTML = `
      <div class="estado-box">
        <h3>Error</h3>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarResultados();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:Arial,sans-serif;
  background:var(--fondo);
  color:var(--texto);
}

/* PANTALLA ACOSTADA SIMULADA */
.app-horizontal{
  width:100vw;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--fondo);
  -webkit-overflow-scrolling:touch;
  padding:14px;
}

/* PUBLICIDAD SUPERIOR */
.publicidad-top{
  width:100%;
  min-height:78px;
  background:linear-gradient(90deg,#ffffff,#ffe0ed);
  border:3px solid var(--rosa);
  border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--rosa);
  font-weight:900;
  cursor:pointer;
  margin-bottom:14px;
}

.publicidad-top .titulo{
  font-size:24px;
  letter-spacing:2px;
}

.publicidad-top .subtitulo{
  font-size:15px;
  margin-top:5px;
}

/* CUERPO HORIZONTAL */
.layout-horizontal{
  display:grid;
  grid-template-columns:115px minmax(460px, 1fr) 115px;
  gap:14px;
  align-items:start;
  min-height:calc(100vh - 120px);
}

/* BANNERS LATERALES CON SCROLL */
.columna-banner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}

.side-box{
  width:100%;
  border-radius:22px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  line-height:1.1;
  cursor:pointer;
  padding:10px;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  letter-spacing:2px;
}

.side-destacado{
  min-height:260px;
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  color:white;
  border:3px solid white;
  font-size:16px;
}

.side-publicidad{
  min-height:430px;
  background:white;
  color:var(--rosa);
  border:3px solid var(--rosa);
  font-size:16px;
}

/* RESULTADOS */
.resultados{
  width:100%;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.14);
}

.estado-box h2{
  color:var(--rosa);
  margin:0 0 8px;
}

.card{
  background:white;
  border-radius:24px;
  padding:16px;
  margin-bottom:22px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
}

.card-grid{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:16px;
  align-items:center;
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:20px;
  display:block;
}

.card h3{
  color:var(--rosa);
  font-size:32px;
  margin:0 0 12px;
}

.card p{
  font-size:19px;
  line-height:1.35;
  margin:10px 0;
}

.card b{
  color:#111;
}

.btn-ver{
  display:block;
  width:100%;
  background:var(--rosa);
  color:white;
  text-align:center;
  padding:16px;
  border-radius:16px;
  text-decoration:none;
  font-size:19px;
  font-weight:900;
  margin-top:16px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

/* FORZAR ACOSTADO CUANDO EL CELULAR ESTÁ VERTICAL */
@media (orientation: portrait){
  body{
    width:100vh;
    height:100vw;
  }

  .app-horizontal{
    position:fixed;
    top:0;
    left:100vw;
    width:100vh;
    height:100vw;
    transform:rotate(90deg);
    transform-origin:top left;
    overflow-y:auto;
    overflow-x:hidden;
    padding:10px;
  }

  .publicidad-top{
    min-height:62px;
    margin-bottom:10px;
    border-radius:16px;
  }

  .publicidad-top .titulo{
    font-size:20px;
  }

  .publicidad-top .subtitulo{
    font-size:12px;
  }

  .layout-horizontal{
    grid-template-columns:82px minmax(420px, 1fr) 82px;
    gap:10px;
    min-height:calc(100vw - 86px);
  }

  .side-box{
    border-radius:16px;
    padding:7px;
    letter-spacing:1px;
  }

  .side-destacado{
    min-height:190px;
    font-size:12px;
  }

  .side-publicidad{
    min-height:320px;
    font-size:12px;
  }

  .card{
    padding:12px;
    border-radius:20px;
    margin-bottom:16px;
  }

  .card-grid{
    grid-template-columns:175px 1fr;
    gap:12px;
  }

  .card img{
    height:185px;
    border-radius:16px;
  }

  .card h3{
    font-size:25px;
  }

  .card p{
    font-size:16px;
    margin:7px 0;
  }

  .btn-ver{
    font-size:16px;
    padding:13px;
    margin-top:10px;
  }

  .acciones-finales{
    padding:12px;
    margin-top:18px;
  }

  .acciones-finales button{
    padding:14px;
    font-size:16px;
  }
}

/* SI YA ESTÁ ACOSTADO NORMAL */
@media (orientation: landscape){
  .app-horizontal{
    position:relative;
  }
}
</style>
</head>

<body>

<div class="app-horizontal">

  <div class="publicidad-top" onclick="irCuestionarioAnuncio()">
    <div class="titulo">PUBLICIDAD</div>
    <div class="subtitulo">Anúnciate aquí o anuncia tu negocio aquí</div>
  </div>

  <div class="layout-horizontal">

    <div class="columna-banner">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

    <div class="resultados" id="lista">
      <div class="estado-box">
        <h2>Buscando perfiles...</h2>
      </div>
    </div>

    <div class="columna-banner">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t||"")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function irCuestionarioAnuncio(){
  window.location.href = "index.html?abrir=anuncio";
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="window.location.href='index.html'">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarResultados(){

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
      <p>Estamos revisando perfiles disponibles.</p>
    </div>
  `;

  try{

    const snap = await db.collection("usuarios")
      .where("aprobado","==",true)
      .get();

    lista.innerHTML = "";

    let encontrados = 0;

    for(const doc of snap.docs){

      const u = doc.data();

      let vencido = false;

      if(u.vencido === true){
        vencido = true;
      }

      if(u.fechaVencimiento){
        const fechaV = u.fechaVencimiento.toDate
          ? u.fechaVencimiento.toDate()
          : new Date(u.fechaVencimiento);

        if(fechaV < new Date()){
          vencido = true;
        }
      }

      if(vencido) continue;
      if(u.activo !== true) continue;

      const exacto =
        normalizarTexto(u.categoria) === normalizarTexto(categoria) &&
        normalizarTexto(u.pais) === normalizarTexto(pais) &&
        normalizarTexto(u.estado) === normalizarTexto(estado) &&
        normalizarTexto(u.ciudad) === normalizarTexto(ciudad);

      if(exacto){

        encontrados++;

        lista.innerHTML += `
          <div class="card">
            <div class="card-grid">

              <div>
                ${u.fotoURL ? `
                  <img src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
                ` : ""}
              </div>

              <div>
                <h3>${textoSeguro(u.nombre || "Perfil")}</h3>

                <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
                <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
                <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>

                <a class="btn-ver" href="perfil.html?id=${encodeURIComponent(doc.id)}">
                  Ver perfil
                </a>
              </div>

            </div>
          </div>
        `;
      }
    }

    if(encontrados === 0){
      lista.innerHTML = `
        <div class="estado-box">
          <h2>No encontramos perfiles</h2>
          <p>No hay perfiles activos en esta búsqueda todavía.</p>
        </div>
      `;
    }

    lista.innerHTML += botonesFinales();

  }catch(error){

    lista.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarResultados();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f7edf2;
  color:var(--texto);
}

.resultados{
  max-width:900px;
  margin:0 auto;
  padding:14px 12px 35px;
}

/* ORDEN: DESTACADO - PUBLICIDAD GRANDE - DESTACADO */
.top-banners{
  display:grid;
  grid-template-columns:.85fr 1.8fr .85fr;
  gap:10px;
  margin-bottom:18px;
  align-items:stretch;
}

.banner-publicidad,
.banner-destacado{
  min-height:98px;
  border-radius:22px;
  box-shadow:0 5px 18px rgba(0,0,0,.12);
  cursor:pointer;
  overflow:hidden;
}

/* PUBLICIDAD MÁS GRANDE Y MÁS LLAMATIVA */
.banner-publicidad{
  background:linear-gradient(90deg,#ffffff,#ffe0ef,#ffffff);
  border:3px solid #ec2d7a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
}

.banner-publicidad .icono{
  width:54px;
  height:54px;
  min-width:54px;
  border-radius:16px;
  background:linear-gradient(180deg,#ff5ca3,#ec2d7a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 4px 12px rgba(236,45,122,.28);
}

.banner-publicidad .texto{
  flex:1;
  text-align:center;
}

.banner-publicidad .texto h3{
  margin:0;
  color:#d53378;
  font-size:19px;
  font-weight:900;
  line-height:1;
  letter-spacing:.8px;
}

.banner-publicidad .texto p{
  margin:6px 0 8px;
  color:#5c4b55;
  font-size:12px;
  font-weight:700;
  line-height:1.15;
}

.banner-publicidad .texto span{
  display:inline-block;
  background:#ec2d7a;
  color:white;
  font-size:9px;
  font-weight:900;
  padding:6px 10px;
  border-radius:999px;
}

/* DESTACADOS MÁS PEQUEÑOS */
.banner-destacado{
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  border:2px solid white;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 8px;
}

.banner-destacado .estrella{
  font-size:25px;
  margin-bottom:5px;
}

.banner-destacado h3{
  margin:0;
  font-size:15px;
  font-weight:900;
  letter-spacing:1px;
}

.banner-destacado p{
  margin:5px 0 0;
  font-size:9px;
  font-weight:700;
  line-height:1.15;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.14);
}

.estado-box h2,
.estado-box h3{
  color:var(--rosa);
  margin:0 0 8px;
}

.card{
  background:white;
  border-radius:28px;
  padding:18px;
  margin-bottom:22px;
  box-shadow:0 6px 20px rgba(0,0,0,.10);
}

.card img{
  width:100%;
  height:330px;
  object-fit:cover;
  border-radius:22px;
  display:block;
}

.card h3{
  color:#d83b78;
  font-size:34px;
  margin:18px 0 12px;
}

.card p{
  margin:12px 0;
  font-size:20px;
  line-height:1.35;
}

.card b{
  color:#111;
}

.btn-ver{
  display:block;
  width:100%;
  background:#d94481;
  color:white;
  text-align:center;
  padding:18px;
  border-radius:20px;
  text-decoration:none;
  font-size:21px;
  font-weight:900;
  margin-top:20px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

@media(max-width:600px){
  .resultados{
    padding:10px 10px 28px;
  }

  .top-banners{
    grid-template-columns:.8fr 1.9fr .8fr;
    gap:6px;
    margin-bottom:14px;
  }

  .banner-publicidad,
  .banner-destacado{
    min-height:84px;
    border-radius:17px;
  }

  .banner-publicidad{
    padding:7px 8px;
    gap:5px;
  }

  .banner-publicidad .icono{
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:10px;
    font-size:18px;
  }

  .banner-publicidad .texto h3{
    font-size:11px;
  }

  .banner-publicidad .texto p{
    font-size:8px;
    margin:4px 0 5px;
  }

  .banner-publicidad .texto span{
    font-size:7px;
    padding:4px 6px;
  }

  .banner-destacado{
    padding:6px;
  }

  .banner-destacado .estrella{
    font-size:17px;
    margin-bottom:3px;
  }

  .banner-destacado h3{
    font-size:9px;
  }

  .banner-destacado p{
    font-size:7px;
  }

  .card{
    padding:15px;
    border-radius:24px;
  }

  .card img{
    height:300px;
    border-radius:18px;
  }

  .card h3{
    font-size:31px;
  }

  .card p{
    font-size:19px;
  }

  .btn-ver{
    font-size:19px;
    padding:16px;
    border-radius:18px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="resultados">

  <div class="top-banners">

    <div class="banner-destacado" onclick="irCuestionarioAnuncio()">
      <div class="estrella">⭐</div>
      <h3>DESTACADO</h3>
      <p>Aparece primero en la zona.</p>
    </div>

    <div class="banner-publicidad" onclick="irCuestionarioAnuncio()">
      <div class="icono">📣</div>
      <div class="texto">
        <h3>PUBLICIDAD</h3>
        <p>Anuncia tu negocio o promociona tu perfil en CariHub.</p>
        <span>MÁS INFORMACIÓN</span>
      </div>
      <div class="icono">📈</div>
    </div>

    <div class="banner-destacado" onclick="irCuestionarioAnuncio()">
      <div class="estrella">🔥</div>
      <h3>DESTACADO</h3>
      <p>Más visibilidad para tu perfil.</p>
    </div>

  </div>

  <div id="lista">
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t||"")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function irCuestionarioAnuncio(){
  const msg = encodeURIComponent("Hola, quiero información para anunciarme o destacar mi perfil en CariHub.");
  window.open("https://wa.me/528112304664?text=" + msg, "_blank");
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="window.location.href='index.html'">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarResultados(){

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
      <p>Estamos revisando perfiles disponibles.</p>
    </div>
  `;

  try{
    const snap = await db.collection("usuarios")
      .where("aprobado","==",true)
      .get();

    lista.innerHTML = "";

    let encontrados = 0;

    for(const doc of snap.docs){
      const u = doc.data();

      let vencido = false;

      if(u.vencido === true){
        vencido = true;
      }

      if(u.fechaVencimiento){
        const fechaV = u.fechaVencimiento.toDate
          ? u.fechaVencimiento.toDate()
          : new Date(u.fechaVencimiento);

        if(fechaV < new Date()){
          vencido = true;
        }
      }

      if(vencido) continue;
      if(u.activo !== true) continue;

      const exacto =
        normalizarTexto(u.categoria) === normalizarTexto(categoria) &&
        normalizarTexto(u.pais) === normalizarTexto(pais) &&
        normalizarTexto(u.estado) === normalizarTexto(estado) &&
        normalizarTexto(u.ciudad) === normalizarTexto(ciudad);

      if(!exacto) continue;

      encontrados++;

      lista.innerHTML += `
        <div class="card">

          ${u.fotoURL ? `<img src="${textoSeguro(u.fotoURL)}" alt="Foto pública">` : ""}

          <h3>${textoSeguro(u.nombre || "Perfil")}</h3>

          <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
          <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
          <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>

          <a class="btn-ver" href="perfil.html?id=${encodeURIComponent(doc.id)}">
            Ver perfil
          </a>

        </div>
      `;
    }

    if(encontrados === 0){
      lista.innerHTML = `
        <div class="estado-box">
          <h3>No encontramos perfiles</h3>
          <p>No hay perfiles activos en esta búsqueda todavía.</p>
        </div>
      `;
    }

    lista.innerHTML += botonesFinales();

  }catch(error){
    lista.innerHTML = `
      <div class="estado-box">
        <h3>Error</h3>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarResultados();
</script>

</body>
</html>

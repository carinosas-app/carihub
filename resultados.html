<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados - CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --rosa:#ec2d7a;
  --rosa2:#ff4f9a;
  --fondo:#fff1f7;
  --texto:#252432;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
}

body{
  font-family:Arial,sans-serif;
  background:var(--fondo);
  color:var(--texto);
  overflow:hidden;
}

/* PUBLICIDAD SUPERIOR FIJA */
.publicidad-top{
  position:fixed;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:94%;
  max-width:900px;
  height:88px;
  background:linear-gradient(90deg,#ffffff,#ffe0ed);
  border:3px solid var(--rosa);
  border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--rosa);
  font-weight:900;
  cursor:pointer;
}

.publicidad-top .titulo{
  font-size:24px;
  letter-spacing:2px;
}

.publicidad-top .subtitulo{
  font-size:14px;
  margin-top:5px;
}

/* TODO ESTO HACE SCROLL */
.scroll-area{
  position:fixed;
  top:108px;
  bottom:0;
  left:0;
  right:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 10px 130px;
}

/* CUERPO: PERFILES + BANNERS A UN SOLO LADO */
.layout{
  max-width:980px;
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,1fr) 82px;
  gap:12px;
  align-items:start;
}

.resultados{
  min-width:0;
}

.columna-anuncios{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* BANNERS DEL LADO DERECHO */
.side-box{
  width:100%;
  border-radius:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  cursor:pointer;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  letter-spacing:2px;
  padding:10px 5px;
}

.side-destacado{
  height:230px;
  background:linear-gradient(180deg,#ff4f9a,#ec2d7a);
  color:white;
  border:3px solid white;
  font-size:14px;
}

.side-publicidad{
  height:360px;
  background:white;
  color:var(--rosa);
  border:3px solid var(--rosa);
  font-size:14px;
}

.estado-box{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.14);
}

.estado-box h2{
  color:var(--rosa);
  margin:0 0 8px;
}

.card{
  background:white;
  border-radius:24px;
  padding:16px;
  margin-bottom:22px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
}

.card img{
  width:100%;
  height:330px;
  object-fit:cover;
  border-radius:20px;
  display:block;
}

.card h3{
  color:var(--rosa);
  font-size:34px;
  margin:18px 0 12px;
}

.card p{
  font-size:20px;
  line-height:1.35;
  margin:12px 0;
}

.card b{
  color:#111;
}

.btn-ver{
  display:block;
  width:100%;
  background:var(--rosa);
  color:white;
  text-align:center;
  padding:17px;
  border-radius:16px;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  margin-top:22px;
}

.acciones-finales{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  margin-top:28px;
  display:flex;
  gap:12px;
}

.acciones-finales button{
  flex:1;
  border:none;
  padding:17px;
  border-radius:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-atras{
  background:#777;
  color:white;
}

.btn-registro{
  background:var(--rosa);
  color:white;
}

@media(max-width:600px){
  .publicidad-top{
    top:8px;
    height:82px;
    width:92%;
    border-radius:18px;
  }

  .publicidad-top .titulo{
    font-size:20px;
  }

  .publicidad-top .subtitulo{
    font-size:12px;
  }

  .scroll-area{
    top:102px;
    padding:10px 8px 130px;
  }

  .layout{
    grid-template-columns:minmax(0,1fr) 58px;
    gap:8px;
  }

  .side-box{
    border-radius:15px;
    letter-spacing:1px;
    padding:8px 4px;
  }

  .side-destacado{
    height:210px;
    font-size:11px;
  }

  .side-publicidad{
    height:320px;
    font-size:11px;
  }

  .card{
    padding:14px;
    border-radius:22px;
  }

  .card img{
    height:285px;
  }

  .card h3{
    font-size:31px;
  }

  .card p{
    font-size:19px;
  }

  .btn-ver{
    font-size:19px;
    padding:16px;
  }

  .acciones-finales{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="publicidad-top" onclick="irCuestionarioAnuncio()">
  <div class="titulo">PUBLICIDAD</div>
  <div class="subtitulo">Anúnciate aquí o anuncia tu negocio aquí</div>
</div>

<div class="scroll-area">
  <div class="layout">

    <div class="resultados" id="lista">
      <div class="estado-box">
        <h2>Buscando perfiles...</h2>
      </div>
    </div>

    <div class="columna-anuncios">
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-destacado" onclick="irCuestionarioAnuncio()">DESTACADO</div>
      <div class="side-box side-publicidad" onclick="irCuestionarioAnuncio()">PUBLICIDAD</div>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function obtenerParametro(nombre){
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre) || "";
}

function normalizarTexto(t){
  return String(t||"")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function textoSeguro(t){
  return String(t||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function irCuestionarioAnuncio(){
  window.location.href = "index.html?abrir=anuncio";
}

const categoria = obtenerParametro("categoria");
const pais = obtenerParametro("pais");
const estado = obtenerParametro("estado");
const ciudad = obtenerParametro("ciudad");

function botonesFinales(){
  return `
    <div class="acciones-finales">
      <button class="btn-atras" onclick="window.location.href='index.html'">← Atrás</button>
      <button class="btn-registro" onclick="window.location.href='index.html'">Registrarse</button>
    </div>
  `;
}

async function cargarResultados(){

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div class="estado-box">
      <h2>Buscando perfiles...</h2>
      <p>Estamos revisando perfiles disponibles.</p>
    </div>
  `;

  try{

    const snap = await db.collection("usuarios")
      .where("aprobado","==",true)
      .get();

    lista.innerHTML = "";

    let encontrados = 0;

    for(const doc of snap.docs){

      const u = doc.data();

      let vencido = false;

      if(u.vencido === true){
        vencido = true;
      }

      if(u.fechaVencimiento){
        const fechaV = u.fechaVencimiento.toDate
          ? u.fechaVencimiento.toDate()
          : new Date(u.fechaVencimiento);

        if(fechaV < new Date()){
          vencido = true;
        }
      }

      if(vencido) continue;
      if(u.activo !== true) continue;

      const exacto =
        normalizarTexto(u.categoria) === normalizarTexto(categoria) &&
        normalizarTexto(u.pais) === normalizarTexto(pais) &&
        normalizarTexto(u.estado) === normalizarTexto(estado) &&
        normalizarTexto(u.ciudad) === normalizarTexto(ciudad);

      if(exacto){

        encontrados++;

        lista.innerHTML += `
          <div class="card">

            ${u.fotoURL ? `
              <img src="${textoSeguro(u.fotoURL)}" alt="Foto pública">
            ` : ""}

            <h3>${textoSeguro(u.nombre || "Perfil")}</h3>

            <p><b>Categoría:</b> ${textoSeguro(u.categoria || "")}</p>
            <p><b>Ciudad:</b> ${textoSeguro(u.ciudad || "")}</p>
            <p><b>Precio:</b> ${textoSeguro(u.precio || "")}</p>

            <a class="btn-ver" href="perfil.html?id=${encodeURIComponent(doc.id)}">
              Ver perfil
            </a>

          </div>
        `;
      }
    }

    if(encontrados === 0){
      lista.innerHTML = `
        <div class="estado-box">
          <h2>No encontramos perfiles</h2>
          <p>No hay perfiles activos en esta búsqueda todavía.</p>
        </div>
      `;
    }

    lista.innerHTML += botonesFinales();

  }catch(error){

    lista.innerHTML = `
      <div class="estado-box">
        <h2>Error</h2>
        <p>${textoSeguro(error.message)}</p>
      </div>
      ${botonesFinales()}
    `;
  }
}

cargarResultados();
</script>

</body>
</html>

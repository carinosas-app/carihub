<style>
body { margin:0; font-family:Arial; }

.contenedor { position:relative; }
.portada { width:100%; }

/* BOTÓN MENÚ */
.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  width:60px;
  height:60px;
  z-index:9999;
  cursor:pointer;
}

/* MENÚ */
.menu{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:white;
  transition:.3s;
  z-index:10000;
  padding:20px;
}
.menu.active{ right:0; }

.menu a{
  display:block;
  padding:15px;
  color:#c2185b;
  font-size:20px;
  text-decoration:none;
  border-bottom:1px solid #eee;
}

.cerrar{
  text-align:right;
  font-size:25px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  top:0;
  left:0;
  z-index:20000;
}

.form-box{
  background:white;
  margin:30px auto;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:15px;
}

.form-box input,
.form-box textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#c2185b;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">
  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<!-- MENÚ -->
<div class="menu" id="menu">
  <div class="cerrar" onclick="cerrarMenu()">✖️</div>

  <a href="#" onclick="abrirRegistro()">👤 Registrarse</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
</div>

<!-- REGISTRO -->
<div class="modal" id="modalRegistro">
  <div class="form-box">
    <h2>Registro</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="email" type="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
    <input id="telefono" placeholder="WhatsApp">
    <input id="categoria" placeholder="Categoría">
    <input id="estado" placeholder="Estado">
    <input id="ciudad" placeholder="Ciudad">
    <textarea id="descripcion" placeholder="Descripción"></textarea>

    <input id="foto" type="file">

    <button class="btn" onclick="registrar()">Enviar</button>
    <button class="btn" onclick="cerrarRegistro()">Cerrar</button>
  </div>
</div>

<script>
function abrirMenu(){
  document.getElementById("menu").classList.add("active");
}

function cerrarMenu(){
  document.getElementById("menu").classList.remove("active");
}

function abrirRegistro(){
  cerrarMenu();
  document.getElementById("modalRegistro").style.display="block";
}

function cerrarRegistro(){
  document.getElementById("modalRegistro").style.display="none";
}

async function registrar(){
  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const telefono = document.getElementById("telefono").value;
  const categoria = document.getElementById("categoria").value;
  const estado = document.getElementById("estado").value;
  const ciudad = document.getElementById("ciudad").value;
  const descripcion = document.getElementById("descripcion").value;
  const foto = document.getElementById("foto").files[0];

  if(!nombre || !email || !password || !telefono || !foto){
    alert("Completa todos los datos");
    return;
  }

  try{
    const cred = await auth.createUserWithEmailAndPassword(email,password);
    const user = cred.user;

    const ref = storage.ref("fotos/"+user.uid);
    await ref.put(foto);
    const url = await ref.getDownloadURL();

    await db.collection("usuarios").doc(user.uid).set({
      nombre,email,telefono,categoria,estado,ciudad,descripcion,
      fotoURL:url,
      aprobado:false,
      fecha:new Date()
    });

    alert("Registro enviado 🔥");
    cerrarRegistro();

  }catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cariñosas</title>

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #fff; }

.contenedor { position: relative; }

.portada {
  width: 100%;
  display: block;
}

.menu-btn {
  position: absolute;
  top: 0.8%;
  right: 1.5%;
  width: 12%;
  height: 5%;
  cursor: pointer;
  z-index: 10;
}

.menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100%;
  background: white;
  box-shadow: -5px 0 10px rgba(0,0,0,0.3);
  transition: 0.3s;
  padding: 20px;
  z-index: 999;
}

.menu.active { right: 0; }

.menu a {
  display: block;
  padding: 14px;
  margin: 6px 0;
  text-decoration: none;
  color: #d63384;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}

.btn-test {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #ff2e7a;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">
  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<div class="menu" id="menu">
  <a href="#" onclick="registrarUsuario()">👤 Regístrate</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
  <a href="#">📄 Términos</a>
</div>

<button class="btn-test" onclick="guardarRegistro()">🔥 Probar Firebase</button>

<script>
function abrirMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL4LNLtPqbyIxfF0NAqxi4rQG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.appspot.com",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626df90ca28858d1ea"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrarUsuario = async function() {
  const email = prompt("Correo:");
  const password = prompt("Contraseña:");
  const nombre = prompt("Nombre:");
  const whatsapp = prompt("WhatsApp:");
  const ciudad = prompt("Ciudad:");
  const descripcion = prompt("Descripción:");
  const precio = prompt("Precio:");

  try {
    await createUserWithEmailAndPassword(auth, email, password);

    await addDoc(collection(db, "usuarios"), {
      nombre,
      whatsapp,
      ciudad,
      descripcion,
      precio,
      email,
      aprobado: false,
      fecha: new Date()
    });

    alert("Registro enviado 🔥");
  } catch (error) {
    alert("Error: " + error.message);
  }
};

window.guardarRegistro = async function () {
  await addDoc(collection(db, "registros"), {
    nombre: "prueba",
    fecha: new Date()
  });
  alert("Guardado en Firebase 🔥");
};
</script>

</body>
</html>

/* ===== FUNCIONES ORIGINALES ===== */

function abrirMenu(){document.getElementById("menu").classList.add("active")}
function cerrarMenu(){document.getElementById("menu").classList.remove("active")}
function abrirRegistro(){cerrarMenu();document.getElementById("modalRegistro").style.display="block";irPaso(1)}
function cerrarRegistro(){document.getElementById("modalRegistro").style.display="none"}

function irPaso(num){document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));document.getElementById("step"+num).classList.add("active")}
function limpiarTelefono(t){return String(t||"").replace(/\D/g,"")}
function textoSeguro(texto){return String(texto||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}

function detectarIdioma(){
  const idioma=navigator.language || navigator.userLanguage;
  if(idioma && idioma.startsWith("es")) document.body.classList.add("es");
  else document.body.classList.add("en");
}

/* ===== DETECTAR MÉTODO DE PAGO ===== */

async function detectarMetodoPago(){
  try{
    const res=await fetch("https://ipapi.co/json/");
    const data=await res.json();
    const pais=data.country_code;

    if(PAISES_MERCADO_PAGO.includes(pais)){
      METODO_PAGO="mp";
      LINK_PAGO_ACTUAL=LINK_MERCADO_PAGO;
      TEXTO_PAGO_ACTUAL="Pagar con Mercado Pago";
    }else{
      METODO_PAGO="stripe";
      LINK_PAGO_ACTUAL=LINK_STRIPE;
      TEXTO_PAGO_ACTUAL="Pagar con Stripe";
    }
  }catch(e){
    LINK_PAGO_ACTUAL=LINK_STRIPE;
  }

  actualizarBotonesPago();
}

function actualizarBotonesPago(){
  document.querySelectorAll(".botonPagoAuto").forEach(btn=>{
    btn.innerText=TEXTO_PAGO_ACTUAL;
    btn.classList.remove("mp","stripe");
    btn.classList.add(METODO_PAGO==="mp" ? "mp" : "stripe");
  });

  document.querySelectorAll(".textoMetodoPago").forEach(el=>{
    el.innerText=METODO_PAGO==="mp"
      ? "Método detectado: Mercado Pago"
      : "Método detectado: Stripe";
  });
}

/* ===== 🔥 BOTÓN DE PAGO CORREGIDO ===== */

function irPago(){
  if(!LINK_PAGO_ACTUAL){
    alert("Error cargando método de pago, intenta de nuevo.");
    return;
  }

  // REDIRECCIÓN DIRECTA (SOLUCIONA TU PROBLEMA)
  window.location.href = LINK_PAGO_ACTUAL;
}

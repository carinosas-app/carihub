<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cariñosas</title>

<style>
body { margin: 0; font-family: Arial; background: #fff; }

/* PORTADA */
.portada {
  width: 100%;
  display: block;
}

/* FORMULARIO */
.form-box {
  background: white;
  margin: -60px 20px 20px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.form-box h2 {
  text-align: center;
  color: #ff2e7a;
}

.form-box input, .form-box textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #ff2e7a;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* LISTA */
.lista {
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<img src="portada.png" class="portada">

<div class="form-box">
  <h2>Publicar anuncio</h2>

  <input id="nombre" placeholder="Nombre o alias">
  <input id="email" placeholder="Correo">
  <input id="password" placeholder="Contraseña">
  <input id="whatsapp" placeholder="WhatsApp">
  <input id="ciudad" placeholder="Ciudad">
  <textarea id="descripcion" placeholder="Descripción"></textarea>
  <input id="precio" placeholder="Precio">

  <button class="btn" onclick="registrar()">Publicar</button>
</div>

<div class="lista" id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL4LNLtPqbyIxfF0NAqxi4rQG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.appspot.com",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626df90ca28858d1ea"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrar = async function() {
  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const ciudad = document.getElementById("ciudad").value;
  const descripcion = document.getElementById("descripcion").value;
  const precio = document.getElementById("precio").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);

    await addDoc(collection(db, "usuarios"), {
      nombre,
      whatsapp,
      ciudad,
      descripcion,
      precio,
      email,
      aprobado: false,
      fecha: new Date()
    });

    alert("Publicación enviada 🔥");
    cargar();
  } catch (error) {
    alert("Error: " + error.message);
  }
};

async function cargar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "usuarios"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    if (data.aprobado === true) {
      lista.innerHTML += `
        <div class="card">
          <h3>${data.nombre}</h3>
          <p>${data.descripcion}</p>
          <p><b>${data.precio}</b></p>
          <a href="https://wa.me/${data.whatsapp}" target="_blank">WhatsApp</a>
        </div>
      `;
    }
  });
}

cargar();
</script>

</body>
</html>

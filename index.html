<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const storage = firebase.storage();

<style>
body{margin:0;font-family:Arial;background:#fff}

.contenedor{position:relative}
.portada{width:100%}

.menu-btn{
  position:absolute;
  top:10px;
  right:10px;
  width:60px;
  height:60px;
  cursor:pointer;
  z-index:9999;
}

.menu{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  transition:.3s;
  z-index:10000;
  padding:20px;
}

.menu.active{right:0}

.menu a{
  display:block;
  padding:15px;
  color:#b7195b;
  font-size:20px;
  text-decoration:none;
}

.cerrar-menu{
  text-align:right;
  font-size:25px;
  cursor:pointer;
}

/* TARJETAS */
#lista-perfiles{padding:20px}

.card{
  background:white;
  border-radius:18px;
  padding:15px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.18);
  overflow:hidden;
}

.card img{
  width:100%;
  max-height:360px;
  object-fit:cover;
  border-radius:15px;
}

.card h3{
  color:#b7195b;
  font-size:26px;
}

/* GALERÍA PRO */
.galeria{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 0;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

.galeria img{
  min-width:90%;
  height:360px;
  object-fit:cover;
  border-radius:15px;
  scroll-snap-align:center;
  flex-shrink:0;
}

.galeria::-webkit-scrollbar{
  display:none;
}

.whatsapp{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">
  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<div class="menu" id="menu">
  <div class="cerrar-menu" onclick="cerrarMenu()">✕</div>
  <a href="#">👤 Registrarse</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
</div>

<div id="lista-perfiles"></div>

<script>
function abrirMenu(){
  document.getElementById("menu").classList.add("active")
}

function cerrarMenu(){
  document.getElementById("menu").classList.remove("active")
}

function limpiarTelefono(t){
  return String(t||"").replace(/\D/g,"")
}

function textoSeguro(texto){
  return String(texto||"")
}

async function cargarPerfiles(){
  const lista=document.getElementById("lista-perfiles");
  lista.innerHTML="";

  const snap=await db.collection("usuarios")
    .where("aprobado","==",true)
    .get();

  snap.forEach(doc=>{
    const u=doc.data();
    const tel=limpiarTelefono(u.telefono||"");

    lista.innerHTML+=`
    <div class="card">
      <img src="${u.fotoURL}">
      <h3>${u.nombre}</h3>
      <p><b>Ciudad:</b> ${u.ciudad}</p>
      <p><b>Categoría:</b> ${u.categoria}</p>
      <p><b>Descripción:</b> ${u.descripcion}</p>
      <p><b>Precio:</b> ${u.precio}</p>

      ${u.fotosExtraURL && u.fotosExtraURL.length > 0 ? `
        <div class="galeria">
          ${u.fotosExtraURL.map(f => `
            <img src="${f}">
          `).join("")}
        </div>
      ` : ""}

      <a class="whatsapp" href="https://wa.me/${tel}" target="_blank">
        Contactar por WhatsApp
      </a>
    </div>
    `;
  });
}

cargarPerfiles();
</script>

</body>
</html>

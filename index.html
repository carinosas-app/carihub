<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CariHub</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.appspot.com",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
</script>

<style>
body {
  margin:0;
  font-family:Arial;
}

.contenedor {
  position:relative;
}

.portada {
  width:100%;
}

.menu-btn {
  position:absolute;
  top:6.2%;
  right:2.2%;
  width:12%;
  height:6%;
  cursor:pointer;
}

.menu {
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:white;
  transition:.3s;
  padding:20px;
  z-index:999;
}

.menu.active {
  right:0;
}

.menu a {
  display:block;
  padding:18px 10px;
  color:#c2185b;
  text-decoration:none;
  font-size:20px;
  border-bottom:1px solid #eee;
}

.cerrar-menu {
  text-align:right;
  font-size:30px;
  cursor:pointer;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  top:0;
  left:0;
}

.form-box {
  background:white;
  margin:30px auto;
  padding:20px;
  width:90%;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
}

button {
  width:100%;
  padding:12px;
  background:#e83e7c;
  color:white;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">
  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<div class="menu" id="menu">
  <div class="cerrar-menu" onclick="cerrarMenu()">✕</div>
  <a href="#" onclick="abrirRegistro()">Regístrate</a>
  <a href="#">Banners</a>
  <a href="#">Denunciar</a>
  <a href="#">Términos</a>
</div>

<div class="modal" id="modal">
  <div class="form-box">

    <input id="nombre" placeholder="Nombre">
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña mínimo 6 caracteres">
    <input id="telefono" placeholder="WhatsApp">

    <button onclick="registrar()">Enviar</button>
    <button onclick="cerrarRegistro()">Cerrar</button>

  </div>
</div>

<script>
function abrirMenu() {
  document.getElementById("menu").classList.add("active");
}

function cerrarMenu() {
  document.getElementById("menu").classList.remove("active");
}

function abrirRegistro() {
  cerrarMenu();
  document.getElementById("modal").style.display = "block";
}

function cerrarRegistro() {
  document.getElementById("modal").style.display = "none";
}

async function registrar() {

  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const telefono = document.getElementById("telefono").value;

  if (!nombre || !email || !password || !telefono) {
    alert("Completa todos los datos");
    return;
  }

  if (password.length < 6) {
    alert("Contraseña mínimo 6 caracteres");
    return;
  }

  try {

    const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
    const user = cred.user;

    await firebase.firestore().collection("usuarios").doc(user.uid).set({
      nombre,
      email,
      telefono,
      aprobado:false,
      fecha:new Date()
    });

    alert("Registro enviado 🔥");
    cerrarRegistro();

  } catch (error) {
    alert(error.message);
  }
}
</script>

</body>
</html>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  background: #fff;
}

.contenedor {
  position: relative;
  width: 100%;
}

.portada {
  width: 100%;
  display: block;
}

.boton-invisible {
  position: absolute;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">

  <!-- BOTÓN -->
  <div class="boton-invisible"
    onclick="registrar()"
    style="top: 6.5%; right: 2.5%; width: 10%; height: 6%;">
  </div>
</div>

<script>
async function registrar() {
  const nombre = prompt("Nombre:");
  const email = prompt("Correo:");
  const password = prompt("Contraseña mínimo 6 caracteres:");
  const telefono = prompt("WhatsApp:");

  if (!nombre || !email || !password || !telefono) {
    alert("Completa todos los datos");
    return;
  }

  if (password.length < 6) {
    alert("La contraseña debe tener mínimo 6 caracteres");
    return;
  }

  try {
    const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
    const user = cred.user;

    await firebase.firestore().collection("usuarios").doc(user.uid).set({
      nombre: nombre,
      email: email,
      telefono: telefono,
      aprobado: false,
      fecha: new Date()
    });

    alert("Registro enviado 🔥");

  } catch (error) {
    console.error(error);

    if (error.code === "auth/email-already-in-use") {
      alert("Este correo ya está registrado");
    } else {
      alert("Error: " + error.message);
    }
  }
}
</script>

</body>
</html>

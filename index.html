<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cariñosas</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
}

.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 25px;
  cursor: pointer;
  z-index: 1000;
}

.menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100%;
  background: #fff;
  box-shadow: -2px 0 5px rgba(0,0,0,0.2);
  transition: 0.3s;
  padding: 20px;
}

.menu.active {
  right: 0;
}

.menu a {
  display: block;
  padding: 15px;
  border-bottom: 1px solid #eee;
  color: #e91e63;
  text-decoration: none;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- BOTÓN ☰ -->
<div class="menu-btn" onclick="abrirMenu()">☰</div>

<!-- MENÚ -->
<div class="menu" id="menu">
  <a href="#" onclick="registrarUsuario()">👤 Regístrate</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
  <a href="#">📄 Términos</a>
  <a href="#">📘 Condiciones</a>
  <a href="#">🔒 Privacidad</a>
  <a href="#">🍪 Cookies</a>
  <a href="#">💰 Pagos</a>
</div>

<script>
function abrirMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBL4LNLtPqbyIxfF0NAqxi4rQG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.appspot.com",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626df90ca28858d1ea"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrarUsuario = async function() {

  const email = prompt("Correo:");
  const password = prompt("Contraseña:");
  const nombre = prompt("Nombre o alias:");
  const whatsapp = prompt("WhatsApp:");
  const ciudad = prompt("Ciudad:");
  const descripcion = prompt("Descripción breve:");
  const precio = prompt("Precio o forma de trabajo:");

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await addDoc(collection(db, "usuarios"), {
      nombre,
      whatsapp,
      ciudad,
      descripcion,
      precio,
      email,
      aprobado: false,
      fecha: new Date()
    });

    alert("Registro enviado. Espera aprobación.");

  } catch (error) {
    alert("Error: " + error.message);
  }

};

</script>

</body>
</html>

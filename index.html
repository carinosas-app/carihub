<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CariHub</title>

<style>
body {
  margin: 0;
}

/* CONTENEDOR */
.contenedor {
  position: relative;
}

/* IMAGEN */
.portada {
  width: 100%;
  display: block;
}

/* BOTÓN INVISIBLE (3 rayitas) */
.menu-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 70px;
  height: 70px;
  cursor: pointer;
}

/* MENÚ LATERAL */
.menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100%;
  background: white;
  box-shadow: -5px 0 10px rgba(0,0,0,0.3);
  transition: 0.3s;
  padding: 20px;
  z-index: 999;
}

.menu.active {
  right: 0;
}

.menu a {
  display: block;
  padding: 12px;
  margin: 5px 0;
  text-decoration: none;
  color: #ff4b6e;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="contenedor">

  <!-- IMAGEN -->
  <img src="portada.png" class="portada">

  <!-- BOTÓN INVISIBLE SOBRE LAS 3 RAYITAS -->
  <div class="menu-btn" onclick="abrirMenu()"></div>

</div>

<!-- MENÚ -->
<div class="menu" id="menu">

  <a href="#">👤 Regístrate</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>

  <a href="#">📄 Términos y condiciones</a>
  <a href="#">📘 Condiciones de uso</a>
  <a href="#">🔒 Política de privacidad</a>
  <a href="#">🍪 Política de cookies</a>
  <a href="#">💳 Política de pagos</a>

</div>

<script>
function abrirMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>

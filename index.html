<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CariHub</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBl4LNLtPqbyIxfTfONAqxi4rOG4XF_vkI",
  authDomain: "carinosas-app.firebaseapp.com",
  projectId: "carinosas-app",
  storageBucket: "carinosas-app.firebasestorage.app",
  messagingSenderId: "267078845023",
  appId: "1:267078845023:web:a82e626d9f0ca28858d1ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

const LINK_MERCADO_PAGO = "https://mpago.la/1KQ3iuP";
const LINK_STRIPE = "https://buy.stripe.com/eVq8wR5Wr9GccXUbmbcAo00";
const WHATSAPP_ADMIN = "528112304664";
const PAISES_MERCADO_PAGO = ["MX","CO","PE","CL","AR","BR"];

let UID_PANEL = null;
let UID_EDITANDO = null;
let LINK_PAGO_ACTUAL = LINK_STRIPE;
let TEXTO_PAGO_ACTUAL = "Pagar con Stripe";
let METODO_PAGO = "stripe";
</script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#222}
.form-box{background:#fff;padding:20px;border-radius:20px}
.btn{padding:15px;border:none;border-radius:12px;font-weight:bold;width:100%;margin-top:10px}
.btn-continuar{background:#b7195b;color:white}
.btn-atras{background:#777;color:white}
.btn-pago{padding:15px;border-radius:12px;border:none;width:100%;margin-top:10px;font-weight:bold}
.mp{background:#ffe600}
.stripe{background:#635bff;color:white}
.estado-box{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="form-box">
<h2>Mi perfil</h2>
<input id="loginEmail" placeholder="Correo">
<input id="loginPassword" type="password" placeholder="Contraseña">
<button class="btn btn-continuar" onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none" class="form-box">
<h2>Panel de perfil</h2>
<div id="panelContenido"></div>
</div>

<script>

async function detectarMetodoPago(){
  try{
    const res=await fetch("https://ipapi.co/json/");
    const data=await res.json();
    const pais=data.country_code;

    if(PAISES_MERCADO_PAGO.includes(pais)){
      LINK_PAGO_ACTUAL=LINK_MERCADO_PAGO;
      TEXTO_PAGO_ACTUAL="Pagar con Mercado Pago";
      METODO_PAGO="mp";
    }else{
      LINK_PAGO_ACTUAL=LINK_STRIPE;
      TEXTO_PAGO_ACTUAL="Pagar con Stripe";
      METODO_PAGO="stripe";
    }
  }catch(e){
    LINK_PAGO_ACTUAL=LINK_STRIPE;
  }
}

function irPago(){
  if(!LINK_PAGO_ACTUAL){
    alert("Error cargando pago");
    return;
  }
  window.location.href = LINK_PAGO_ACTUAL;
}

async function login(){
  const email=document.getElementById("loginEmail").value;
  const pass=document.getElementById("loginPassword").value;

  const cred=await auth.signInWithEmailAndPassword(email,pass);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("panel").style.display="block";

  cargarPanel(cred.user.uid);
}

async function cargarPanel(uid){
  const cont=document.getElementById("panelContenido");

  await detectarMetodoPago();

  const doc=await db.collection("usuarios").doc(uid).get();
  const u=doc.data();

  let vencido=false;

  if(u.fechaVencimiento){
    const f=new Date(u.fechaVencimiento);
    if(f < new Date()) vencido=true;
  }

  let estadoHTML="";
  let pagoHTML="";

  if(u.aprobado!==true){
    estadoHTML="<h3>⏳ En revisión</h3>";
  }

  else if(vencido){
    estadoHTML="<h3>⚠️ Vencido</h3>";
    pagoHTML=mostrarPago();
  }

  else if(u.activo===true){
    estadoHTML="<h3>🟢 Activo</h3>";
    pagoHTML=mostrarPago(); // 🔥 AQUÍ YA INCLUYE PAGO AUN ACTIVO
  }

  else{
    estadoHTML="<h3>✅ Aprobado</h3>";
    pagoHTML=mostrarPago();
  }

  cont.innerHTML=`
  <div class="estado-box">${estadoHTML}</div>
  ${pagoHTML}
  <button class="btn btn-continuar">Actualizar datos</button>
  `;
}

function mostrarPago(){
  return `
  <div class="estado-box">
  <h3>💳 Pago</h3>
  <p>${TEXTO_PAGO_ACTUAL}</p>
  <button onclick="irPago()" class="btn-pago ${METODO_PAGO}">${TEXTO_PAGO_ACTUAL}</button>
  <a href="https://wa.me/${WHATSAPP_ADMIN}" class="btn btn-continuar">Enviar comprobante</a>
  </div>
  `;
}

</script>

</body>
</html>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#222}
.contenedor{position:relative;width:100%}
.portada{width:100%;display:block}
.menu-btn{position:absolute;top:10px;right:10px;width:70px;height:70px;z-index:9999;cursor:pointer}
.menu{position:fixed;top:0;right:-100%;width:82%;height:100%;background:#fff;transition:.3s;z-index:10000;padding:25px;box-shadow:-5px 0 20px rgba(0,0,0,.25);overflow-y:auto}
.menu.active{right:0}
.menu a{display:block;padding:18px 10px;color:#b7195b;font-size:21px;text-decoration:none;border-bottom:1px solid #eee;font-weight:bold}
.cerrar-menu{text-align:right;font-size:30px;cursor:pointer;color:#b7195b}
.volver-menu{display:block;margin-top:25px;text-align:center;background:#777;color:white;padding:14px;border-radius:12px;text-decoration:none;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.60);z-index:20000;overflow-y:auto}
.form-box{background:linear-gradient(180deg,#fff,#fff1f7);margin:20px auto;padding:24px;width:88%;max-width:540px;border-radius:22px;box-shadow:0 10px 35px rgba(0,0,0,.35)}

.btn-continuar{background:#b7195b;color:white}
.btn-atras{background:#777;color:white}
.btn-enviar{background:#138a36;color:white}
.aviso{background:#fff;border-left:5px solid #b7195b;padding:12px;border-radius:10px;color:#333;margin:12px 0}
#lista-perfiles{padding:20px}

.card img{width:100%;max-height:360px;object-fit:cover;border-radius:15px}
.card h3{color:#b7195b;font-size:30px}

.btn-pago{display:block;width:100%;text-align:center;padding:14px;border-radius:12px;text-decoration:none;font-weight:bold;margin:10px 0;border:none;font-size:16px;cursor:pointer}
.mp{background:#ffe600;color:#111}
.stripe{background:#635bff;color:white}

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">
  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<div class="menu" id="menu">
  <div class="cerrar-menu" onclick="cerrarMenu()">✕</div>
  <a href="#" onclick="abrirRegistro()">👤 Registrarse</a>
  <a href="#" onclick="abrirMiPerfil()">👤 Mi perfil</a>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
  <a href="#">📄 Términos y condiciones</a>
  <a href="#">🔒 Política de privacidad</a>
  <a href="#">📃 Condiciones de uso</a>
  <a href="#" class="volver-menu" onclick="cerrarMenu()">← Volver</a>
</div>

<div class="modal" id="modalMiPerfil">
  <div class="form-box">
    <h2>Mi perfil</h2>
    <input id="loginEmail" type="email" placeholder="Correo">
    <input id="loginPassword" type="password" placeholder="Contraseña">
    <button class="btn btn-continuar" onclick="loginMiPerfil()">Entrar</button>
  </div>
</div>

<div class="modal" id="modalPanel">
  <div class="form-box">
    <h2>Panel de perfil</h2>
    <div id="panelContenido"></div>
  </div>
</div>

<script>

function abrirMenu(){document.getElementById("menu").classList.add("active")}
function cerrarMenu(){document.getElementById("menu").classList.remove("active")}
function abrirMiPerfil(){document.getElementById("modalMiPerfil").style.display="block"}

async function loginMiPerfil(){
  const email=document.getElementById("loginEmail").value;
  const password=document.getElementById("loginPassword").value;

  const cred=await auth.signInWithEmailAndPassword(email,password);
  abrirPanel(cred.user.uid);
}

function abrirPanel(uid){
  document.getElementById("modalPanel").style.display="block";
  cargarPanel(uid);
}

async function cargarPanel(uid){
  const doc=await db.collection("usuarios").doc(uid).get();
  const u=doc.data();

  let html = `
  <div class="estado-box">
    <h3>🟢 Perfil activo</h3>
  </div>

  <div class="estado-box">
    <h3>💳 Pago</h3>

    <select id="paisManual">
      <option value="">Selecciona país</option>
      <option value="mx">México</option>
      <option value="us">USA</option>
    </select>

    <button type="button" onclick="pagoManual()" class="btn-pago mp">
      Continuar al pago
    </button>
  </div>
  `;

  document.getElementById("panelContenido").innerHTML = html;
}

/* 🔥 CORREGIDO */
function pagoManual(){
  const select = document.getElementById("paisManual");

  if(!select){
    alert("No se encontró el selector de país.");
    return;
  }

  const pais = select.value;

  if(!pais){
    alert("Selecciona tu país");
    return;
  }

  if(["mx","co","pe","cl","ar","br"].includes(pais)){
    window.location.href = LINK_MERCADO_PAGO;
  }else{
    window.location.href = LINK_STRIPE;
  }
}

</script>

</body>

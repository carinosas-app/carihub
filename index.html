<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CariHub</title>
<style>
body { margin: 0; }

.contenedor {
  position: relative;
  width: 100%;
}

.portada {
  width: 100%;
  display: block;
}

.menu-btn {
  position: absolute;
  top: 0.8%;
  right: 1.5%;
  width: 12%;
  height: 5%;
  cursor: pointer;
  z-index: 10;
}

.menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100%;
  background: white;
  box-shadow: -5px 0 10px rgba(0,0,0,0.3);
  transition: 0.3s;
  padding: 20px;
  z-index: 999;
}

.menu.active { right: 0; }

.menu a {
  display: block;
  padding: 12px;
  margin: 5px 0;
  text-decoration: none;
  color: #ff4b6e;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="contenedor">
  <img src="portada.png" class="portada">

  <div class="menu-btn" onclick="abrirMenu()"></div>
</div>

<div class="menu" id="menu">
  <a href="#" onclick="mostrarRegistro()">👤 Regístrate</a>
  <script>
function abrirMenu() {
  document.getElementById("menu").classList.toggle("active");
}

function mostrarRegistro() {
  alert(
`REGISTRO EN CARIHUB

Requisitos obligatorios:

* Nombre o alias
* Edad (mayor de 18)
* WhatsApp
* Categoría
* Estado
* Ciudad
* Descripción breve
* Precio o forma de trabajo
* Modalidad (lugar / domicilio / hotel)
* Máximo 3 fotos

Al continuar aceptas verificación.

Presiona OK para continuar al registro.`
  );

  window.open("https://wa.me/524791950206?text=Hola,%20quiero%20registrarme%20en%20CariHub","_blank");
}
</script>
  <a href="#">📢 Banners</a>
  <a href="#">⚠️ Denunciar</a>
  <a href="#">📄 Términos y condiciones</a>
  <a href="#">📘 Condiciones de uso</a>
  <a href="#">🔒 Política de privacidad</a>
  <a href="#">🍪 Política de cookies</a>
  <a href="#">💳 Política de pagos</a>
</div>

<script>
function abrirMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
